<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProDraw - Студия рисования</title>
    <!-- Подключаем иконки Phosphor Icons для стильного UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: rgba(32, 32, 36, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --accent: #8257e5;
            --accent-hover: #996dff;
            --text: #e1e1e6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Запрещаем выделение текста */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Запрещаем скролл страницы */
            display: flex;
            flex-direction: column;
        }

        /* Контейнер холста */
        .canvas-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            height: 100%;
        }

        canvas {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            /* Важно для тач-устройств: запрещаем браузерные жесты на холсте */
            touch-action: none; 
            cursor: crosshair;
        }

        /* Стеклянная панель инструментов */
        .toolbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            padding: 12px 24px;
            border-radius: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 10;
            transition: all 0.3s ease;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Разделитель */
        .divider {
            width: 1px;
            height: 30px;
            background: var(--panel-border);
        }

        /* Кнопки */
        button {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        button.active {
            color: var(--accent);
            background: rgba(130, 87, 229, 0.2);
        }

        /* Инпуты */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--panel-border);
            border-radius: 50%;
        }

        /* Ползунок толщины */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Адаптив для телефонов */
        @media (max-width: 768px) {
            .canvas-container {
                padding: 10px;
            }
            .toolbar {
                bottom: 15px;
                padding: 10px 15px;
                gap: 10px;
                width: 95%;
                justify-content: space-between;
                overflow-x: auto; /* Скролл панели на совсем маленьких экранах */
            }
            input[type="range"] {
                width: 60px;
            }
        }

        /* --- НОВЫЕ СТИЛИ ДЛЯ КИСТЕЙ И ПРОЗРАЧНОСТИ --- */
        #opacityPicker {
            width: 70px;
            background: linear-gradient(to right, rgba(255,255,255,0.1), rgba(255,255,255,0.8));
        }
        select {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid var(--panel-border);
            padding: 6px 10px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }
        select option {
            background: var(--bg-color);
        }
        .stabilizer-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text);
        }
        .stabilizer-label input {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="canvas-container" id="container">
        <canvas id="drawingCanvas"></canvas>
    </div>

    <div class="toolbar">
        <div class="tool-group">
            <input type="color" id="colorPicker" value="#121214" title="Выбрать цвет">
            <input type="range" id="sizePicker" min="1" max="50" value="5" title="Толщина кисти">
            
            <!-- ДОБАВЛЕННЫЕ КНОПКИ -->
            <button id="btnBrush" class="active" title="Кисть">
                <i class="ph ph-paintbrush"></i>
            </button>
            <button id="btnEraser" title="Ластик">
                <i class="ph ph-eraser"></i>
            </button>
        </div>

        <!-- ВСТАВИТЬ ВМЕСТО ПЕРВОГО <div class="divider"></div> в .toolbar -->
        <div class="divider"></div>

        <div class="tool-group">
            <input type="range" id="opacityPicker" min="0.05" max="1" step="0.05" value="1" title="Прозрачность">
            <select id="brushType" title="Тип кисти">
                <option value="normal">Обычная</option>
                <option value="anime">Аниме (Перо)</option>
                <option value="calligraphy">Каллиграфия</option>
            </select>
            <label class="stabilizer-label" title="Поглощает тремор рук">
                <input type="checkbox" id="stabilizerCb">
                Стабилизатор
            </label>
        </div>

        <div class="divider"></div>

        <div class="tool-group">
            <button id="btnClear" title="Очистить холст">
                <i class="ph ph-trash"></i>
            </button>
            <button id="btnSave" title="Сохранить">
                <i class="ph ph-download-simple"></i>
            </button>
        </div>
    </div>

    <script>
        class DrawingApp {
            constructor() {
                this.canvas = document.getElementById('drawingCanvas');
                this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
                this.container = document.getElementById('container');
                
                // Элементы UI
                this.colorPicker = document.getElementById('colorPicker');
                this.sizePicker = document.getElementById('sizePicker');
                this.btnBrush = document.getElementById('btnBrush');
                this.btnEraser = document.getElementById('btnEraser');
                this.btnClear = document.getElementById('btnClear');
                this.btnSave = document.getElementById('btnSave');

                // Состояние
                this.isDrawing = false;
                this.currentTool = 'brush'; // 'brush' или 'eraser'
                this.color = this.colorPicker.value;
                this.lineWidth = this.sizePicker.value;
                
                // Для плавных линий
                this.lastX = 0;
                this.lastY = 0;

                // --- НОВЫЕ ЭЛЕМЕНТЫ И ПЕРЕМЕННЫЕ ---
                this.opacityPicker = document.getElementById('opacityPicker');
                this.brushTypeSelect = document.getElementById('brushType');
                this.stabilizerCb = document.getElementById('stabilizerCb');

                this.opacity = 1;
                this.brushType = 'normal';
                this.useStabilizer = false;
                
                this.points =[]; // Хранилище точек для кривых Безье
                this.currentLineWidth = Number(this.lineWidth); // Для динамической толщины кистей
                this.lastTimestamp = 0;

                this.init();
            }

            init() {
                this.resizeCanvas();
                this.bindEvents();
                this.setupContext();
                this.fillWhiteBackground(); // Чтобы при сохранении не было черного/прозрачного фона
            }

            hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

            // Настройка качества: учитываем плотность пикселей экрана (Retina/Мобилки)
            resizeCanvas() {
                // Сохраняем текущий рисунок перед изменением размера
                const imageData = this.canvas.width > 0 ? this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height) : null;

                const rect = this.container.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;

                this.canvas.width = rect.width * dpr;
                this.canvas.height = rect.height * dpr;
                
                this.canvas.style.width = `${rect.width}px`;
                this.canvas.style.height = `${rect.height}px`;

                this.ctx.scale(dpr, dpr);
                this.setupContext();

                // Восстанавливаем рисунок
                if (imageData) {
                    // Временный канвас для корректного масштабирования при ресайзе
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = imageData.width;
                    tempCanvas.height = imageData.height;
                    tempCanvas.getContext('2d').putImageData(imageData, 0, 0);
                    this.ctx.drawImage(tempCanvas, 0, 0, rect.width, rect.height);
                } else {
                    this.fillWhiteBackground();
                }
            }

            fillWhiteBackground() {
                this.ctx.fillStyle = '#ffffff';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }

            setupContext() {
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
            }

            // Универсальное получение координат (для мыши и тача)
            getCoordinates(e) {
                const rect = this.canvas.getBoundingClientRect();
                let clientX, clientY;

                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
    
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            startDrawing(e) {
                this.isDrawing = true;
                const { x, y } = this.getCoordinates(e);
                this.points =[{ x, y }, { x, y }, { x, y }]; 
                this.currentLineWidth = Number(this.lineWidth);
                this.lastTimestamp = performance.now();
                
                // Рисуем первую точку (клик)
                this.ctx.beginPath();
                this.ctx.arc(x, y, this.currentLineWidth / 2, 0, Math.PI * 2);
                this.ctx.fillStyle = this.currentTool === 'eraser' ? '#ffffff' : this.color;
                this.ctx.globalAlpha = this.currentTool === 'eraser' ? 1 : this.opacity;
                this.ctx.fill();
            }

            draw(e) {
                if (!this.isDrawing) return;
                e.preventDefault();

                const { x, y } = this.getCoordinates(e);
                const currentTimestamp = performance.now();
                
                let targetX = x;
                let targetY = y;

                // СТАБИЛИЗАТОР: Инерция (Lerp). Кисть "тянется" за курсором, поглощая тремор.
                if (this.useStabilizer && this.points.length > 0) {
                    const lastPoint = this.points[this.points.length - 1];
                    // Курсор проходит только 15% пути за кадр
                    targetX = lastPoint.x + (x - lastPoint.x) * 0.15;
                    targetY = lastPoint.y + (y - lastPoint.y) * 0.15;
                }

                this.points.push({ x: targetX, y: targetY });

                
                // Распределение по инструментам
                if (this.currentTool === 'eraser') {
                    this.ctx.strokeStyle = '#ffffff';
                    this.ctx.lineWidth = Number(this.lineWidth) * 1.5;
                    this.drawSmoothCurve();
                } else {
                    this.ctx.strokeStyle = this.color;
                    this.ctx.strokeStyle = this.hexToRgba(this.color, this.opacity);
                    
                    if (this.brushType === 'anime') {
                        this.drawAnimeBrush(currentTimestamp);
                    } else if (this.brushType === 'calligraphy') {
                        this.drawCalligraphyBrush();
                    } else {
                        this.ctx.lineWidth = Number(this.lineWidth);
                        this.drawSmoothCurve();
                    }
                }
                
                this.lastTimestamp = currentTimestamp;
            }

            stopDrawing() {
                this.isDrawing = false;
                this.points =[]; // Очищаем массив точек
            }

            // --- МАТЕМАТИКА КИСТЕЙ ---

            // Базовое сглаживание: рисует кривую Безье по средним точкам (midpoints)
            drawSmoothCurve() {
                if (this.points.length < 3) return;
                const p1 = this.points[this.points.length - 3];
                const p2 = this.points[this.points.length - 2];
                const p3 = this.points[this.points.length - 1];

                const mid1 = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
                const mid2 = { x: (p2.x + p3.x) / 2, y: (p2.y + p3.y) / 2 };

                this.ctx.beginPath();
                this.ctx.moveTo(mid1.x, mid1.y);
                this.ctx.quadraticCurveTo(p2.x, p2.y, mid2.x, mid2.y);
                this.ctx.stroke();
            }

            // Кисть "Аниме": реагирует на скорость (быстро = тонко, медленно = толсто)
            drawAnimeBrush(currentTimestamp) {
                if (this.points.length < 3) return;
                const p2 = this.points[this.points.length - 2];
                const p3 = this.points[this.points.length - 1];

                const distance = Math.hypot(p3.x - p2.x, p3.y - p2.y);
                const dt = currentTimestamp - this.lastTimestamp || 1;
                const speed = distance / dt;

                const baseWidth = Number(this.lineWidth);
                let targetWidth = Math.max(1, baseWidth - speed * 3);
                
                // Плавное изменение толщины
                this.currentLineWidth += (targetWidth - this.currentLineWidth) * 0.2;
                this.ctx.lineWidth = this.currentLineWidth;
                
                this.drawSmoothCurve();
            }

            // Кисть "Каллиграфия": имитация плоского пера (зависит от угла наклона линии)
            drawCalligraphyBrush() {
                if (this.points.length < 3) return;
                const p2 = this.points[this.points.length - 2];
                const p3 = this.points[this.points.length - 1];

                const dx = p3.x - p2.x;
                const dy = p3.y - p2.y;
                
                const dirAngle = Math.atan2(dy, dx);
                const diff = dirAngle - (Math.PI / 4); // Угол наклона пера: 45 градусов
                
                const baseWidth = Number(this.lineWidth);
                // Толщина зависит от того, насколько вектор перпендикулярен перу
                let targetWidth = Math.max(1, baseWidth * Math.abs(Math.sin(diff)));
                
                this.currentLineWidth += (targetWidth - this.currentLineWidth) * 0.4;
                this.ctx.lineWidth = this.currentLineWidth;
                
                this.drawSmoothCurve();
            }

            setTool(tool) {
                this.currentTool = tool;
                this.btnBrush.classList.remove('active');
                this.btnEraser.classList.remove('active');
                
                if (tool === 'brush') this.btnBrush.classList.add('active');
                if (tool === 'eraser') this.btnEraser.classList.add('active');
            }

            clearCanvas() {
                this.stopDrawing(); // Прерываем текущее рисование
                this.canvas.style.transition = 'opacity 0.3s ease';
                this.canvas.style.pointerEvents = 'none'; // Отключаем взаимодействие
                this.canvas.style.opacity = '0';
    
                setTimeout(() => {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    this.fillWhiteBackground();
                    this.canvas.style.opacity = '1';
                    this.canvas.style.pointerEvents = 'auto'; // Включаем обратно
                }, 300);
            }

            saveCanvas() {
                const link = document.createElement('a');
                link.download = `ProDraw_${new Date().getTime()}.png`;
                link.href = this.canvas.toDataURL('image/png');
                link.click();
            }

            bindEvents() {
                // Мышь
                this.canvas.addEventListener('mousedown', this.startDrawing.bind(this));
                this.canvas.addEventListener('mousemove', this.draw.bind(this));
                this.canvas.addEventListener('mouseup', this.stopDrawing.bind(this));
                this.canvas.addEventListener('mouseout', this.stopDrawing.bind(this));

                // Сенсорные экраны (Touch)
                this.canvas.addEventListener('touchstart', this.startDrawing.bind(this), { passive: false });
                this.canvas.addEventListener('touchmove', this.draw.bind(this), { passive: false });
                this.canvas.addEventListener('touchend', this.stopDrawing.bind(this));

                // Инструменты UI
                this.colorPicker.addEventListener('input', (e) => this.color = e.target.value);
                this.sizePicker.addEventListener('input', (e) => this.lineWidth = e.target.value);
                
                this.btnBrush.addEventListener('click', () => this.setTool('brush'));
                this.btnEraser.addEventListener('click', () => this.setTool('eraser'));
                this.btnClear.addEventListener('click', this.clearCanvas.bind(this));
                this.btnSave.addEventListener('click', this.saveCanvas.bind(this));

                // Ресайз окна (адаптивность)
                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => this.resizeCanvas(), 200);
                }); // <-- ЗАКРЫТЬ СКОБКУ ЗДЕСЬ!

                // --- СЛУШАТЕЛИ НОВЫХ ФУНКЦИЙ (Должны быть снаружи resize) ---
                this.opacityPicker.addEventListener('input', (e) => this.opacity = parseFloat(e.target.value));
                this.brushTypeSelect.addEventListener('change', (e) => {
                    this.brushType = e.target.value;
                    this.setTool('brush'); 
                });
                this.stabilizerCb.addEventListener('change', (e) => this.useStabilizer = e.target.checked);
            }
        }

        // Запуск приложения после загрузки DOM
        window.addEventListener('DOMContentLoaded', () => {
            new DrawingApp();
        });
    </script>
</body>
<!-- ========================================== -->
<!-- ПЛАВАЮЩЕЕ МЕНЮ (FAB DOCK)                  -->
<!-- ========================================== -->
<style>
    .fab-wrapper {
        position: fixed;
        bottom: 25px;
        right: 25px; 
        z-index: 999999;
        display: flex;
        flex-direction: row-reverse;
        align-items: center;
        gap: 15px;
        /* ФИКС: Оболочка больше не перехватывает клики! */
        pointer-events: none; 
    }

    /* Сама кнопка-триггер */
    .fab-button {
        /* ФИКС: Делаем саму кнопку кликабельной */
        pointer-events: auto; 
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: rgba(20, 20, 25, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        outline: none;
        padding: 0;
    }

    .fab-button:hover {
        transform: scale(1.1);
        background: rgba(40, 40, 50, 0.9);
        border-color: rgba(255, 255, 255, 0.4);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), inset 0 1px 5px rgba(255, 255, 255, 0.3);
    }

    .fab-button svg {
        transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    
    .fab-wrapper.open .fab-button svg {
        transform: rotate(90deg) scale(0.9);
        color: #a78bfa; 
    }

    /* Выезжающая панель навигации */
    .global-dock {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: rgba(12, 12, 14, 0.85);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 100px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        
        /* ФИКС: Игнорирует клики и полностью скрыта в закрытом виде */
        opacity: 0;
        visibility: hidden; 
        pointer-events: none; 
        
        transform: translateX(40px) scale(0.9);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        transform-origin: right center;
    }

    /* Состояние открытого меню */
    .fab-wrapper.open .global-dock {
        opacity: 1;
        visibility: visible; 
        pointer-events: auto; /* ФИКС: Кнопки меню работают, только когда открыты */
        transform: translateX(0) scale(1);
    }

    .dock-item {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: 100px;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        font-family: 'Inter', 'Segoe UI', sans-serif;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s ease;
        position: relative;
        white-space: nowrap;
    }

    .dock-item:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
    }

    .dock-item.active {
        color: #fff;
        background: rgba(255, 255, 255, 0.12);
        box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.05);
    }

    .dock-item.active::after {
        content: '';
        position: absolute;
        bottom: -6px;
        left: 50%;
        transform: translateX(-50%);
        width: 18px;
        height: 3px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
    }

    .dock-icon {
        font-size: 18px;
        filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
    }

    @media (max-width: 768px) {
        .fab-wrapper {
            bottom: 20px;
            right: 20px;
            gap: 10px;
        }
        .fab-button {
            width: 48px;
            height: 48px;
        }
        .global-dock {
            padding: 6px 8px;
            gap: 4px;
        }
        .dock-item {
            padding: 12px;
        }
        .dock-text {
            display: none; 
        }
        .dock-icon {
            font-size: 22px;
        }
        .dock-item.active::after {
            bottom: -2px;
        }
    }

    /* --- НОВЫЕ СТИЛИ ДЛЯ ИКОНОК-КАРТИНОК И ПЕРЕТАСКИВАНИЯ --- */

.dock-icon {
    width: 20px; /* Размер ваших иконок */
    height: 20px;
    object-fit: contain; /* Чтобы картинка не искажалась */
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
    /* Важно! Запрещаем перетаскивать саму картинку браузером */
    pointer-events: none; 
    user-select: none;
}

@media (max-width: 768px) {
    .dock-icon {
        width: 24px; /* На телефоне иконки чуть больше */
        height: 24px;
    }
}

/* Курсоры для кнопки перетаскивания */
.fab-button {
    cursor: grab;
    touch-action: none; /* Запрещаем скролл страницы при касании кнопки на телефоне */
}

.fab-button:active {
    cursor: grabbing;
}

/* Класс для плавного возврата в границы экрана (если меню открыли у самого края) */
.fab-wrapper.snap-transition {
    transition: left 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

<script>
    document.addEventListener("DOMContentLoaded", () => {
    const fabWrapper = document.getElementById('fabWrapper');
    const fabToggleBtn = document.getElementById('fabToggleBtn');
    
    // Подсветка активной ссылки (ваш код)
    let currentPath = window.location.pathname.split('/').pop();
    if (currentPath === '') currentPath = 'index.html';
    document.querySelectorAll('.dock-item').forEach(item => {
        const href = item.getAttribute('href');
        if (currentPath === href) {
            item.classList.add('active');
        }
    });

    // --- ЛОГИКА ПЕРЕТАСКИВАНИЯ (DRAG & DROP) ---
    let isDragging = false;
    let hasMoved = false; // Отличаем клик от перетаскивания
    let startX, startY;
    let initialLeft, initialTop;

    function dragStart(e) {
        if (e.type === 'touchstart') {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        } else {
            startX = e.clientX;
            startY = e.clientY;
            e.preventDefault(); // Предотвращаем стандартное выделение на ПК
        }

        // Получаем текущие координаты элемента на экране
        const rect = fabWrapper.getBoundingClientRect();
        
        // Отключаем bottom/right, переходим на жесткое позиционирование left/top
        fabWrapper.style.bottom = 'auto';
        fabWrapper.style.right = 'auto';
        fabWrapper.style.left = rect.left + 'px';
        fabWrapper.style.top = rect.top + 'px';

        initialLeft = rect.left;
        initialTop = rect.top;

        isDragging = true;
        hasMoved = false;
        
        // Убираем плавность при самом перетаскивании
        fabWrapper.classList.remove('snap-transition');

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchmove', dragMove, { passive: false });
        document.addEventListener('touchend', dragEnd);
    }

    function dragMove(e) {
        if (!isDragging) return;

        let currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        let currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

        let deltaX = currentX - startX;
        let deltaY = currentY - startY;

        // Если сдвинули больше чем на 5 пикселей, считаем это перетаскиванием, а не кликом
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
            hasMoved = true;
            if (e.type === 'touchmove') e.preventDefault(); // Блокируем скролл страницы
        }

        if (hasMoved) {
            let newLeft = initialLeft + deltaX;
            let newTop = initialTop + deltaY;

            // --- ОГРАНИЧЕНИЕ ВЫХОДА ЗА ПРЕДЕЛЫ ЭКРАНА ---
            const rect = fabWrapper.getBoundingClientRect();
            const maxLeft = window.innerWidth - rect.width;
            const maxTop = window.innerHeight - rect.height;

            // Запрещаем уходить за левый/правый и верхний/нижний края
            newLeft = Math.max(0, Math.min(newLeft, maxLeft));
            newTop = Math.max(0, Math.min(newTop, maxTop));

            fabWrapper.style.left = newLeft + 'px';
            fabWrapper.style.top = newTop + 'px';
        }
    }

    function dragEnd() {
        isDragging = false;
        document.removeEventListener('mousemove', dragMove);
        document.removeEventListener('mouseup', dragEnd);
        document.removeEventListener('touchmove', dragMove);
        document.removeEventListener('touchend', dragEnd);
    }

    // Слушатели для начала перетаскивания (с кнопки)
    fabToggleBtn.addEventListener('mousedown', dragStart);
    fabToggleBtn.addEventListener('touchstart', dragStart, { passive: true });

    // --- ЛОГИКА ОТКРЫТИЯ/ЗАКРЫТИЯ МЕНЮ ---
    fabToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        
        // Если было перетаскивание, отменяем клик!
        if (hasMoved) {
            e.preventDefault();
            return;
        }

        fabWrapper.classList.toggle('open');
        
        // Если меню открылось и вылезло за края экрана (т.к. стало шире),
        // плавно задвигаем его обратно в пределы экрана.
        if (fabWrapper.classList.contains('open')) {
            setTimeout(keepInBounds, 50); // Ждем долю секунды, чтобы CSS применил ширину
        }
    });

    // Функция возврата в рамки экрана при изменении ширины меню
    function keepInBounds() {
        const rect = fabWrapper.getBoundingClientRect();
        const maxLeft = window.innerWidth - rect.width;
        const maxTop = window.innerHeight - rect.height;

        let correctedLeft = Math.max(0, Math.min(rect.left, maxLeft));
        let correctedTop = Math.max(0, Math.min(rect.top, maxTop));

        // Если позиция нуждается в корректировке
        if (correctedLeft !== rect.left || correctedTop !== rect.top) {
            fabWrapper.classList.add('snap-transition'); // Добавляем плавность
            fabWrapper.style.left = correctedLeft + 'px';
            fabWrapper.style.top = correctedTop + 'px';
        }
    }

    // Закрытие меню при клике в любое другое место
    document.addEventListener('click', (e) => {
        if (!fabWrapper.contains(e.target) && fabWrapper.classList.contains('open')) {
            fabWrapper.classList.remove('open');
            // При закрытии (ширина уменьшилась) тоже проверяем границы на всякий случай
            setTimeout(keepInBounds, 300); 
        }
    });

    // Пересчет границ при повороте экрана телефона / изменении размера окна
    window.addEventListener('resize', keepInBounds);
});
</script>
