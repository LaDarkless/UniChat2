<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProDraw - Студия рисования</title>
    <!-- Подключаем профессиональные иконки -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: rgba(32, 32, 36, 0.85);
            --panel-border: rgba(255, 255, 255, 0.1);
            --accent: #8257e5;
            --accent-hover: #996dff;
            --text: #e1e1e6;
            --layer-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- РАБОЧАЯ ОБЛАСТЬ (НАВИГАЦИЯ) --- */
        .canvas-container {
            flex-grow: 1;
            position: relative;
            overflow: hidden; /* Скрываем все, что выходит за пределы экрана */
            background: #0a0a0b;
        }

        /* Контейнер, который мы будем крутить, приближать и отдалять */
        #workspace {
    position: absolute;
    top: 0;   /* Исправлено: убираем 50% */
    left: 0;  /* Исправлено: убираем 50% */
    transform-origin: 0 0;
    box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
}

        /* Контейнер для слоев */
        #layers-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .layer-canvas {
            position: absolute;
            top: 0; left: 0;
            background: transparent;
            pointer-events: none; /* События ловит только драфт */
        }
        
        /* Слой фона - всегда белый по умолчанию */
        #layer-0 { background: var(--layer-bg); }

        #draftCanvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 9999;
            touch-action: none;
            cursor: crosshair;
        }

        /* Курсоры инструментов */
        .tool-hand #draftCanvas { cursor: grab; }
        .tool-hand.dragging #draftCanvas { cursor: grabbing; }

        /* --- ГЛАВНАЯ ПАНЕЛЬ ИНСТРУМЕНТОВ (ВНИЗУ) --- */
        .toolbar {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            padding: 12px 20px;
            border-radius: 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 100;
            max-width: 95%;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .toolbar::-webkit-scrollbar { display: none; }

        /* --- БОКОВАЯ ПАНЕЛЬ СЛОЕВ (СПРАВА) --- */
        .layers-panel {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            width: 220px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 100;
            max-height: 70vh;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .layers-panel.hidden { transform: translateX(120%); }

        .layers-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel-border);
            font-weight: 600;
            font-size: 14px;
        }

        .layers-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column-reverse; /* Новые слои сверху */
            gap: 8px;
        }

        .layer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .layer-item.active {
            border-color: var(--accent);
            background: rgba(130, 87, 229, 0.15);
        }

        .layer-item span { font-size: 13px; flex-grow: 1; margin-left: 10px; }
        
        .layer-btn {
            background: transparent;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 4px;
            font-size: 18px;
            opacity: 0.7;
        }
        .layer-btn:hover { opacity: 1; color: var(--accent); }

        /* Вспомогательные элементы UI */
        .tool-group { display: flex; align-items: center; gap: 6px; }
        .divider { width: 1px; height: 32px; background: var(--panel-border); border-radius: 1px; }

        button.tool-btn {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button.tool-btn:active { transform: scale(0.9); }
        button.tool-btn:hover { background: rgba(255, 255, 255, 0.08); }
        button.tool-btn.active { color: #fff; background: var(--accent); box-shadow: 0 4px 12px rgba(130,87,229,0.4); }

        input[type="color"] {
            -webkit-appearance: none;
            border: none; width: 36px; height: 36px;
            border-radius: 50%; cursor: pointer; padding: 0; background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; }

        input[type="range"] {
            -webkit-appearance: none; width: 80px; height: 6px;
            background: rgba(255, 255, 255, 0.15); border-radius: 4px; outline: none; margin: 0 8px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            border-radius: 50%; background: var(--text); cursor: pointer; transition: 0.15s;
        }
        input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.3); background: var(--accent); }

        /* Плавающая мини-панель навигации (Слева) */
        .nav-panel {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 8px;
            z-index: 100;
        }

        /* Адаптив под мобилки */
        @media (max-width: 850px) {
            .layers-panel { width: 200px; right: 10px; max-height: 60vh; }
            .nav-panel { left: 10px; }
            .toolbar { padding: 8px 12px; width: calc(100% - 20px); justify-content: flex-start; }
            button.tool-btn { font-size: 22px; padding: 8px; }
        }
    </style>
</head>
<body>

    <div class="canvas-container" id="container">
        <!-- Рабочая область (перемещается и масштабируется) -->
        <div id="workspace">
            <div id="layers-container"></div>
            <!-- Драфт всегда поверх всех слоев, на нем рисуем текущий штрих -->
            <canvas id="draftCanvas"></canvas>
        </div>
    </div>

    <!-- Панель навигации -->
    <div class="nav-panel">
        <button class="tool-btn" id="btnZoomIn" title="Приблизить"><i class="ph ph-magnifying-glass-plus"></i></button>
        <button class="tool-btn" id="btnZoomOut" title="Отдалить"><i class="ph ph-magnifying-glass-minus"></i></button>
        <button class="tool-btn" id="btnZoomReset" title="Центрировать"><i class="ph ph-corners-out"></i></button>
    </div>

    <!-- Панель инструментов -->
    <div class="toolbar" id="toolbar">
        <div class="tool-group">
            <input type="color" id="colorPicker" value="#000000" title="Цвет">
            <input type="range" id="sizePicker" min="1" max="100" value="8" title="Размер">
            <input type="range" id="opacityPicker" min="0.05" max="1" step="0.05" value="1" title="Прозрачность">
        </div>

        <div class="divider"></div>

        <div class="tool-group">
            <button class="tool-btn active" data-tool="brush" title="Кисть"><i class="ph ph-paintbrush"></i></button>
            <button class="tool-btn" data-tool="eraser" title="Ластик"><i class="ph ph-eraser"></i></button>
            <button class="tool-btn" data-tool="blur" title="Размытие"><i class="ph ph-drop"></i></button>
            <button class="tool-btn" data-tool="hand" title="Перемещение (Рука)"><i class="ph ph-hand-palm"></i></button>
            <button class="tool-btn" id="btnPicker" title="Пипетка"><i class="ph ph-eyedropper"></i></button>
        </div>

        <div class="divider"></div>

        <div class="tool-group">
            <button class="tool-btn" id="btnUndo" title="Назад"><i class="ph ph-arrow-u-up-left"></i></button>
            <button class="tool-btn" id="btnToggleLayers" title="Слои"><i class="ph ph-stack"></i></button>
            <button class="tool-btn" id="btnSave" title="Сохранить"><i class="ph ph-download-simple"></i></button>
        </div>
    </div>

    <!-- Панель слоев -->
    <div class="layers-panel hidden" id="layersPanel">
        <div class="layers-header">
            <span>Слои</span>
            <button class="layer-btn" id="btnAddLayer"><i class="ph ph-plus"></i></button>
        </div>
        <div class="layers-list" id="layersList"></div>
    </div>

    <script>
        class DrawingApp {
            constructor() {
                this.container = document.getElementById('container');
                this.workspace = document.getElementById('workspace');
                this.layersContainer = document.getElementById('layers-container');
                this.draftCanvas = document.getElementById('draftCanvas');
                this.draftCtx = this.draftCanvas.getContext('2d');
                
                // Настройки холста
                this.dpr = window.devicePixelRatio || 1;
                this.baseWidth = 1080; // Базовое разрешение (для качества)
                this.baseHeight = 1920; 
                
                // Навигация (Zoom/Pan)
                this.transform = { x: 0, y: 0, scale: 1 };
                this.activePointers = new Map();
                this.initialPinchDist = null;
                this.isPanning = false;

                // Слои
                this.layers =[];
                this.layerIdCounter = 0;
                this.activeLayer = null;

                // Инструменты
                this.currentTool = 'brush'; 
                this.color = document.getElementById('colorPicker').value;
                this.lineWidth = parseFloat(document.getElementById('sizePicker').value);
                this.opacity = parseFloat(document.getElementById('opacityPicker').value);
                this.isDrawing = false;
                this.points =[];

                // История (Snapshot всех слоев для простоты)
                this.history =[];
                this.maxHistory = 10; // Экономим память телефона

                this.init();
            }

            init() {
                this.setupWorkspaceSize();
                this.addLayer("Фон"); // Слой 0
                this.addLayer("Слой 1"); // Слой 1 (Активный)
                this.bindEvents();
                this.bindUI();
                this.centerWorkspace();
                this.saveHistory();
            }

            setupWorkspaceSize() {
                // Устанавливаем физический размер холстов, опираясь на пропорции экрана
                const rect = this.container.getBoundingClientRect();
                
                // ФИКС: Защита от нулевых размеров при загрузке в скрытом iframe
                const cWidth = rect.width > 0 ? rect.width : window.innerWidth;
                const cHeight = rect.height > 0 ? rect.height : window.innerHeight;
                
                const aspect = cHeight / cWidth;
                
                this.baseWidth = 1200; 
                // ФИКС: Запрещаем холсту быть меньше 100px в высоту
                this.baseHeight = Math.max(1200 * aspect, 100);

                this.workspace.style.width = `${this.baseWidth}px`;
                this.workspace.style.height = `${this.baseHeight}px`;

                this.draftCanvas.width = this.baseWidth * this.dpr;
                this.draftCanvas.height = this.baseHeight * this.dpr;
                this.draftCanvas.style.width = '100%';
                this.draftCanvas.style.height = '100%';
                this.draftCtx.scale(this.dpr, this.dpr);
                this.draftCtx.lineCap = 'round';
                this.draftCtx.lineJoin = 'round';
            }

            // --- СИСТЕМА СЛОЕВ ---
            addLayer(name = `Слой ${this.layers.length}`) {
                const canvas = document.createElement('canvas');
                canvas.className = 'layer-canvas';
                canvas.id = `layer-${this.layerIdCounter}`;
                canvas.width = this.baseWidth * this.dpr;
                canvas.height = this.baseHeight * this.dpr;
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.scale(this.dpr, this.dpr);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // Если это самый первый слой (Фон) - заливаем белым
                if (this.layers.length === 0) {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, this.baseWidth, this.baseHeight);
                }

                this.layersContainer.appendChild(canvas);

                const layerObj = {
                    id: this.layerIdCounter++,
                    name: name,
                    canvas: canvas,
                    ctx: ctx,
                    visible: true
                };

                this.layers.push(layerObj);
                this.setActiveLayer(layerObj.id);
                this.renderLayersUI();
                return layerObj;
            }

            setActiveLayer(id) {
                this.activeLayer = this.layers.find(l => l.id === id);
                this.renderLayersUI();
            }

            renderLayersUI() {
                const list = document.getElementById('layersList');
                list.innerHTML = '';
                
                this.layers.forEach((layer) => {
                    const item = document.createElement('div');
                    item.className = `layer-item ${this.activeLayer.id === layer.id ? 'active' : ''}`;
                    item.onclick = () => this.setActiveLayer(layer.id);

                    const visBtn = document.createElement('button');
                    visBtn.className = 'layer-btn';
                    visBtn.innerHTML = layer.visible ? '<i class="ph ph-eye"></i>' : '<i class="ph ph-eye-slash"></i>';
                    visBtn.onclick = (e) => {
                        e.stopPropagation();
                        layer.visible = !layer.visible;
                        layer.canvas.style.display = layer.visible ? 'block' : 'none';
                        this.renderLayersUI();
                    };

                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = layer.name;

                    item.appendChild(visBtn);
                    item.appendChild(nameSpan);

                    // Кнопка удаления (кроме фона)
                    if (this.layers.length > 1 && layer.id !== this.layers[0].id) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'layer-btn';
                        delBtn.innerHTML = '<i class="ph ph-trash"></i>';
                        delBtn.onclick = (e) => {
                            e.stopPropagation();
                            this.deleteLayer(layer.id);
                        };
                        item.appendChild(delBtn);
                    }

                    list.appendChild(item);
                });
            }

            deleteLayer(id) {
                const index = this.layers.findIndex(l => l.id === id);
                if (index > -1) {
                    this.layers[index].canvas.remove();
                    this.layers.splice(index, 1);
                    if (this.activeLayer.id === id) {
                        this.setActiveLayer(this.layers[this.layers.length - 1].id);
                    } else {
                        this.renderLayersUI();
                    }
                    this.saveHistory();
                }
            }

            // --- НАВИГАЦИЯ (ZOOM & PAN) ---
            centerWorkspace() {
                const rect = this.container.getBoundingClientRect();
                // Рассчитываем масштаб, чтобы холст поместился в экран с отступами
                const scaleX = (rect.width - 40) / this.baseWidth;
                const scaleY = (rect.height - 100) / this.baseHeight; // Учитываем панели
                this.transform.scale = Math.min(scaleX, scaleY, 1);
                
                this.transform.x = (rect.width - this.baseWidth * this.transform.scale) / 2;
                this.transform.y = (rect.height - this.baseHeight * this.transform.scale) / 2;
                
                this.updateTransform();
            }

            updateTransform() {
                this.workspace.style.transform = `translate(${this.transform.x}px, ${this.transform.y}px) scale(${this.transform.scale})`;
            }

            handleWheel(e) {
                e.preventDefault();
                const zoomIntensity = 0.1;
                const wheel = e.deltaY < 0 ? 1 : -1;
                const zoomFactor = Math.exp(wheel * zoomIntensity);
                
                this.applyZoom(zoomFactor, e.clientX, e.clientY);
            }

            applyZoom(factor, clientX, clientY) {
                const rect = this.container.getBoundingClientRect();
                // Координаты мыши относительно контейнера
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                const newScale = Math.min(Math.max(0.1, this.transform.scale * factor), 5);
                const actualFactor = newScale / this.transform.scale;

                this.transform.x = x - (x - this.transform.x) * actualFactor;
                this.transform.y = y - (y - this.transform.y) * actualFactor;
                this.transform.scale = newScale;

                this.updateTransform();
            }

            // Преобразование координат экрана в координаты холста (магия матриц)
            getCanvasCoords(clientX, clientY) {
                const rect = this.workspace.getBoundingClientRect();
                // rect.left и rect.top уже включают в себя translate и scale!
                // Поэтому мы просто делим на масштаб, чтобы получить логические пиксели
                return {
                    x: (clientX - rect.left) / this.transform.scale,
                    y: (clientY - rect.top) / this.transform.scale
                };
            }

            // --- ЛОГИКА РИСОВАНИЯ И ИНСТРУМЕНТОВ ---
            handlePointerDown(e) {
                this.activePointers.set(e.pointerId, e);

                if (this.currentTool === 'hand' || this.activePointers.size === 2) {
                    this.isPanning = true;
                    this.isDrawing = false;
                    document.body.classList.add('tool-hand', 'dragging');
                    return;
                }

                if (this.activePointers.size === 1 && !this.isPanning) {
                    this.startDrawing(e);
                }
            }

            handlePointerMove(e) {
                if (this.activePointers.has(e.pointerId)) {
                    this.activePointers.set(e.pointerId, e);
                }

                // Логика Pan & Zoom (2 пальца) или Инструмент "Рука" (1 палец/мышь)
                if (this.isPanning) {
                    if (this.activePointers.size === 2) {
                        // Pinch to zoom (Щипок)
                        const pointers = Array.from(this.activePointers.values());
                        const p1 = pointers[0];
                        const p2 = pointers[1];
                        
                        const dist = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
                        const centerX = (p1.clientX + p2.clientX) / 2;
                        const centerY = (p1.clientY + p2.clientY) / 2;

                        if (this.initialPinchDist === null) {
                            this.initialPinchDist = dist;
                            this.lastCenterX = centerX;
                            this.lastCenterY = centerY;
                        } else {
                            const factor = dist / this.initialPinchDist;
                            this.applyZoom(factor, centerX, centerY);
                            
                            // Панорамирование при зуме
                            this.transform.x += (centerX - this.lastCenterX);
                            this.transform.y += (centerY - this.lastCenterY);
                            this.updateTransform();

                            this.initialPinchDist = dist;
                            this.lastCenterX = centerX;
                            this.lastCenterY = centerY;
                        }
                    } else if (this.currentTool === 'hand') {
                        // Просто перетаскивание одним пальцем/мышью
                        this.transform.x += e.movementX;
                        this.transform.y += e.movementY;
                        this.updateTransform();
                    }
                    return;
                }

                if (this.isDrawing) {
                    this.draw(e);
                }
            }

            handlePointerUp(e) {
                this.activePointers.delete(e.pointerId);
                
                if (this.activePointers.size < 2) {
                    this.initialPinchDist = null;
                }

                if (this.activePointers.size === 0) {
                    if (this.isPanning) {
                        this.isPanning = false;
                        document.body.classList.remove('dragging');
                        if (this.currentTool !== 'hand') {
                            document.body.classList.remove('tool-hand');
                        }
                    } else if (this.isDrawing) {
                        this.stopDrawing();
                    }
                }
            }

            startDrawing(e) {
                if (!this.activeLayer || !this.activeLayer.visible) return; // Нельзя рисовать на скрытом слое
                
                this.isDrawing = true;
                const { x, y } = this.getCanvasCoords(e.clientX, e.clientY);
                this.points = [{ x, y }];

                this.draftCtx.clearRect(0, 0, this.baseWidth, this.baseHeight);
                this.draftCtx.globalAlpha = this.opacity;

                if (this.currentTool === 'eraser') {
                    // Ластик работает прямо по активному слою, драфт не используем
                    this.activeLayer.ctx.globalCompositeOperation = 'destination-out';
                    this.activeLayer.ctx.globalAlpha = this.opacity;
                    this.activeLayer.ctx.lineWidth = this.lineWidth;
                } else if (this.currentTool === 'blur') {
                    // ПОДГОТОВКА ИНСТРУМЕНТА "РАЗМЫТИЕ" (МАГИЯ GPU)
                    // 1. Создаем скрытый холст и копируем на него текущий слой
                    if (!this.blurBuffer) {
                        this.blurBuffer = document.createElement('canvas');
                        this.blurBuffer.width = this.activeLayer.canvas.width;
                        this.blurBuffer.height = this.activeLayer.canvas.height;
                        this.blurCtx = this.blurBuffer.getContext('2d');
                    }
                    this.blurCtx.clearRect(0, 0, this.blurBuffer.width, this.blurBuffer.height);
                    
                    // 2. Применяем аппаратное размытие
                    this.blurCtx.filter = `blur(${Math.max(2, this.lineWidth / 2)}px)`;
                    this.blurCtx.drawImage(this.activeLayer.canvas, 0, 0);
                    this.blurCtx.filter = 'none';

                    // Подготавливаем драфт для отрисовки маски размытия
                    this.draftCtx.globalCompositeOperation = 'source-over';
                    this.draftCtx.strokeStyle = 'black'; // Цвет не важен, важна форма
                    this.draftCtx.lineCap = 'round';
                    this.draftCtx.lineJoin = 'round';
                    this.draftCtx.shadowBlur = this.lineWidth / 2; // Мягкие края кисти
                    this.draftCtx.shadowColor = 'black';
                } else {
                    // Обычная кисть
                    this.draftCtx.globalCompositeOperation = 'source-over';
                    this.draftCtx.strokeStyle = this.color;
                    this.draftCtx.shadowBlur = 0;
                }

                this.drawPoint(x, y);
            }

            drawPoint(x, y) {
                const ctx = this.currentTool === 'eraser' ? this.activeLayer.ctx : this.draftCtx;
                ctx.beginPath();
                ctx.arc(x, y, this.lineWidth / 2, 0, Math.PI * 2);
                ctx.fillStyle = this.currentTool === 'blur' ? 'black' : this.color;
                ctx.fill();
            }

            draw(e) {
                const { x, y } = this.getCanvasCoords(e.clientX, e.clientY);
                
                // Простой сглаживатель (Lerp)
                const last = this.points[this.points.length - 1];
                const targetX = last.x + (x - last.x) * 0.4;
                const targetY = last.y + (y - last.y) * 0.4;
                
                this.points.push({ x: targetX, y: targetY });

                const ctx = this.currentTool === 'eraser' ? this.activeLayer.ctx : this.draftCtx;
                
                if (this.currentTool !== 'eraser') {
                    this.draftCtx.clearRect(0, 0, this.baseWidth, this.baseHeight);
                }

                if (this.brushType === 'spray') {
    // === НОВАЯ КИСТЬ: БАЛОНЧИК (СПРЕЙ) ===
    const radius = this.lineWidth * 2;
    // Кидаем случайные точки вокруг курсора
    for (let i = 0; i < 20; i++) {
        const offsetX = (Math.random() * 2 - 1) * radius;
        const offsetY = (Math.random() * 2 - 1) * radius;
        ctx.fillStyle = this.color;
        ctx.fillRect(x + offsetX, y + offsetY, 2, 2); // Рисуем мелкие точки
    }
} 
else if (this.brushType === 'pixel') {
    // === НОВАЯ КИСТЬ: ПИКСЕЛЬНАЯ (8-BIT) ===
    // Без сглаживания, рисует грубые прямоугольники
    ctx.fillStyle = this.color;
    ctx.fillRect(x - this.lineWidth/2, y - this.lineWidth/2, this.lineWidth, this.lineWidth);
} 
else {
    // === ОБЫЧНАЯ ГЛАДКАЯ КИСТЬ (ваш старый код) ===
    ctx.lineWidth = this.lineWidth;
    ctx.beginPath();
    ctx.moveTo(this.points[0].x, this.points[0].y);
    
    for (let i = 1; i < this.points.length - 1; i++) {
        const midX = (this.points[i].x + this.points[i+1].x) / 2;
        const midY = (this.points[i].y + this.points[i+1].y) / 2;
        ctx.quadraticCurveTo(this.points[i].x, this.points[i].y, midX, midY);
    }
    const p = this.points[this.points.length - 1];
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
}
            }

            stopDrawing() {
                this.isDrawing = false;
                
                if (this.currentTool === 'brush') {
                    // Перенос кисти с драфта на активный слой
                    this.activeLayer.ctx.globalCompositeOperation = 'source-over';
                    this.activeLayer.ctx.globalAlpha = 1;
                    this.activeLayer.ctx.drawImage(this.draftCanvas, 0, 0, this.baseWidth, this.baseHeight);
                } 
                else if (this.currentTool === 'blur' && this.blurBuffer) {
                    // ПРИМЕНЕНИЕ МАСКИ РАЗМЫТИЯ
                    // Создаем временный холст для композитинга
                    const compCanvas = document.createElement('canvas');
                    compCanvas.width = this.blurBuffer.width;
                    compCanvas.height = this.blurBuffer.height;
                    const compCtx = compCanvas.getContext('2d');

                    // 1. Рисуем размытый фон
                    compCtx.drawImage(this.blurBuffer, 0, 0);
                    // 2. Оставляем пиксели ТОЛЬКО там, где нарисован драфт (маска кисти)
                    compCtx.globalCompositeOperation = 'destination-in';
                    compCtx.drawImage(this.draftCanvas, 0, 0);

                    // 3. СНАЧАЛА удаляем оригинальные резкие пиксели по форме нашей маски-кисти
this.activeLayer.ctx.globalCompositeOperation = 'destination-out';
this.activeLayer.ctx.globalAlpha = 1;
this.activeLayer.ctx.drawImage(this.draftCanvas, 0, 0, this.baseWidth, this.baseHeight);

// 4. ТЕПЕРЬ накладываем размытые пиксели ровно в образовавшуюся "дыру"
this.activeLayer.ctx.globalCompositeOperation = 'source-over';
this.activeLayer.ctx.globalAlpha = this.opacity;
this.activeLayer.ctx.drawImage(compCanvas, 0, 0, this.baseWidth, this.baseHeight);
                }

                // Очистка
                this.draftCtx.clearRect(0, 0, this.baseWidth, this.baseHeight);
                this.activeLayer.ctx.globalAlpha = 1;
                this.activeLayer.ctx.globalCompositeOperation = 'source-over';
                
                this.saveHistory();
            }

            // --- ИСТОРИЯ (UNDO) ---
            saveHistory() {
                // Сохраняем состояние только активного слоя для экономии памяти
                if (!this.activeLayer) return;
                
                // ФИКС: Блокируем создание снимка, если холст имеет размер 0
                const w = this.activeLayer.canvas.width;
                const h = this.activeLayer.canvas.height;
                if (w === 0 || h === 0) return;
                
                const imgData = this.activeLayer.ctx.getImageData(0, 0, w, h);
                
                this.history.push({
                    layerId: this.activeLayer.id,
                    data: imgData
                });

                if (this.history.length > this.maxHistory) {
                    this.history.shift();
                }
            }

            undo() {
                if (this.history.length > 1) {
                    this.history.pop(); // Удаляем текущее состояние
                    const prevState = this.history[this.history.length - 1];
                    
                    const layer = this.layers.find(l => l.id === prevState.layerId);
                    if (layer) {
                        layer.ctx.putImageData(prevState.data, 0, 0);
                    }
                }
            }

            // --- ЭКСПОРТ ---
            saveToImage() {
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = this.baseWidth * this.dpr;
                exportCanvas.height = this.baseHeight * this.dpr;
                const eCtx = exportCanvas.getContext('2d');

                // Сливаем все видимые слои снизу вверх
                this.layers.forEach(layer => {
                    if (layer.visible) {
                        eCtx.drawImage(layer.canvas, 0, 0);
                    }
                });

                const link = document.createElement('a');
                link.download = `ProDraw_${Date.now()}.png`;
                link.href = exportCanvas.toDataURL('image/png');
                link.click();
            }

            // --- ИНТЕРФЕЙС И СОБЫТИЯ ---
            bindUI() {
                const tools = document.querySelectorAll('.tool-btn[data-tool]');
                tools.forEach(btn => {
                    btn.onclick = () => {
                        tools.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentTool = btn.dataset.tool;
                        
                        document.body.className = ''; // Сброс курсоров
                        if (this.currentTool === 'hand') document.body.classList.add('tool-hand');
                    };
                });

                document.getElementById('colorPicker').oninput = (e) => this.color = e.target.value;
                document.getElementById('sizePicker').oninput = (e) => this.lineWidth = parseFloat(e.target.value);
                document.getElementById('opacityPicker').oninput = (e) => this.opacity = parseFloat(e.target.value);

                document.getElementById('btnUndo').onclick = () => this.undo();
                document.getElementById('btnSave').onclick = () => this.saveToImage();
                document.getElementById('btnAddLayer').onclick = () => this.addLayer();
                
                const layersPanel = document.getElementById('layersPanel');
                document.getElementById('btnToggleLayers').onclick = () => layersPanel.classList.toggle('hidden');

                // Навигация
                document.getElementById('btnZoomIn').onclick = () => this.applyZoom(1.5, this.container.clientWidth/2, this.container.clientHeight/2);
                document.getElementById('btnZoomOut').onclick = () => this.applyZoom(0.75, this.container.clientWidth/2, this.container.clientHeight/2);
                document.getElementById('btnZoomReset').onclick = () => this.centerWorkspace();
            }

            bindEvents() {
                // Колесико мыши = Zoom
                this.container.addEventListener('wheel', this.handleWheel.bind(this), { passive: false });

                // Pointer events (Мышь + Пальцы + Стилус)
                this.draftCanvas.addEventListener('pointerdown', this.handlePointerDown.bind(this));
                window.addEventListener('pointermove', this.handlePointerMove.bind(this));
                window.addEventListener('pointerup', this.handlePointerUp.bind(this));
                window.addEventListener('pointercancel', this.handlePointerUp.bind(this));

                // Предотвращение жестов браузера (назад/вперед свайпом)
                document.addEventListener('contextmenu', e => e.preventDefault());
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new DrawingApp();
        });
    </script>
</body>
<!-- PREMIUM CELESTIAL SEA NAV DOCK (Kanata x Gura Theme)                    -->

<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --primary-sky: #00E5FF;
    --primary-heaven: #a78bfa;
    --gold-halo: #FFE082;
    --deep-ocean: #081020;
    --neon-blue: #00f0ff;
    --neon-purple: #bd00ff;
    --font-sans: 'Plus Jakarta Sans', -apple-system, sans-serif;
  }

  /* Враппер плавающей кнопки */
  .fab-wrapper {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 999999;
    width: 68px;
    height: 68px;
    pointer-events: none;
    will-change: transform;
    filter: drop-shadow(0 10px 30px rgba(0, 229, 255, 0.25));
  }

  /* Основная круглая кнопка (Триггер) */
  .fab-button {
    pointer-events: auto;
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(20, 30, 55, 0.9) 0%, rgba(8, 12, 24, 0.95) 100%);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1.5px solid rgba(0, 229, 255, 0.3);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    box-shadow: 
      0 0 20px rgba(0, 229, 255, 0.15),
      inset 0 1px 2px rgba(255, 255, 255, 0.2);
    transition: 
      border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
      box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1),
      transform 0.2s ease;
    touch-action: none;
    overflow: visible;
  }

  .fab-button:active {
    cursor: grabbing;
    transform: scale(0.95);
  }

  /* Анимация и свечение при наведении */
  .fab-button:hover {
    border-color: var(--primary-sky);
    box-shadow: 
      0 0 30px rgba(0, 229, 255, 0.4),
      0 0 15px rgba(167, 139, 250, 0.3),
      inset 0 1px 4px rgba(255, 255, 255, 0.4);
  }

  /* Стилизация SVG Эмблемы (Нимб + Трезубец) */
  .emblem-svg {
    width: 110%;
    height: 110%;
    position: absolute;
    transform: scale(1);
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Вращение нимба Канаты */
  .emblem-halo {
    transform-origin: 50px 18px;
    animation: haloRotate 12s linear infinite;
  }

  /* Покачивание крыльев */
  .emblem-wings path {
    transform-origin: 50px 52px;
    animation: wingBreathe 4s ease-in-out infinite alternate;
  }

  .emblem-wings path:nth-child(even) {
    animation-delay: -2s;
  }

  @keyframes haloRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes wingBreathe {
    0% { transform: scale(0.96) rotate(-2deg); }
    100% { transform: scale(1.02) rotate(2deg); }
  }

  /* Эффект при открытом состоянии */
  .fab-wrapper.open .fab-button {
    border-color: var(--primary-heaven);
    box-shadow: 0 0 40px rgba(167, 139, 250, 0.5);
  }

  .fab-wrapper.open .emblem-svg {
    transform: rotate(45deg) scale(0.9);
  }

  /* Глобальный Док навигации */
  .global-dock {
    position: absolute;
    top: 50%;
    right: calc(100% + 20px);
    transform: translateY(-50%) scale(0.9) translateX(30px);
    transform-origin: right center;

    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(6, 11, 25, 0.75);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid rgba(0, 229, 255, 0.15);
    border-radius: 24px;
    box-shadow: 
      0 30px 60px rgba(0, 4, 16, 0.8),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);

    max-width: calc(100vw - 120px);
    overflow-x: auto;
    scrollbar-width: none;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: 
      transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
      opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
      visibility 0.4s;
  }

  .global-dock::-webkit-scrollbar { display: none; }

  /* Фоновый интерактивный холст */
  .dock-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 24px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* Позиционирование выезжающих панелей */
  .fab-wrapper.open .global-dock {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateY(-50%) scale(1) translateX(0);
  }

  .fab-wrapper.is-left .global-dock {
    right: auto;
    left: calc(100% + 20px);
    transform-origin: left center;
    transform: translateY(-50%) scale(0.9) translateX(-30px);
  }
  .fab-wrapper.is-left.open .global-dock {
    transform: translateY(-50%) scale(1) translateX(0);
  }

  .fab-wrapper.is-up .global-dock {
    flex-direction: column;
    right: 50%;
    top: auto;
    bottom: calc(100% + 20px);
    transform-origin: bottom center;
    transform: translateX(50%) scale(0.9) translateY(30px);
    max-height: calc(100vh - 120px);
    max-width: none;
    overflow-y: auto;
  }
  .fab-wrapper.is-up.open .global-dock {
    transform: translateX(50%) scale(1) translateY(0);
  }

  .fab-wrapper.is-down .global-dock {
    flex-direction: column;
    right: 50%;
    bottom: auto;
    top: calc(100% + 20px);
    transform-origin: top center;
    transform: translateX(50%) scale(0.9) translateY(-30px);
    max-height: calc(100vh - 120px);
    max-width: none;
    overflow-y: auto;
  }
  .fab-wrapper.is-down.open .global-dock {
    transform: translateX(50%) scale(1) translateY(0);
  }

  /* Элементы меню навигации */
  .dock-item {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 10px 16px;
    border-radius: 14px;
    color: rgba(255, 255, 255, 0.65);
    text-decoration: none;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    white-space: nowrap;
    border: 1px solid transparent;
  }

  /* Эффект наведения с деформацией глитча */
  .dock-item:hover {
    color: #fff;
    background: rgba(0, 229, 255, 0.08);
    border-color: rgba(0, 229, 255, 0.2);
    box-shadow: 0 4px 15px rgba(0, 229, 255, 0.1);
    filter: url(#glitch-distortion);
  }

  .dock-item.active {
    color: #fff;
    background: rgba(167, 139, 250, 0.15);
    border-color: rgba(167, 139, 250, 0.3);
    box-shadow: 
      0 4px 20px rgba(167, 139, 250, 0.2),
      inset 0 0 12px rgba(167, 139, 250, 0.1);
  }

  /* Стилизация иконок */
  .dock-icon-wrapper {
    position: relative;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dock-icon {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 4px rgba(0, 229, 255, 0.4));
    pointer-events: none;
    user-select: none;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .dock-item:hover .dock-icon {
    transform: scale(1.18) rotate(5deg);
  }

  .dock-text {
    font-family: 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  /* Хвост-индикатор для активного пункта */
  .dock-item.active::after {
    content: "";
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 3px;
    background: var(--primary-heaven);
    border-radius: 4px;
    box-shadow: 0 0 8px var(--primary-heaven);
  }

  /* Адаптивность для мобильных экранов */
  @media (max-width: 768px) {
    .fab-wrapper {
      bottom: 20px;
      right: 20px;
      width: 58px;
      height: 58px;
    }
    
    .global-dock {
      padding: 8px;
      gap: 6px;
      border-radius: 20px;
      max-width: calc(100vw - 80px);
    }

    .dock-canvas {
      border-radius: 20px;
    }

    .dock-item {
      padding: 10px;
      border-radius: 12px;
    }

    .dock-text {
      display: none;
    }

    .dock-icon {
      width: 26px;
      height: 26px;
    }

    .dock-item.active::after {
      bottom: -1px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .emblem-halo, .emblem-wings path {
      animation: none !important;
    }
    .fab-wrapper, .global-dock {
      transition: none !important;
    }
  }
</style>

<!-- FRONTEND ENGINE (JavaScript)                                           -->

<script>
  /**
   * Контроллер глитч-эффектов на основе деформации SVG.
   */
  class GlitchEngine {
    constructor() {
      this.map = document.getElementById('displacement-map');
      this.isGlitching = false;
    }

    trigger() {
      if (this.isGlitching) return;
      this.isGlitching = true;
      let start = null;

      const animate = (timestamp) => {
        if (!start) start = timestamp;
        const progress = timestamp - start;

        if (progress < 150) {
          // Интенсивный глитч на взлете
          const scale = Math.sin(progress * 0.1) * 14;
          this.map.setAttribute('scale', Math.abs(scale));
          requestAnimationFrame(animate);
        } else {
          this.map.setAttribute('scale', '0');
          this.isGlitching = false;
        }
      };

      requestAnimationFrame(animate);
    }
  }

  /**
   * Procedural Dynamic Canvas Background.
   * Отрисовывает звездное небо Канаты и морские глубины Гуры в реальном времени.
   */
  class CanvasBackground {
    constructor(canvasId) {
      this.canvas = document.getElementById(canvasId);
      this.ctx = this.canvas.getContext('2d');
      this.stars = [];
      this.time = 0;
      this.dpr = window.devicePixelRatio || 1;

      this.resize();
      this.initStars();
      this.animate = this.animate.bind(this);
      requestAnimationFrame(this.animate);
    }

    resize() {
      const parent = this.canvas.parentElement;
      this.width = parent.offsetWidth;
      this.height = parent.offsetHeight;
      this.canvas.width = this.width * this.dpr;
      this.canvas.height = this.height * this.dpr;
      this.ctx.scale(this.dpr, this.dpr);
    }

    initStars() {
      this.stars = Array.from({ length: 15 }, () => ({
        x: Math.random() * this.width,
        y: Math.random() * this.height,
        size: Math.random() * 1.5 + 0.5,
        alpha: Math.random(),
        speed: 0.01 + Math.random() * 0.02
      }));
    }

    animate() {
      this.time += 0.02;
      this.ctx.clearRect(0, 0, this.width, this.height);

      // 1. Рисуем космические звезды (Небеса)
      this.stars.forEach(star => {
        star.alpha += star.speed;
        if (star.alpha > 1 || star.alpha < 0) star.speed = -star.speed;
        this.ctx.fillStyle = `rgba(167, 139, 250, ${Math.max(0, star.alpha)})`;
        this.ctx.beginPath();
        this.ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        this.ctx.fill();
      });

      // 2. Рисуем интерактивные синусоидальные волны (Океан)
      this.ctx.strokeStyle = 'rgba(0, 229, 255, 0.12)';
      this.ctx.lineWidth = 1.5;
      this.ctx.beginPath();
      for (let x = 0; x <= this.width; x += 5) {
        const y = this.height * 0.8 + Math.sin(x * 0.05 + this.time) * 4;
        if (x === 0) this.ctx.moveTo(x, y);
        else this.ctx.lineTo(x, y);
      }
      this.ctx.stroke();

      requestAnimationFrame(this.animate);
    }
  }

  /**
   * Главный движок управления док-панелью.
   */
   class CelestialSeaDock {
    constructor() {
      this.wrapper = document.getElementById("fabWrapper");
      this.btn = document.getElementById("fabToggleBtn");
      this.dock = document.getElementById("globalDock");

      // Безопасно связываем с глобальным аудио-движком терминала
      this.synth = window.sound || { playChime() {}, playBubble() {} }; 
      
      this.glitch = new GlitchEngine();
      this.bg = new CanvasBackground("dockCanvas");
      // ...

      // Физика Lerp (сглаживание перемещения)
      this.pos = { currentX: 0, currentY: 0, targetX: 0, targetY: 0 };
      this.isDragging = false;
      this.hasMoved = false;
      this.dragOffset = { x: 0, y: 0 };

      this.initEvents();
      this.initActiveLink();
      this.snapToInitial();
    }

    snapToInitial() {
      // Инициализируем стартовую позицию в правом нижнем углу
      const initialX = window.innerWidth - 98; // 30px offset + 68px width
      const initialY = window.innerHeight - 98;
      this.pos.currentX = this.pos.targetX = initialX;
      this.pos.currentY = this.pos.targetY = initialY;
      this.updateDOMPosition();
    }

    initActiveLink() {
      let path = window.location.pathname.split("/").pop();
      if (!path) path = "index.html";
      document.querySelectorAll(".dock-item").forEach(item => {
        if (item.getAttribute("href") === path) {
          item.classList.add("active");
        }
      });
    }

    initEvents() {
      // Клик по кнопке
      this.btn.addEventListener("click", (e) => {
        if (this.hasMoved) {
          e.preventDefault();
          return;
        }
        this.toggleDock();
      });

      // Drag events
      this.btn.addEventListener("mousedown", (e) => this.dragStart(e));
      this.btn.addEventListener("touchstart", (e) => this.dragStart(e), { passive: true });

      window.addEventListener("mousemove", (e) => this.dragMove(e));
      window.addEventListener("touchmove", (e) => this.dragMove(e), { passive: false });

      window.addEventListener("mouseup", () => this.dragEnd());
      window.addEventListener("touchend", () => this.dragEnd());

      // Закрытие по клику вне
      document.addEventListener("click", (e) => {
        if (!this.wrapper.contains(e.target) && this.wrapper.classList.contains("open")) {
          this.wrapper.classList.remove("open");
          this.synth.playBubble();
        }
      });

      // Resize observer
      window.addEventListener("resize", () => {
        this.bg.resize();
        this.keepInBounds();
      });

      // Глитч при наведении на пункты меню
      document.querySelectorAll('.dock-item').forEach(item => {
        item.addEventListener('mouseenter', () => {
          this.glitch.trigger();
          this.synth.playChime();
        });
      });
    }

    toggleDock() {
      this.updateDockDirection();
      const isOpen = this.wrapper.classList.toggle("open");
      if (isOpen) {
        this.synth.playChime();
      } else {
        this.synth.playBubble();
      }
    }

    dragStart(e) {
      this.isDragging = true;
      this.hasMoved = false;

      // Получаем текущие координаты из объекта положения
      const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
      const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;

      this.dragOffset.x = clientX - this.pos.currentX;
      this.dragOffset.y = clientY - this.pos.currentY;

      this.wrapper.style.willChange = "transform";
    }

    dragMove(e) {
      if (!this.isDragging) return;

      const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
      const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;

      const targetX = clientX - this.dragOffset.x;
      const targetY = clientY - this.dragOffset.y;

      // Лимиты экрана
      const maxLeft = window.innerWidth - this.wrapper.offsetWidth;
      const maxTop = window.innerHeight - this.wrapper.offsetHeight;

      this.pos.targetX = Math.max(0, Math.min(targetX, maxLeft));
      this.pos.targetY = Math.max(0, Math.min(targetY, maxTop));

      if (Math.abs(this.pos.targetX - this.pos.currentX) > 4 || Math.abs(this.pos.targetY - this.pos.currentY) > 4) {
        this.hasMoved = true;
        if (e.cancelable) e.preventDefault();
      }

      this.updatePhysics();
    }

    dragEnd() {
      if (!this.isDragging) return;
      this.isDragging = false;
      this.wrapper.style.willChange = "auto";
      this.keepInBounds();
    }

    /**
     * Сглаживание движения с использованием LERP (Linear Interpolation).
     * Дает благородное "тяжелое" скольжение виджета.
     */
    updatePhysics() {
      if (!this.isDragging && Math.abs(this.pos.targetX - this.pos.currentX) < 0.1 && Math.abs(this.pos.targetY - this.pos.currentY) < 0.1) {
        return;
      }

      const lerpFactor = this.isDragging ? 0.25 : 0.15;
      this.pos.currentX += (this.pos.targetX - this.pos.currentX) * lerpFactor;
      this.pos.currentY += (this.pos.targetY - this.pos.currentY) * lerpFactor;

      this.updateDOMPosition();
      this.updateDockDirection();

      if (this.isDragging) {
        requestAnimationFrame(() => this.updatePhysics());
      }
    }

    updateDOMPosition() {
      this.wrapper.style.left = `${this.pos.currentX}px`;
      this.wrapper.style.top = `${this.pos.currentY}px`;
      this.wrapper.style.bottom = "auto";
      this.wrapper.style.right = "auto";
    }

    updateDockDirection() {
      const rect = this.wrapper.getBoundingClientRect();
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      this.wrapper.classList.remove("is-left", "is-up", "is-down");

      const dockWidth = this.dock.scrollWidth;
      const gap = 20;

      const spaceLeft = rect.left;
      const spaceRight = screenWidth - rect.right;
      const spaceTop = rect.top;
      const spaceBottom = screenHeight - rect.bottom;

      if (spaceRight >= dockWidth + gap) {
        this.wrapper.classList.add("is-left"); // Открывается вправо
      } else if (spaceLeft < dockWidth + gap) {
        // Вертикальный фоллбек, если по бокам места нет
        if (spaceTop > spaceBottom) {
          this.wrapper.classList.add("is-up");
        } else {
          this.wrapper.classList.add("is-down");
        }
      }
    }

    keepInBounds() {
      const maxLeft = window.innerWidth - this.wrapper.offsetWidth;
      const maxTop = window.innerHeight - this.wrapper.offsetHeight;

      this.pos.targetX = Math.max(10, Math.min(this.pos.targetX, maxLeft - 10));
      this.pos.targetY = Math.max(10, Math.min(this.pos.targetY, maxTop - 10));
      
      this.updatePhysics();
    }
  }

  // Запуск интерфейса после загрузки DOM
  document.addEventListener("DOMContentLoaded", () => {
    window.celestialSea = new CelestialSeaDock();
  });
</script>
