<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kling Image V3 Generator</title>
    <style>
        /* Базовые стили и переменные */
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --error-color: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Шапка с API ключом */
        header { background-color: var(--panel-bg); padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; z-index: 10;}
        header h1 { font-size: 1.2rem; font-weight: 600; }
        .api-key-container { display: flex; align-items: center; gap: 10px; }
        .api-key-container input { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); width: 300px; outline: none; }

        /* Основная разметка (Сетка) */
        .main-container { display: flex; flex: 1; height: calc(100vh - 60px); }

        /* Боковая панель (Настройки) */
        .sidebar { width: 350px; background-color: var(--panel-bg); padding: 20px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.9rem; font-weight: 500; color: #cbd5e1; }
        .form-group textarea, .form-group select, .form-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); outline: none; transition: border 0.3s; }
        .form-group textarea:focus, .form-group select:focus { border-color: var(--accent-color); }
        .form-group textarea { resize: vertical; min-height: 100px; }

        /* Кнопка генерации */
        .generate-btn { background-color: var(--accent-color); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s, transform 0.1s; margin-top: 10px; }
        .generate-btn:hover { background-color: var(--accent-hover); }
        .generate-btn:active { transform: scale(0.98); }
        .generate-btn:disabled { background-color: var(--border-color); cursor: not-allowed; color: #94a3b8; }

        /* Область просмотра результата */
        .preview-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
        .result-image { max-width: 100%; max-height: 100%; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); display: none; object-fit: contain; }
        
        .placeholder { color: #64748b; font-size: 1.2rem; text-align: center; }
        .status-text { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; display: none; }

        /* Лоадер */
        .loader { display: none; border: 4px solid var(--border-color); border-top: 4px solid var(--accent-color); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; position: absolute; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Адаптивность для телефонов */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); height: auto; }
            .preview-area { min-height: 50vh; }
            .api-key-container input { width: 150px; }
            body { overflow: auto; height: auto; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Kling Image V3</h1>
        <div class="api-key-container">
            <label for="apiKey">API Key:</label>
            <input type="password" id="apiKey" value="ВАШ КЛЮЧ">
        </div>
    </header>

    <div class="main-container">
        <!-- Панель управления -->
        <aside class="sidebar">
            <div class="form-group">
                <label for="prompt">Промпт (Описание изображения)*</label>
                <textarea id="prompt" placeholder="Например: Переход к глубокой зиме, сильный снегопад..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="negativePrompt">Негативный промпт (Что исключить)</label>
                <textarea id="negativePrompt" placeholder="плохое качество, размытость..." style="min-height: 60px;"></textarea>
            </div>

            <div class="form-group">
                <label for="aspectRatio">Соотношение сторон</label>
                <select id="aspectRatio">
                    <option value="16:9" selected>16:9 (Широкий)</option>
                    <option value="9:16">9:16 (Вертикальный)</option>
                    <option value="1:1">1:1 (Квадрат)</option>
                    <option value="3:2">3:2</option>
                    <option value="2:3">2:3</option>
                </select>
            </div>

            <div class="form-group">
                <label for="resolution">Разрешение</label>
                <select id="resolution">
                    <option value="1K" selected>1K</option>
                    <option value="2K">2K</option>
                </select>
            </div>

            <div class="form-group">
                <label for="format">Формат изображения</label>
                <select id="format">
                    <option value="webp" selected>WebP</option>
                    <option value="png">PNG</option>
                    <option value="jpg">JPG</option>
                </select>
            </div>

            <button class="generate-btn" id="generateBtn" onclick="generateImage()">Сгенерировать</button>
        </aside>

        <!-- Область предпросмотра -->
        <main class="preview-area">
            <div class="placeholder" id="placeholder">Здесь появится ваше изображение</div>
            <div class="loader" id="loader"></div>
            <img id="resultImage" class="result-image" alt="Generated Output">
            <div class="status-text" id="statusText">Идет генерация...</div>
        </main>
    </div>

    <script>
        // Элементы DOM
        const promptInput = document.getElementById('prompt');
        const negativePromptInput = document.getElementById('negativePrompt');
        const aspectRatioSelect = document.getElementById('aspectRatio');
        const resolutionSelect = document.getElementById('resolution');
        const formatSelect = document.getElementById('format');
        const apiKeyInput = document.getElementById('apiKey');
        const generateBtn = document.getElementById('generateBtn');
        const resultImage = document.getElementById('resultImage');
        const placeholder = document.getElementById('placeholder');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('statusText');

        // URL для API
        const API_URL = 'https://api.gen-api.ru/api/v1/networks/kling-image-v3';

        // Главная функция генерации
        async function generateImage() {
            const prompt = promptInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!prompt) {
                alert('Пожалуйста, введите промпт!');
                return;
            }
            if (!apiKey) {
                alert('Пожалуйста, укажите API ключ!');
                return;
            }

            // Настройка UI перед запросом
            setLoadingState(true);

            // Собираем тело запроса
            const payload = {
                prompt: prompt,
                negative_prompt: negativePromptInput.value.trim() || undefined,
                aspect_ratio: aspectRatioSelect.value,
                resolution: resolutionSelect.value,
                output_format: formatSelect.value,
                num_images: 1,
                is_sync: true, // Просим API вернуть результат синхронно
                translate_input: true
            };

            try {
                // ВНИМАНИЕ: Используем POST, так как GET не поддерживает Body в fetch()
                const response = await fetch(API_URL, {
                    method: 'POST', 
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.message || `Ошибка сервера: ${response.status}`);
                }

                const data = await response.json();

                // Обработка ответа
                if (data.status === 'success' && data.output) {
                    // Если API вернуло картинку сразу
                    displayResult(data.output);
                } else if (data.request_id && (data.status === 'starting' || data.status === 'processing')) {
                    // Если API игнорирует is_sync: true и возвращает ID задачи, начинаем Long Polling
                    statusText.innerText = "Задача принята в очередь. Ожидание...";
                    await pollResult(data.request_id, apiKey);
                } else {
                    throw new Error('Неизвестный формат ответа от сервера');
                }

            } catch (error) {
                console.error(error);
                alert(`Произошла ошибка: ${error.message}`);
                setLoadingState(false);
            }
        }

        // Функция опроса сервера (Long Polling), если is_sync не сработает
        async function pollResult(requestId, apiKey) {
            // URL для проверки статуса (стандартный паттерн для таких API)
            const pollUrl = `https://api.gen-api.ru/api/v1/requests/${requestId}`;
            
            const pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(pollUrl, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        }
                    });

                    const data = await response.json();
                    
                    if (data.status === 'success' && data.output) {
                        clearInterval(pollInterval);
                        displayResult(data.output);
                    } else if (data.status === 'failed' || data.status === 'error') {
                        clearInterval(pollInterval);
                        throw new Error('Ошибка при генерации на стороне сервера');
                    } else {
                        statusText.innerText = `Генерация в процессе (${data.status})...`;
                    }
                } catch (error) {
                    clearInterval(pollInterval);
                    alert(`Ошибка при проверке статуса: ${error.message}`);
                    setLoadingState(false);
                }
            }, 3000); // Проверяем каждые 3 секунды
        }

        // Вывод изображения на экран
        function displayResult(output) {
            // Output может быть строкой(URL) или массивом
            const imageUrl = Array.isArray(output) ? output[0] : output;
            
            resultImage.src = imageUrl;
            resultImage.style.display = 'block';
            
            setLoadingState(false);
            placeholder.style.display = 'none';
        }

        // Управление состояниями UI (Загрузка / Обычное)
        function setLoadingState(isLoading) {
            if (isLoading) {
                generateBtn.disabled = true;
                generateBtn.innerText = 'Генерация...';
                loader.style.display = 'block';
                statusText.style.display = 'block';
                statusText.innerText = 'Отправка запроса...';
                resultImage.style.display = 'none';
                placeholder.style.display = 'none';
            } else {
                generateBtn.disabled = false;
                generateBtn.innerText = 'Сгенерировать';
                loader.style.display = 'none';
                statusText.style.display = 'none';
                if (!resultImage.src) {
                    placeholder.style.display = 'block';
                }
            }
        }
    </script>
</body>
<!-- PREMIUM CELESTIAL SEA NAV DOCK (Kanata x Gura Theme)                    -->
<!-- ======================================================================= -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --primary-sky: #00E5FF;
    --primary-heaven: #a78bfa;
    --gold-halo: #FFE082;
    --deep-ocean: #081020;
    --neon-blue: #00f0ff;
    --neon-purple: #bd00ff;
    --font-sans: 'Plus Jakarta Sans', -apple-system, sans-serif;
  }

  /* Враппер плавающей кнопки */
  .fab-wrapper {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 999999;
    width: 68px;
    height: 68px;
    pointer-events: none;
    will-change: transform;
    filter: drop-shadow(0 10px 30px rgba(0, 229, 255, 0.25));
  }

  /* Основная круглая кнопка (Триггер) */
  .fab-button {
    pointer-events: auto;
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(20, 30, 55, 0.9) 0%, rgba(8, 12, 24, 0.95) 100%);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1.5px solid rgba(0, 229, 255, 0.3);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    box-shadow: 
      0 0 20px rgba(0, 229, 255, 0.15),
      inset 0 1px 2px rgba(255, 255, 255, 0.2);
    transition: 
      border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
      box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1),
      transform 0.2s ease;
    touch-action: none;
    overflow: visible;
  }

  .fab-button:active {
    cursor: grabbing;
    transform: scale(0.95);
  }

  /* Анимация и свечение при наведении */
  .fab-button:hover {
    border-color: var(--primary-sky);
    box-shadow: 
      0 0 30px rgba(0, 229, 255, 0.4),
      0 0 15px rgba(167, 139, 250, 0.3),
      inset 0 1px 4px rgba(255, 255, 255, 0.4);
  }

  /* Стилизация SVG Эмблемы (Нимб + Трезубец) */
  .emblem-svg {
    width: 110%;
    height: 110%;
    position: absolute;
    transform: scale(1);
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Вращение нимба Канаты */
  .emblem-halo {
    transform-origin: 50px 18px;
    animation: haloRotate 12s linear infinite;
  }

  /* Покачивание крыльев */
  .emblem-wings path {
    transform-origin: 50px 52px;
    animation: wingBreathe 4s ease-in-out infinite alternate;
  }

  .emblem-wings path:nth-child(even) {
    animation-delay: -2s;
  }

  @keyframes haloRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes wingBreathe {
    0% { transform: scale(0.96) rotate(-2deg); }
    100% { transform: scale(1.02) rotate(2deg); }
  }

  /* Эффект при открытом состоянии */
  .fab-wrapper.open .fab-button {
    border-color: var(--primary-heaven);
    box-shadow: 0 0 40px rgba(167, 139, 250, 0.5);
  }

  .fab-wrapper.open .emblem-svg {
    transform: rotate(45deg) scale(0.9);
  }

  /* Глобальный Док навигации */
  .global-dock {
    position: absolute;
    top: 50%;
    right: calc(100% + 20px);
    transform: translateY(-50%) scale(0.9) translateX(30px);
    transform-origin: right center;

    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(6, 11, 25, 0.75);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid rgba(0, 229, 255, 0.15);
    border-radius: 24px;
    box-shadow: 
      0 30px 60px rgba(0, 4, 16, 0.8),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);

    max-width: calc(100vw - 120px);
    overflow-x: auto;
    scrollbar-width: none;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: 
      transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
      opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
      visibility 0.4s;
  }

  .global-dock::-webkit-scrollbar { display: none; }

  /* Фоновый интерактивный холст */
  .dock-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 24px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* Позиционирование выезжающих панелей */
  .fab-wrapper.open .global-dock {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateY(-50%) scale(1) translateX(0);
  }

  .fab-wrapper.is-left .global-dock {
    right: auto;
    left: calc(100% + 20px);
    transform-origin: left center;
    transform: translateY(-50%) scale(0.9) translateX(-30px);
  }
  .fab-wrapper.is-left.open .global-dock {
    transform: translateY(-50%) scale(1) translateX(0);
  }

  .fab-wrapper.is-up .global-dock {
    flex-direction: column;
    right: 50%;
    top: auto;
    bottom: calc(100% + 20px);
    transform-origin: bottom center;
    transform: translateX(50%) scale(0.9) translateY(30px);
    max-height: calc(100vh - 120px);
    max-width: none;
    overflow-y: auto;
  }
  .fab-wrapper.is-up.open .global-dock {
    transform: translateX(50%) scale(1) translateY(0);
  }

  .fab-wrapper.is-down .global-dock {
    flex-direction: column;
    right: 50%;
    bottom: auto;
    top: calc(100% + 20px);
    transform-origin: top center;
    transform: translateX(50%) scale(0.9) translateY(-30px);
    max-height: calc(100vh - 120px);
    max-width: none;
    overflow-y: auto;
  }
  .fab-wrapper.is-down.open .global-dock {
    transform: translateX(50%) scale(1) translateY(0);
  }

  /* Элементы меню навигации */
  .dock-item {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 10px 16px;
    border-radius: 14px;
    color: rgba(255, 255, 255, 0.65);
    text-decoration: none;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    white-space: nowrap;
    border: 1px solid transparent;
  }

  /* Эффект наведения с деформацией глитча */
  .dock-item:hover {
    color: #fff;
    background: rgba(0, 229, 255, 0.08);
    border-color: rgba(0, 229, 255, 0.2);
    box-shadow: 0 4px 15px rgba(0, 229, 255, 0.1);
    filter: url(#glitch-distortion);
  }

  .dock-item.active {
    color: #fff;
    background: rgba(167, 139, 250, 0.15);
    border-color: rgba(167, 139, 250, 0.3);
    box-shadow: 
      0 4px 20px rgba(167, 139, 250, 0.2),
      inset 0 0 12px rgba(167, 139, 250, 0.1);
  }

  /* Стилизация иконок */
  .dock-icon-wrapper {
    position: relative;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dock-icon {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 4px rgba(0, 229, 255, 0.4));
    pointer-events: none;
    user-select: none;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .dock-item:hover .dock-icon {
    transform: scale(1.18) rotate(5deg);
  }

  .dock-text {
    font-family: 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  /* Хвост-индикатор для активного пункта */
  .dock-item.active::after {
    content: "";
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 3px;
    background: var(--primary-heaven);
    border-radius: 4px;
    box-shadow: 0 0 8px var(--primary-heaven);
  }

  /* Адаптивность для мобильных экранов */
  @media (max-width: 768px) {
    .fab-wrapper {
      bottom: 20px;
      right: 20px;
      width: 58px;
      height: 58px;
    }
    
    .global-dock {
      padding: 8px;
      gap: 6px;
      border-radius: 20px;
      max-width: calc(100vw - 80px);
    }

    .dock-canvas {
      border-radius: 20px;
    }

    .dock-item {
      padding: 10px;
      border-radius: 12px;
    }

    .dock-text {
      display: none;
    }

    .dock-icon {
      width: 26px;
      height: 26px;
    }

    .dock-item.active::after {
      bottom: -1px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .emblem-halo, .emblem-wings path {
      animation: none !important;
    }
    .fab-wrapper, .global-dock {
      transition: none !important;
    }
  }
</style>

<!-- SVG Фильтры глитча и деформации воды -->
<svg style="position: absolute; width: 0; height: 0;" width="0" height="0">
  <defs>
    <filter id="glitch-distortion">
      <feTurbulence type="fractalNoise" baseFrequency="0.08 0.85" numOctaves="1" result="wave" />
      <feDisplacementMap in="SourceGraphic" in2="wave" scale="0" xChannelSelector="R" yChannelSelector="G" id="displacement-map" />
    </filter>
  </defs>
</svg>

<div class="fab-wrapper" id="fabWrapper">
  <!-- Кнопка-герб с Нимбом Канаты и Трезубцем Гуры -->
  <button class="fab-button" id="fabToggleBtn" title="Навигация" aria-label="Открыть меню навигации">
    <svg class="emblem-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Золотой градиент Нимба -->
        <linearGradient id="haloGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FFE57F" />
          <stop offset="100%" stop-color="#FFC107" />
        </linearGradient>
        <!-- Сине-бирюзовый градиент Трезубца -->
        <linearGradient id="tridentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00E5FF" />
          <stop offset="100%" stop-color="#0057b8" />
        </linearGradient>
        <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3.5" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />

<!-- FRONTEND ENGINE (JavaScript)                                           -->

<script>
  /**
   * Контроллер глитч-эффектов на основе деформации SVG.
   */
  class GlitchEngine {
    constructor() {
      this.map = document.getElementById('displacement-map');
      this.isGlitching = false;
    }

    trigger() {
      if (this.isGlitching) return;
      this.isGlitching = true;
      let start = null;

      const animate = (timestamp) => {
        if (!start) start = timestamp;
        const progress = timestamp - start;

        if (progress < 150) {
          // Интенсивный глитч на взлете
          const scale = Math.sin(progress * 0.1) * 14;
          this.map.setAttribute('scale', Math.abs(scale));
          requestAnimationFrame(animate);
        } else {
          this.map.setAttribute('scale', '0');
          this.isGlitching = false;
        }
      };

      requestAnimationFrame(animate);
    }
  }

  /**
   * Procedural Dynamic Canvas Background.
   * Отрисовывает звездное небо Канаты и морские глубины Гуры в реальном времени.
   */
  class CanvasBackground {
    constructor(canvasId) {
      this.canvas = document.getElementById(canvasId);
      this.ctx = this.canvas.getContext('2d');
      this.stars = [];
      this.time = 0;
      this.dpr = window.devicePixelRatio || 1;

      this.resize();
      this.initStars();
      this.animate = this.animate.bind(this);
      requestAnimationFrame(this.animate);
    }

    resize() {
      const parent = this.canvas.parentElement;
      this.width = parent.offsetWidth;
      this.height = parent.offsetHeight;
      this.canvas.width = this.width * this.dpr;
      this.canvas.height = this.height * this.dpr;
      this.ctx.scale(this.dpr, this.dpr);
      
      // Перегенерируем звезды, чтобы они гармонично заполнили новые границы экрана
      this.initStars();
    }

    initStars() {
      this.stars = Array.from({ length: 15 }, () => ({
        x: Math.random() * this.width,
        y: Math.random() * this.height,
        size: Math.random() * 1.5 + 0.5,
        alpha: Math.random(),
        speed: 0.01 + Math.random() * 0.02
      }));
    }

    animate() {
      this.time += 0.02;
      this.ctx.clearRect(0, 0, this.width, this.height);

      // 1. Рисуем космические звезды (Небеса)
      this.stars.forEach(star => {
        star.alpha += star.speed;
        if (star.alpha > 1 || star.alpha < 0) star.speed = -star.speed;
        this.ctx.fillStyle = `rgba(167, 139, 250, ${Math.max(0, star.alpha)})`;
        this.ctx.beginPath();
        this.ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        this.ctx.fill();
      });

      // 2. Рисуем интерактивные синусоидальные волны (Океан)
      this.ctx.strokeStyle = 'rgba(0, 229, 255, 0.12)';
      this.ctx.lineWidth = 1.5;
      this.ctx.beginPath();
      for (let x = 0; x <= this.width; x += 5) {
        const y = this.height * 0.8 + Math.sin(x * 0.05 + this.time) * 4;
        if (x === 0) this.ctx.moveTo(x, y);
        else this.ctx.lineTo(x, y);
      }
      this.ctx.stroke();

      requestAnimationFrame(this.animate);
    }
  }

  /**
   * Главный движок управления док-панелью.
   */
   class CelestialSeaDock {
    constructor() {
      this.wrapper = document.getElementById("fabWrapper");
      this.btn = document.getElementById("fabToggleBtn");
      this.dock = document.getElementById("globalDock");

      // Безопасно связываем с глобальным аудио-движком терминала
      this.synth = window.sound || { playChime() {}, playBubble() {} }; 
      
      this.glitch = new GlitchEngine();
      this.bg = new CanvasBackground("dockCanvas");
      // ...

      // Физика Lerp (сглаживание перемещения)
      this.pos = { currentX: 0, currentY: 0, targetX: 0, targetY: 0 };
      this.isDragging = false;
      this.hasMoved = false;
      this.dragOffset = { x: 0, y: 0 };

      this.initEvents();
      this.initActiveLink();
      this.snapToInitial();
    }

    snapToInitial() {
      // Инициализируем стартовую позицию в правом нижнем углу
      const initialX = window.innerWidth - 98; // 30px offset + 68px width
      const initialY = window.innerHeight - 98;
      this.pos.currentX = this.pos.targetX = initialX;
      this.pos.currentY = this.pos.targetY = initialY;
      this.updateDOMPosition();
    }

    initActiveLink() {
      let path = window.location.pathname.split("/").pop();
      if (!path) path = "index.html";
      document.querySelectorAll(".dock-item").forEach(item => {
        if (item.getAttribute("href") === path) {
          item.classList.add("active");
        }
      });
    }

    initEvents() {
      // Клик по кнопке
      this.btn.addEventListener("click", (e) => {
        if (this.hasMoved) {
          e.preventDefault();
          return;
        }
        this.toggleDock();
      });

      // Drag events
      this.btn.addEventListener("mousedown", (e) => this.dragStart(e));
      this.btn.addEventListener("touchstart", (e) => this.dragStart(e), { passive: true });

      window.addEventListener("mousemove", (e) => this.dragMove(e));
      window.addEventListener("touchmove", (e) => this.dragMove(e), { passive: false });

      window.addEventListener("mouseup", () => this.dragEnd());
      window.addEventListener("touchend", () => this.dragEnd());

      // Закрытие по клику вне
      document.addEventListener("click", (e) => {
        if (!this.wrapper.contains(e.target) && this.wrapper.classList.contains("open")) {
          this.wrapper.classList.remove("open");
          this.synth.playBubble();
        }
      });

      // Resize observer
      window.addEventListener("resize", () => {
        this.bg.resize();
        this.keepInBounds();
      });

      // Глитч при наведении на пункты меню
      document.querySelectorAll('.dock-item').forEach(item => {
        item.addEventListener('mouseenter', () => {
          this.glitch.trigger();
          this.synth.playChime();
        });
      });
    }

    toggleDock() {
      this.updateDockDirection();
      const isOpen = this.wrapper.classList.toggle("open");
      if (isOpen) {
        this.synth.playChime();
      } else {
        this.synth.playBubble();
      }
    }

    dragStart(e) {
      this.isDragging = true;
      this.hasMoved = false;

      // Получаем текущие координаты из объекта положения
      const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
      const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;

      this.dragOffset.x = clientX - this.pos.currentX;
      this.dragOffset.y = clientY - this.pos.currentY;

      this.wrapper.style.willChange = "transform";
    }

    dragMove(e) {
      if (!this.isDragging) return;

      const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
      const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;

      const targetX = clientX - this.dragOffset.x;
      const targetY = clientY - this.dragOffset.y;

      // Лимиты экрана
      const maxLeft = window.innerWidth - this.wrapper.offsetWidth;
      const maxTop = window.innerHeight - this.wrapper.offsetHeight;

      this.pos.targetX = Math.max(0, Math.min(targetX, maxLeft));
      this.pos.targetY = Math.max(0, Math.min(targetY, maxTop));

      if (Math.abs(this.pos.targetX - this.pos.currentX) > 4 || Math.abs(this.pos.targetY - this.pos.currentY) > 4) {
        this.hasMoved = true;
        if (e.cancelable) e.preventDefault();
      }

      this.updatePhysics();
    }

    dragEnd() {
      if (!this.isDragging) return;
      this.isDragging = false;
      this.wrapper.style.willChange = "auto";
      this.keepInBounds();
    }

    /**
     * Сглаживание движения с использованием LERP (Linear Interpolation).
     * Дает благородное "тяжелое" скольжение виджета.
     */
    updatePhysics() {
      if (!this.isDragging && Math.abs(this.pos.targetX - this.pos.currentX) < 0.1 && Math.abs(this.pos.targetY - this.pos.currentY) < 0.1) {
        return;
      }

      const lerpFactor = this.isDragging ? 0.25 : 0.15;
      this.pos.currentX += (this.pos.targetX - this.pos.currentX) * lerpFactor;
      this.pos.currentY += (this.pos.targetY - this.pos.currentY) * lerpFactor;

      this.updateDOMPosition();
      this.updateDockDirection();

      if (this.isDragging) {
        requestAnimationFrame(() => this.updatePhysics());
      }
    }

    updateDOMPosition() {
      this.wrapper.style.left = `${this.pos.currentX}px`;
      this.wrapper.style.top = `${this.pos.currentY}px`;
      this.wrapper.style.bottom = "auto";
      this.wrapper.style.right = "auto";
    }

    updateDockDirection() {
      const rect = this.wrapper.getBoundingClientRect();
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      this.wrapper.classList.remove("is-left", "is-up", "is-down");

      const dockWidth = this.dock.scrollWidth;
      const gap = 20;

      const spaceLeft = rect.left;
      const spaceRight = screenWidth - rect.right;
      const spaceTop = rect.top;
      const spaceBottom = screenHeight - rect.bottom;

      if (spaceRight >= dockWidth + gap) {
        this.wrapper.classList.add("is-left"); // Открывается вправо
      } else if (spaceLeft < dockWidth + gap) {
        // Вертикальный фоллбек, если по бокам места нет
        if (spaceTop > spaceBottom) {
          this.wrapper.classList.add("is-up");
        } else {
          this.wrapper.classList.add("is-down");
        }
      }
    }

    keepInBounds() {
      const maxLeft = window.innerWidth - this.wrapper.offsetWidth;
      const maxTop = window.innerHeight - this.wrapper.offsetHeight;

      this.pos.targetX = Math.max(10, Math.min(this.pos.targetX, maxLeft - 10));
      this.pos.targetY = Math.max(10, Math.min(this.pos.targetY, maxTop - 10));
      
      this.updatePhysics();
    }
  }

  // Запуск интерфейса после загрузки DOM
  document.addEventListener("DOMContentLoaded", () => {
    window.celestialSea = new CelestialSeaDock();
  });
</script>
