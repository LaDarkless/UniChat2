        # Ai Core
### Что такое Ai Core и как с ним работать?
**Ai Core** — это одна из функций UniChat. В нём собраны передовые искусственные интеллекты от различных компаний, начиная от **OpenAI, Anthropic или DeepSeek**, заканчивая **MiniMax и прочие компании** для предоставления персональной помощи конкретному пользователю.
### История создания Ai Core
**Ai Core** — это первый сервис, разработанный на UniChat. Он был разработан в марте 2026 года в качестве простого чат-бота, который быстро перерос в полноценный суперпроект. Он был разработан на телефоне в приложении ***TrebEdit*** после чего разработка продолжилась в IDE (это общее понятие среды разработки, в котором пишут код) Visual Studio Code.
### Возможности AI Core
AI Core больше не просто очередной чат с ботом. В этом модуле можно редактировать шаблоны Агентских Цепочек. То есть помимо того, что в нём можно общаться, к примеру, с моделью GPT-4o (от OpenAI), так ещё и можно совместить эти самые ИИ модели в одну агентскую цепочку.
По умолчанию в агентскую цепочку встроены следующие цепочки, не поддающиеяся редактированию на стороне пользователей:
1. **Имя:** Исследователь;
**Задача:** его смысл в том, чтобы заниматься поиском какой-либо информации из заданого пользователем запроса;
**Совет: Не ставьте в качестве исследователя устаревшие модели, т.к. они могут выдавать неактуальную информацию.** ***<-- ЭТО ВАЖНО!***

2. **Имя:** Аналитик;
**Задача:** он служит для того, чтобы *анализировать* информацию, переданную со стороны *исследователя*;
**Важное Замечание:** Он не служит поисковой моделью и лишь *анализирует* переданный результат. Это значит следующее:
В случае если **Исследователь** выдал некорректный результат, **Аналитик** соответсвенно проанализирует это сообщение и выдаст неверный/устаревший ответ, который может не соответсвовать реальности. **Необходимо проверять важную информацию**;

3. **Имя:** Специалист (пользователь сам настраивает имя);
**Задача:** У данного агента нет задачи до тех пор, пока пользователь сам его не выберет. Этот параметр в AI Core называется "Роль". То есть это **подимя** данного агента — как именно к нему будут обращаться остальные агенты полной цепочки. Оно влияет на отношение ИИ к данном специалисту,
так как, если, к примеру, вы назовете Специалиста "Переводчик", то Критик (опишу ниже) не будет придираться к ответу, написанном, например, на английском языке, если пользователь запросил ответ на русском.
Критик будет думать что-типо того: "Пользователь задал запрос на русском языке, но данный специалист оформил ответ на английском. Его роль "Переводчик", значит всё идет по плану. Идет поиск других уязвимостей...".
А если вы назовете переводчика, к примеру, Саня, то Критик не поймет почему Специалист перевел всё на английский, сочтёт это за ошибку и уже **АНАЛИТИКА** (да, не специалиста), попросит испрпавить ответ перед раскрытием пользователю;
**Важное Замечание:** Специалистов может быть хоть миллионы в агенсткой цепочке. У программиста (или человека, который понимает что такое localstorage) появляется логический вопрос: "А как тогда в локальном хранилище из пяти мегабайт хватило бы места для сохранения информации в таком объёмном потоке?" — ответ прост.
В таком случае хранение данных переходит из LocalStorage в IndexedDB, где хранятся гигабайты данных на стороне пользователя.

4. **Имя:** Критик;
**Задача:** Его имя прямо отражает его роль в Агентской цепочке. Он критикует информацию, полученную от аналитика (но в том сулчае, если вы настроили Специалиста, то он будет проверять его информацию, а не Аналитика).
Чтобы экономить ваши токены, в него встроено ограничение по количеству вычислений возможных уязимостей в ответе AI и это число равно 5 (иногда может быть и шесть, если попросил пользователь или если ошибок уж явно больше положенного порога);

5. **Имя:** Спикер;
**Задача:** Он просто красиво оформляет ответ, полученный от Аналитика (или если вы включили в Агентскую цепочку Специалиста, тогда Спикер проверяет его ответ);
**Совет (Опциально):** Не ставьте на эту роль сильно дорогую модель, так как он ничем толковым не занимается. Его роль просто в том, чтобы вашим замечательным глазам было приятно.

# Agent
Модуль **Agent** позволяет создавать автономных ассистентов, которые могут выполнять задачи в фоновом режиме.
В отличае от модуля **AI Core**, **Agent** — *более гибкая экосистема* для обращения к сторонним источникам.
Если в **AI Core** есть готовые пресеты от разработчика (Исследователь, Аналитик и т.п.), то в модуле **Agent** вы сами настраиваете Агентскую цеполчку.
Если говорить по-простому, то в данном модуле нет никаких "Исследователей" или "Критиков". Там есть лишь кнопка "Создать Специаслиста".
Это значит следующее:

* Более гибкая настройка Цепочек Рассуждения (Chains of Thought) — вместо того, чтобы добалять своих агентов поверх встроенных, вы сами создаете каждую цепочку.

* Вы сами называете каждого агента и даете ему задачу. Как и в блоке AI Core, вы также можете выбрать модели, которые будут вести заданную роль.

### История чатов
История чатов хранится на IndexedDB. Почему? Потому что модуль Agent ориентирован именно под бошльшие базы знаний и требует больше пямяти, чем может позволить localstorage.
Тас нет кнопки удаления определенного сообщения или редактирования ответов.
# Music
В этом отделе встроен музыкальный плеер с расширенным эквалайзером и интеграцией с YouTube Music. На нём можно слушать свои локальные песни или подключить API с YouTube Music.
1. Что такое YouTube Data API v3
Это официальный API, который даёт доступ к видео, каналам, плейлистам, подпискам, загрузке роликов и т.п. для обычного YouTube.

Им можно пользоваться из веба, мобилки или сервера, но YouTube Music‑функции он почти не покрывает (они отдельные и не открыты официально).

2. Как включить API и получить ключ
Всё делается через Google Cloud Console.

Зайди в Google Cloud Console (нужен Google‑аккаунт).

Создай новый проект (или выбери существующий).

В левом меню открой “APIs & Services” → “Library”.

В поиске найди “YouTube Data API v3”, открой и нажми Enable (Включить).

После включения зайди в “APIs & Services” → “Credentials” и нажми Create credentials → API key — появится ключ, который ты будешь использовать в запросах.
3. Ограничения и квоты
У API есть суточная квота — по умолчанию 10 000 единиц в день, разные методы стоят по‑разному (например, search.list, videos.list и т.п.).

При превышении нужно либо оптимизировать запросы, либо подавать запрос на увеличение квоты через Google Cloud Console.

1. Перейди в Google Cloud Console
👉 https://console.cloud.google.com/

2. Создай проект (или выбери существующий)

Вверху жми на название проекта → "Новый проект" → придумай название → "Создать"

3. Включи YouTube Data API v3

Меню → "API и сервисы" → "Библиотека"

В поиске введи YouTube Data API v3

Кликни на него → "Включить"

4. Получи API-ключ

Меню → "API и сервисы" → "Учётные данные"

Нажми "Создать учётные данные" → "Ключ API"

Ключ сразу появится — скопируй его и вставь в плеер. YouTube Music заработает.

                        ### Цели Создания
Автор пресследовал цель не простого "чат-бота", а именно **мультиприложение**, полноценноой **комплексной экосистемы** где есть абсолютно **всё**, чем пользуются в повседнгевной жизни.
Если когда-то приходилось выключать одно приложение и входить в **другое**, то здесь уже такое вовсе не нужно.
В приложении ***UniChat*** можно переходить из одного приложение чат-бота или блокнота *сразу* во **встроенный** браузер и наоборот.
### Для Чего Вообще Нужен UniChat?
**UniChat** — это мир логики и построения верных промптов для программистов и мир простой и полезной помощи в повседневных вещах для простых обывателей.
Он поможет вам с повседневными вещами и сложными документами (AI Core).
### Минусы и Плюсы
Важен также и тот факт, что ваши данные хранятся только на вашем устройстве, а это значит следующее:
1. Ваши данные никто не сможет украсть, поскольку они не хранятся в коде данного сервиса. В случае взлома или утечке данных ваши данные **НЕ ПОПАДУТ В СЕТЬ**, поскольку их нет на сервере и злоумышленники смогут украсть лишь код сайта, а не данные, которые вы сюда вносите.

2. В случае потери данного приложения **"UniChat"**, вы также потеряете данные, которые были на нем записаны.

3. Данное приложение находится на этапе тестирования (BETA-TEST), а это значит, что расположение кнопок и/или старые функции могут быть временно **перенесены, удалены или скрыты** на данном этапе тестирования. В случае каких-либо вопросов, обращайтесь по почте разработчика в блоке вопросв о Лицензии ***"LICENSE"***.

        function checkEnter(e) {

        function fillAndSend(text) {

        async function askAI() {
            const promptInput = document.getElementById('prompt');
            const prompt = promptInput.value.trim();
            const sendBtn = document.getElementById('send-btn');
            const sendIcon = document.getElementById('send-icon');
            const loader = document.getElementById('loader');
            const responseContainer = document.getElementById('response-container');
            const responseContent = document.getElementById('response-content');
    
            if (!prompt) return;
            
            if (API_KEY === "ВСТАВЬТЕ_ВАШ_КЛЮЧ_СЮДА") {
                alert("Внимание! Вы забыли указать свой API ключ в коде.");
                return;
            }
    
            // 2. ДОБАВЛЯЕМ ВОПРОС ПОЛЬЗОВАТЕЛЯ В ИСТОРИЮ
            chatHistory.push({ role: "user", content: prompt });
    
            // Очищаем поле ввода для следующего вопроса
            promptInput.value = '';
            promptInput.style.height = 'auto'; // Сброс высоты
    
            // UI обновления
            sendBtn.disabled = true;
            sendIcon.style.display = 'none';
            loader.style.display = 'block';
            
            // Показываем контейнер, если он еще скрыт
            responseContainer.classList.add('visible');
            document.getElementById('main').style.marginTop = '5vh';
    
            // Отображаем вопрос пользователя в интерфейсе
            const userMsgHtml = `
                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border);">
                    <span style="color: var(--secondary); font-size: 13px;">Вы:</span>
                    <div style="margin-top: 5px;">${prompt}</div>
                </div>
                <div id="loading-indicator" style="margin-top: 15px; color: var(--accent); font-size: 14px;">
                    ИИ думает...
                </div>
            `;
            // Добавляем вопрос вниз, а не перезаписываем весь блок
            responseContent.innerHTML += userMsgHtml;
    
            try {
                const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`,
                    // Обязательные заголовки для прямой работы с OpenRouter
                    "HTTP-Referer": window.location.href || "https://unichat-ai.com",
                    "X-Title": "UniChat AI Answer"
                },
                body: JSON.stringify({
                    model: "openai/gpt-oss-120b:free",
                    messages: chatHistory,
                    stream: true // <-- 1. ВКЛЮЧАЕМ ПОТОКОВУЮ ПЕРЕДАЧУ
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || "Ошибка соединения с сервером");
            }

            // Удаляем надпись "ИИ думает..." сразу, как только пошел ответ
            document.getElementById('loading-indicator')?.remove();

            // 2. Создаем уникальный ID для контейнера текущего ответа
            const messageId = "ai-msg-" + Date.now();
            
            // Добавляем "каркас" сообщения ИИ в чат
            responseContent.innerHTML += `
                <div style="margin-top: 15px;">
                    <span style="color: var(--accent); font-size: 13px; font-weight: bold;">ИИ:</span>
                    <div id="${messageId}" style="margin-top: 5px; min-height: 24px;"></div>
                </div>
            `;
            
            // Находим этот пустой контейнер
            const messageContainer = document.getElementById(messageId);

            // 3. Начинаем читать поток
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let aiFullText = ""; // Сюда будем собирать текст по буквам
            let buffer = ""; // Буфер для склейки разорванных строк данных

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                // Декодируем кусок байтов в текст
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                
                // Последняя строка может быть неполной, оставляем её в буфере
                buffer = lines.pop(); 

                for (const line of lines) {
                    if (line.trim() === '' || line.trim() === 'data: [DONE]') continue;
                    
                    if (line.startsWith('data: ')) {
                        try {
                            // Отрезаем приставку "data: " и парсим JSON
                            const data = JSON.parse(line.substring(6));
                            const content = data.choices[0]?.delta?.content || "";
                            
                            if (content) {
                                aiFullText += content; 
                                
                                // 1. Проверяем, находится ли пользователь у нижнего края экрана ДО добавления текста (с запасом 150px)
                                const isNearBottom = (document.documentElement.scrollHeight - window.scrollY - window.innerHeight) < 150;

                                // 2. На лету парсим Маркдаун и обновляем экран
                                messageContainer.innerHTML = marked.parse(aiFullText);
                                
                                // 3. Если скролл был внизу, ИИ продолжает тянуть его за собой. 
                                // Если пользователь крутанул вверх — ИИ перестает мешать.
                                if (isNearBottom) {
                                    window.scrollTo({
                                        top: document.documentElement.scrollHeight,
                                        behavior: "auto" // "auto" не дергает экран при быстрой потоковой печати, в отличие от "smooth"
                                    });
                                }
                            }
                        } catch (e) {
                            console.error("Ошибка парсинга куска данных: ", e, line);
                        }
                    }
                }
            }

            // 5. Когда поток закончился, сохраняем ГОТОВЫЙ ответ в историю
            chatHistory.push({ role: "assistant", content: aiFullText });

        } catch (error) {
            document.getElementById('loading-indicator')?.remove();
            responseContent.innerHTML += `<div style="margin-top: 15px; color: #ef4444;">Ошибка: ${error.message}</div>`;
            // Удаляем последний вопрос из памяти при ошибке
            chatHistory.pop();
        } finally {
            sendBtn.disabled = false;
            sendIcon.style.display = 'block';
            loader.style.display = 'none';
        }
        }
    </script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
    const fabWrapper = document.getElementById('fabWrapper');
    const fabToggleBtn = document.getElementById('fabToggleBtn');
    
    // Подсветка активной ссылки (ваш код)
    let currentPath = window.location.pathname.split('/').pop();
    if (currentPath === '') currentPath = 'index.html';
    document.querySelectorAll('.dock-item').forEach(item => {
        const href = item.getAttribute('href');
        if (currentPath === href) {
            item.classList.add('active');
        }
    });

    // --- ЛОГИКА ПЕРЕТАСКИВАНИЯ (DRAG & DROP) ---
    let isDragging = false;
    let hasMoved = false; // Отличаем клик от перетаскивания
    let startX, startY;
    let initialLeft, initialTop;

    function dragStart(e) {
        if (e.type === 'touchstart') {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        } else {
            startX = e.clientX;
            startY = e.clientY;
            e.preventDefault(); // Предотвращаем стандартное выделение на ПК
        }

        // Получаем текущие координаты элемента на экране
        const rect = fabWrapper.getBoundingClientRect();
        
        // Отключаем bottom/right, переходим на жесткое позиционирование left/top
        fabWrapper.style.bottom = 'auto';
        fabWrapper.style.right = 'auto';
        fabWrapper.style.left = rect.left + 'px';
        fabWrapper.style.top = rect.top + 'px';

        initialLeft = rect.left;
        initialTop = rect.top;

        isDragging = true;
        hasMoved = false;
        
        // Убираем плавность при самом перетаскивании
        fabWrapper.classList.remove('snap-transition');

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchmove', dragMove, { passive: false });
        document.addEventListener('touchend', dragEnd);
    }

    function dragMove(e) {
        if (!isDragging) return;

        let currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        let currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

        let deltaX = currentX - startX;
        let deltaY = currentY - startY;

        // Если сдвинули больше чем на 5 пикселей, считаем это перетаскиванием, а не кликом
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
            hasMoved = true;
            if (e.type === 'touchmove') e.preventDefault(); // Блокируем скролл страницы
        }

        if (hasMoved) {
            let newLeft = initialLeft + deltaX;
            let newTop = initialTop + deltaY;

            // --- ОГРАНИЧЕНИЕ ВЫХОДА ЗА ПРЕДЕЛЫ ЭКРАНА ---
            const rect = fabWrapper.getBoundingClientRect();
            const maxLeft = window.innerWidth - rect.width;
            const maxTop = window.innerHeight - rect.height;

            // Запрещаем уходить за левый/правый и верхний/нижний края
            newLeft = Math.max(0, Math.min(newLeft, maxLeft));
            newTop = Math.max(0, Math.min(newTop, maxTop));

            fabWrapper.style.left = newLeft + 'px';
            fabWrapper.style.top = newTop + 'px';
        }
    }

    function dragEnd() {
        isDragging = false;
        document.removeEventListener('mousemove', dragMove);
        document.removeEventListener('mouseup', dragEnd);
        document.removeEventListener('touchmove', dragMove);
        document.removeEventListener('touchend', dragEnd);
    }

    // Слушатели для начала перетаскивания (с кнопки)
    fabToggleBtn.addEventListener('mousedown', dragStart);
    fabToggleBtn.addEventListener('touchstart', dragStart, { passive: true });

    // --- ЛОГИКА ОТКРЫТИЯ/ЗАКРЫТИЯ МЕНЮ ---
    fabToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        
        // Если было перетаскивание, отменяем клик!
        if (hasMoved) {
            e.preventDefault();
            return;
        }

        fabWrapper.classList.toggle('open');
        
        // Если меню открылось и вылезло за края экрана (т.к. стало шире),
        // плавно задвигаем его обратно в пределы экрана.
        if (fabWrapper.classList.contains('open')) {
            setTimeout(keepInBounds, 50); // Ждем долю секунды, чтобы CSS применил ширину
        }
    });

    // Функция возврата в рамки экрана при изменении ширины меню
    function keepInBounds() {
        const rect = fabWrapper.getBoundingClientRect();
        const maxLeft = window.innerWidth - rect.width;
        const maxTop = window.innerHeight - rect.height;

        let correctedLeft = Math.max(0, Math.min(rect.left, maxLeft));
        let correctedTop = Math.max(0, Math.min(rect.top, maxTop));

        // Если позиция нуждается в корректировке
        if (correctedLeft !== rect.left || correctedTop !== rect.top) {
            fabWrapper.classList.add('snap-transition'); // Добавляем плавность
            fabWrapper.style.left = correctedLeft + 'px';
            fabWrapper.style.top = correctedTop + 'px';
        }
    }

    // Закрытие меню при клике в любое другое место
    document.addEventListener('click', (e) => {
        if (!fabWrapper.contains(e.target) && fabWrapper.classList.contains('open')) {
            fabWrapper.classList.remove('open');
            // При закрытии (ширина уменьшилась) тоже проверяем границы на всякий случай
            setTimeout(keepInBounds, 300); 
        }
    });

    // Пересчет границ при повороте экрана телефона / изменении размера окна
    window.addEventListener('resize', keepInBounds);
});
</script>
