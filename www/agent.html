<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Builder - ProxyAPI OpenRouter (Streaming & Thoughts)</title>
  <style>
    :root {
      /* Общая тема (тёмная) */
      --app-bg: #070709;
      --app-surface: #0f0f13;
      --app-border: #1f1f25;
      --text-main: #e0e0e0;
      --text-muted: #888890;
      
      /* Тема для цепочек агентов (Черно-серая премиальная) */
      --chain-bg: #000000;
      --chain-surface: #0a0a0a;
      --chain-card: #111111;
      --chain-border: #222222;
      --chain-glow: rgba(255, 255, 255, 0.06);
      --chain-text: #f5f5f5;
      --chain-muted: #666666;
      
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      color: var(--text-main);
      background-color: var(--app-bg);
      padding: 24px;
      line-height: 1.5;
    }

    .app-container {
      width: min(1500px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 480px 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 1024px) {
      .app-container { grid-template-columns: 1fr; }
    }

    /* --- ЛЕВАЯ ПАНЕЛЬ (Настройки и Билдер) --- */
    .builder-panel {
      background: var(--app-surface);
      border: 1px solid var(--app-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .header-title {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 4px;
      color: #fff;
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 600;
    }

    .ui-input, .ui-textarea {
      width: 100%;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--app-border);
      color: var(--text-main);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s;
      outline: none;
    }

    .ui-input:focus, .ui-textarea:focus {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.05);
    }

    .ui-textarea { min-height: 80px; resize: vertical; }

    /* Кастомный Dropdown с поиском */
    .dropdown-wrapper { position: relative; }
    .dropdown-list {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: #111113;
      border: 1px solid #333;
      border-radius: var(--radius-md);
      margin-top: 6px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      display: none;
    }
    .dropdown-list.open { display: block; }
    .dropdown-item {
      padding: 10px 14px;
      cursor: pointer;
      color: #bbb;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.1s, color 0.1s;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: #222; color: #fff; }
    .dropdown-item-id {
      display: block; font-size: 11px; color: #666; font-family: monospace; margin-top: 2px;
    }

    /* Список агентов */
    .agents-list { display: flex; flex-direction: column; gap: 16px; }
    .agent-card {
      background: rgba(0,0,0,0.3);
      border: 1px dashed var(--app-border);
      border-radius: var(--radius-md);
      padding: 16px;
      position: relative;
    }
    .agent-card-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
    }
    .agent-number {
      font-size: 11px; text-transform: uppercase; background: #222; padding: 4px 10px; border-radius: 12px; font-weight: 600; color: #fff;
    }
    .btn-remove { background: none; border: none; color: #ff5555; cursor: pointer; font-size: 12px; padding: 4px; opacity: 0.8; }
    .btn-remove:hover { opacity: 1; }

    /* Кнопки */
    .btn {
      background: #1a1a1f; color: #fff; border: 1px solid #2a2a32;
      padding: 14px 16px; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
    }
    .btn:hover { background: #22222a; border-color: #33333d; }
    .btn.primary { background: #fff; color: #000; border-color: #fff; }
    .btn.primary:hover { background: #e0e0e0; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* --- ПРАВАЯ ПАНЕЛЬ (Black & Grey Thinking UI) --- */
    agent-chain-runner { 
      display: block; 
      height: auto; 
      flex-shrink: 0; /* Запрещаем сжимать блок в ленте */
    }

    .terminal {
      background: var(--chain-bg); border: 1px solid var(--chain-border);
      border-radius: var(--radius-lg); padding: 32px; height: auto;
      box-shadow: inset 0 0 100px rgba(255,255,255,0.015);
      position: relative; overflow: hidden;
    }

    /* Эффект сетки на фоне */
    .terminal::before {
      content: ""; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
      background-size: 24px 24px; pointer-events: none; z-index: 0;
    }

    .terminal > * { position: relative; z-index: 1; }

    .terminal-header {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--chain-border); padding-bottom: 20px; margin-bottom: 30px;
    }

    .terminal-title {
      font-size: 16px; font-weight: 400; letter-spacing: 0.1em; color: var(--chain-text);
      text-transform: uppercase; display: flex; align-items: center; gap: 12px;
    }

    .status-dot { width: 8px; height: 8px; background: #333; border-radius: 50%; transition: all 0.3s; }
    .status-dot.active {
      background: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.8);
      animation: pulse-dot 1.5s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .chain-timeline { display: flex; flex-direction: column; gap: 0; }
    .chain-step { display: grid; grid-template-columns: 44px 1fr; position: relative; padding-bottom: 40px; opacity: 0.5; transition: opacity 0.5s; }
    .chain-step.active, .chain-step.done { opacity: 1; }
    
    .chain-step:not(:last-child)::after {
      content: ""; position: absolute; left: 21px; top: 40px; bottom: -10px;
      width: 2px; background: var(--chain-border); z-index: 0;
    }
    .chain-step.done:not(:last-child)::after { background: linear-gradient(to bottom, #555, var(--chain-border)); }

    .step-icon-wrapper {
      width: 44px; height: 44px; border-radius: 50%; background: var(--chain-surface);
      border: 1px solid var(--chain-border); display: flex; align-items: center; justify-content: center; position: relative; z-index: 2;
    }
    .chain-step.active .step-icon-wrapper { border-color: #fff; box-shadow: 0 0 24px var(--chain-glow); }
    .chain-step.done .step-icon-wrapper { background: #fff; border-color: #fff; }
    
    .step-icon { width: 18px; height: 18px; fill: var(--chain-muted); }
    .chain-step.active .step-icon { fill: #fff; }
    .chain-step.done .step-icon { fill: #000; }

    .step-content { padding-left: 20px; padding-top: 10px; }
    .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .step-name { font-size: 17px; font-weight: 500; color: var(--chain-text); margin: 0; }
    .step-model { font-size: 11px; font-family: monospace; color: var(--chain-muted); background: rgba(255,255,255,0.03); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--chain-border); }

    .step-output {
      background: var(--chain-card); border: 1px solid var(--chain-border);
      border-radius: var(--radius-md); padding: 24px; font-size: 15px; line-height: 1.6;
      color: #ddd; white-space: pre-wrap; position: relative; overflow: hidden; display: none;
      word-break: break-word;
    }
    .chain-step.active .step-output, .chain-step.done .step-output { display: block; }

    /* Дизайн Блока Рассуждений (Мыслей) */
    .thinking-process {
      background: rgba(255,255,255,0.02);
      border-left: 2px solid #444;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 0 8px 8px 0;
      color: #999;
      font-size: 14px;
      line-height: 1.5;
    }
    .thinking-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      color: #666; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    .thinking-label::before {
      content: ""; display: inline-block; width: 6px; height: 6px; background: #666; border-radius: 50%;
    }

    /* Анимация сканирования при ожидании потока */
    .step-output.waiting::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 100%;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.03) 50%, transparent);
      animation: scan 1.5s linear infinite; pointer-events: none;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    /* Скелетон загрузки */
    .skeleton-line { height: 12px; background: #1a1a1a; border-radius: 4px; margin-bottom: 12px; position: relative; overflow: hidden; }
    .skeleton-line:last-child { width: 60%; margin-bottom: 0; }
    .skeleton-line::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: translateX(-100%); animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 100% { transform: translateX(100%); } }

    /* Мигающий курсор при потоковой передаче */
    .cursor-blink {
      display: inline-block; width: 8px; height: 15px; background: #fff;
      vertical-align: middle; margin-left: 4px; animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ==========================================
       LIGHT THEME OVERRIDES (СВЕТЛАЯ ТЕМА)
       ========================================== */
       [data-theme="light"] {
      --app-bg: #f3f4f6;
      --app-surface: #ffffff;
      --app-border: #e5e7eb;
      --text-main: #111827;
      --text-muted: #6b7280;
      
      --chain-bg: #f8fafc;
      --chain-surface: #ffffff;
      --chain-card: #ffffff;
      --chain-border: #e2e8f0;
      --chain-glow: rgba(0, 0, 0, 0.05);
      --chain-text: #0f172a;
      --chain-muted: #64748b;
    }

    /* Инпуты и списки в светлой теме */
    [data-theme="light"] .ui-input, 
    [data-theme="light"] .ui-textarea { background: #ffffff; color: var(--text-main); }
    [data-theme="light"] .ui-input:focus,[data-theme="light"] .ui-textarea:focus { border-color: #9ca3af; background: #f9fafb; }
    
    [data-theme="light"] .dropdown-list { background: #ffffff; border-color: var(--app-border); }[data-theme="light"] .dropdown-item { color: var(--text-muted); }
    [data-theme="light"] .dropdown-item:hover { background: #f3f4f6; color: var(--text-main); }
    [data-theme="light"] .dropdown-item-id { color: #9ca3af; }
    
    /* Кнопки в светлой теме */[data-theme="light"] .btn { background: #ffffff; color: var(--text-main); border-color: var(--app-border); }
    [data-theme="light"] .btn:hover { background: #f3f4f6; border-color: #d1d5db; }[data-theme="light"] .btn.primary { background: #111827; color: #fff; border-color: #111827; }
    [data-theme="light"] .btn.primary:hover { background: #1f2937; }
    [data-theme="light"] .btn-remove { color: #ef4444; }

    /* Карточки агентов */
    [data-theme="light"] .agent-card { background: #ffffff; }[data-theme="light"] .agent-number { background: #f3f4f6; color: var(--text-main); border: 1px solid var(--app-border); }
    [data-theme="light"] .header-title { color: var(--text-main); }
    
    /* ТЕРМИНАЛ И СЕТКА (Чёрные линии на белом фоне) */[data-theme="light"] .terminal { box-shadow: inset 0 0 100px rgba(0,0,0,0.02); }
    [data-theme="light"] .terminal::before {
      background-image: linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
    }
    
    /* Шаги и логика в терминале */
    [data-theme="light"] .status-dot { background: #cbd5e1; }
    [data-theme="light"] .status-dot.active { background: #3b82f6; box-shadow: 0 0 12px rgba(59,130,246,0.5); }[data-theme="light"] .chain-step.active .step-icon-wrapper { border-color: #3b82f6; box-shadow: 0 0 16px rgba(59,130,246,0.2); }
    [data-theme="light"] .chain-step.active .step-icon { fill: #3b82f6; }[data-theme="light"] .chain-step.done .step-icon-wrapper { background: #111827; border-color: #111827; }[data-theme="light"] .chain-step.done .step-icon { fill: #fff; }[data-theme="light"] .step-model { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }[data-theme="light"] .step-output { color: #334155; }[data-theme="light"] .thinking-process { background: #f8fafc; border-left-color: #cbd5e1; color: #64748b; }[data-theme="light"] .thinking-label::before { background: #94a3b8; }[data-theme="light"] .cursor-blink { background: #0f172a; }
    [data-theme="light"] .skeleton-line { background: #e2e8f0; }
    [data-theme="light"] .skeleton-line::after { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent); }

        /* ==========================================
       СТИЛИ ДЛЯ ИСТОРИИ ЧАТА (ЛЕНТА)
       ========================================== */
       .right-panel-wrapper {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 48px);
      min-width: 0;
    }

    .chains-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
      padding-right: 12px;
      padding-bottom: 24px;
      scroll-behavior: smooth;
    }

    /* Кастомный скроллбар для ленты сообщений */
    .chains-container::-webkit-scrollbar { width: 6px; }
    .chains-container::-webkit-scrollbar-track { background: transparent; }
    .chains-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
    [data-theme="light"] .chains-container::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); }

    /* Окно с запросом пользователя над терминалом */
    .terminal-task {
      background: rgba(255, 255, 255, 0.03);
      padding: 16px;
      border-radius: var(--radius-md);
      margin-bottom: 24px;
      border-left: 3px solid var(--chain-muted);
    }
    .terminal-task-label {
      font-size: 11px; text-transform: uppercase; color: var(--chain-muted); margin-bottom: 6px; letter-spacing: 0.05em;
    }
    .terminal-task-text {
      font-size: 15px; color: var(--chain-text); white-space: pre-wrap;
    }
    [data-theme="light"] .terminal-task { background: rgba(0, 0, 0, 0.02); }

    /* ==========================================
       МЕНЮ ЧАТОВ (ВЫДВИЖНАЯ ПАНЕЛЬ)
       ========================================== */
       .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999;
      opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { opacity: 1; visibility: visible; }
    
    .history-drawer {
      position: fixed; top: 0; right: 0; width: 340px; height: 100vh;
      background: var(--app-surface); border-left: 1px solid var(--app-border);
      z-index: 1000; transform: translateX(100%); transition: transform 0.3s ease;
      display: flex; flex-direction: column; box-shadow: -10px 0 40px rgba(0,0,0,0.5);
    }
    .history-drawer.open { transform: translateX(0); }
    [data-theme="light"] .history-drawer { background: #fff; }

    .drawer-header {
      padding: 20px; border-bottom: 1px solid var(--app-border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .session-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    
    .session-item {
      padding: 12px; border-radius: var(--radius-md); background: rgba(255,255,255,0.02);
      border: 1px solid transparent; cursor: pointer; transition: 0.2s;
      display: flex; justify-content: space-between; align-items: center;
    }
    .session-item:hover { background: rgba(255,255,255,0.05); }
    .session-item.active { background: rgba(255,255,255,0.08); border-color: var(--app-border); }
    [data-theme="light"] .session-item { background: #f9fafb; border-color: #e5e7eb; }
    [data-theme="light"] .session-item.active { background: #e5e7eb; border-color: #d1d5db; }
    
    .session-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .session-date { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .delete-session { color: #ff5555; background: none; border: none; cursor: pointer; opacity: 0.5; padding: 4px; }
    .delete-session:hover { opacity: 1; }

    /* ==========================================
       СТИЛИ ДЛЯ MARKDOWN И КОДА
       ========================================== */
       .markdown-body { font-size: 15px; line-height: 1.6; word-wrap: break-word; }
    .markdown-body p { margin-top: 0; margin-bottom: 16px; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body strong { font-weight: 600; color: inherit; }
    
    /* Таблицы */
    .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
    .markdown-body th, .markdown-body td { border: 1px solid var(--chain-border); padding: 8px 12px; text-align: left; }
    .markdown-body th { background: rgba(255,255,255,0.05); }[data-theme="light"] .markdown-body th { background: rgba(0,0,0,0.03); }

    /* Код (Инлайн) */
    .markdown-body code {
      background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;
      font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace; font-size: 0.9em;
    }[data-theme="light"] .markdown-body code { background: rgba(0,0,0,0.06); }

    /* === БЛОК КОДА С КНОПКОЙ КОПИРОВАНИЯ === */
    .code-block-wrapper {
      position: relative; margin-bottom: 16px; border-radius: 8px;
      background: #0d1117; border: 1px solid #30363d; overflow: hidden;
    }[data-theme="light"] .code-block-wrapper { background: #f6f8fa; border-color: #d0d7de; }
    
    .code-block-header {
      display: flex; justify-content: space-between; align-items: center;
      background: #161b22; padding: 6px 12px; border-bottom: 1px solid #30363d;
      font-family: sans-serif; font-size: 12px;
    }
    [data-theme="light"] .code-block-header { background: #e1e4e8; border-bottom-color: #d0d7de; }
    
    .code-lang { color: #8b949e; text-transform: uppercase; font-weight: 600; }
    [data-theme="light"] .code-lang { color: #586069; }
    
    .copy-btn {
      background: transparent; border: none; color: #8b949e; cursor: pointer;
      display: flex; align-items: center; gap: 6px; font-size: 12px; transition: color 0.2s;
    }
    .copy-btn:hover { color: #c9d1d9; }[data-theme="light"] .copy-btn { color: #586069; }
    [data-theme="light"] .copy-btn:hover { color: #24292e; }

    .markdown-body pre { margin: 0; padding: 16px; overflow-x: auto; background: transparent; border: none; }
    .markdown-body pre code { background: transparent; padding: 0; color: inherit; font-size: 14px; display: block; overflow-x: auto; }

    /* === ИСПРАВЛЕНИЕ ВЫЛЕЗАЮЩЕГО ЗА КРАЯ КОНТЕНТА === */
    .chain-step { 
      /* Было: 44px 1fr, теперь 1fr ограничивается нулем, чтобы не распирать сетку */
      grid-template-columns: 44px minmax(0, 1fr); 
    }
    .step-content { min-width: 0; }
    .step-output { min-width: 0; word-break: break-word; }

    /* ==========================================
       MOBILE RESPONSIVENESS (AGENT CHAINS PRO)
       ========================================== */
       @media (max-width: 768px) {
      /* 1. Уменьшаем глобальные отступы, чтобы дать место контенту */
      body {
        padding: 12px; 
      }
      .app-container {
        gap: 16px;
      }
      
      /* 2. Делаем левую панель билдера компактнее */
      .builder-panel {
        padding: 16px; 
      }
      .agent-card-header {
        flex-wrap: wrap;
        gap: 8px;
      }

      /* 3. Оптимизируем терминал справа */
      .terminal {
        padding: 16px; /* Возвращаем драгоценное пространство */
      }
      .terminal-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      
      /* 4. Настраиваем шаги генерации */
      .step-content {
        padding-left: 12px; /* Уменьшаем пробел между иконкой и текстом */
      }
      .step-header {
        flex-direction: column; /* Имя и длинную модель ставим друг под другом */
        align-items: flex-start;
        gap: 6px;
      }
      .step-output {
        padding: 14px;

    // =========================================================================
    // ЛОГИКА ПОТОКОВОЙ ПЕРЕДАЧИ (STREAMING SSE)
    // =========================================================================
    async function callOpenRouterStream(apiKey, model, systemPrompt, userContent, onChunk) {
      const response = await fetch("https://api.proxyapi.ru/openrouter/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: model,
          stream: true, // ВАЖНО: Включаем потоковую передачу
          messages:[
            { role: "system", content: systemPrompt },
            { role: "user", content: userContent }
          ]
        })
      });

      if (!response.ok) {
        const errStr = await response.text();
        throw new Error(`Ошибка API: ${response.status} - ${errStr}`);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        
        buffer += decoder.decode(value, { stream: true });
        let lines = buffer.split("\n");
        buffer = lines.pop(); // Оставляем неполную строку в буфере

        for (let line of lines) {
          line = line.trim();
          if (!line.startsWith("data: ")) continue;
          
          const dataStr = line.slice(6);
          if (dataStr === "[DONE]") return;
          
          try {
            const data = JSON.parse(dataStr);
            const delta = data.choices[0]?.delta || {};
            
            // OpenRouter может передавать мысли в reasoning_content (DeepSeek R1)
            const reasoningDelta = delta.reasoning_content || "";
            const contentDelta = delta.content || "";
            
            if (reasoningDelta || contentDelta) {
              onChunk(contentDelta, reasoningDelta);
            }
          } catch (e) {
            // Игнорируем ошибки парсинга неполных JSON-кусков
          }
        }
      }
    }

// =========================================================================

    // Кастомный рендерер для Markdown (чтобы отрисовывать красивый блок)
    const renderer = new marked.Renderer();
    renderer.code = function(code, language) {
      // Поддержка для новых и старых версий Marked.js
      const codeText = typeof code === 'object' ? code.text : code;
      const lang = typeof code === 'object' ? code.lang : language;
      
      const validLanguage = (lang && hljs.getLanguage(lang)) ? lang : 'plaintext';
      const highlighted = hljs.highlight(codeText, { language: validLanguage }).value;
      
      return `
        <div class="code-block-wrapper">
          <div class="code-block-header">
            <span class="code-lang">${validLanguage}</span>
            <button class="copy-btn" onclick="copyCode(this)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              Копировать
            </button>
          </div>
          <pre><code class="hljs language-${validLanguage}">${highlighted}</code></pre>
        </div>
      `;
    };

    marked.setOptions({

    // =========================================================================
    // WEB COMPONENT: BLACK & GREY THINKING UI (С ПОДДЕРЖКОЙ MARKDOWN И LATEX)
    // =========================================================================
    class AgentChainRunner extends HTMLElement {
      constructor() {
        super();
        this.state = { status: 'idle', steps:[] };
        this.task = ""; 
      }

      connectedCallback() { this.renderFull(); }

      initChain(agentsArray, task) {
        this.task = task;
        this.state.status = 'running';
        this.state.steps = agentsArray.map(a => ({
          name: a.name, model: a.model, rawContent: "", rawReasoning: "", status: 'pending', isReceiving: false
        }));
        this.renderFull();
      }

      loadChain(task, steps) {
        this.task = task;
        this.state.status = 'finished';
        this.state.steps = JSON.parse(JSON.stringify(steps)); 
        this.state.steps.forEach(s => { if (s.status !== 'error') s.status = 'done'; s.isReceiving = false; });
        this.renderFull();
        setTimeout(() => this.applyMathToAll(), 100);
      }

      setStepActive(index) { this.state.steps[index].status = 'active'; this.renderFull(); }

      setStepDone(index) {
        this.state.steps[index].status = 'done';
        this.state.steps[index].isReceiving = false;
        this.updateStepDOM(index);
        setTimeout(() => this.renderFull(), 50); 
      }

      setStepError(index, errorMsg) {
        this.state.steps[index].status = 'error';
        this.state.steps[index].rawContent = `[ОШИБКА]: ${errorMsg}`;
        this.state.status = 'error';
        this.renderFull();
      }

      finishChain() { this.state.status = 'finished'; this.renderFull(); }

      escapeHtml(str) { return (str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

      appendChunk(index, contentDelta, reasoningDelta) {
        const step = this.state.steps[index];
        step.isReceiving = true;
        if (reasoningDelta) step.rawReasoning += reasoningDelta;
        if (contentDelta) step.rawContent += contentDelta;
        this.updateStepDOM(index);
      }

      getFormattedOutput(step) {
        let content = step.rawContent || "";
        let reasoning = step.rawReasoning || "";

        // Если модель выводит <think> в самом тексте, вырезаем его в блок размышлений
        const thinkMatch = content.match(/<think(?:ing)?\s*>([\s\S]*?)(?:<\/think(?:ing)?\s*>|$)/i);
        if (thinkMatch) {
           reasoning += "\n" + thinkMatch[1];
           content = content.replace(/<think(?:ing)?\s*>[\s\S]*?(?:<\/think(?:ing)?\s*>|$)/i, "").trim();
        }

        let html = "";
        if (reasoning.trim()) {
          html += `<div class="thinking-process"><div class="thinking-label">Системные рассуждения</div>${this.escapeHtml(reasoning.trim())}</div>`;
        }
        
        // Парсим Markdown для основного текста
        let parsedContent = "";
        try {
            // Если текст пустой, но активен стриминг, ничего не парсим
            parsedContent = content.trim() ? marked.parse(content) : "";
        } catch(e) { parsedContent = this.escapeHtml(content); }

        html += `<div class="markdown-body">${parsedContent}</div>`;

        if (step.isReceiving && step.status === 'active') {
          html += `<span class="cursor-blink" style="display: inline-block; margin-top: 10px;"></span>`;
        }
        return html;
      }

      updateStepDOM(index) {
        const outputEl = this.querySelector(`#step-output-${index}`);
        if (!outputEl) return;
        const step = this.state.steps[index];
        outputEl.classList.remove('waiting');
        outputEl.innerHTML = this.getFormattedOutput(step);

        // Рендер математики KaTeX на лету
        try {
          renderMathInElement(outputEl, {
            delimiters:[ {left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}, {left: '\\[', right: '\\]', display: true} ],
            throwOnError: false
          });
        } catch(e){}
      }

      applyMathToAll() {
        this.querySelectorAll('.step-output').forEach(el => {
            try {
              renderMathInElement(el, { delimiters:[ {left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}, {left: '\\[', right: '\\]', display: true} ], throwOnError: false });
            } catch(e){}
        });
      }

      getIcon(status) {
        if (status === 'done') return `<svg class="step-icon" viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>`;
        if (status === 'error') return `<svg class="step-icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`;
        return `<svg class="step-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="24" stroke-dashoffset="0"/></svg>`;
      }

      renderFull() {
        const { status, steps } = this.state;
        let content = '';
        if (steps.length === 0) {
          content = `<div style="color: var(--chain-muted); text-align: center; margin-top: 100px;">Готов к потоковому выполнению.</div>`;
        } else {
          content = `<div class="chain-timeline">`;
          steps.forEach((step, index) => {
            let outputContent = '';
            let classes = `step-output`;
            if (step.status === 'active' && !step.isReceiving) {
              classes += ` waiting`;
              outputContent = `<div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div>`;
            } else if (step.status === 'error') {
              outputContent = this.escapeHtml(step.rawContent);
            } else {
              outputContent = this.getFormattedOutput(step);
            }

            content += `
              <div class="chain-step ${step.status}" id="step-container-${index}">
                <div class="step-icon-wrapper">${this.getIcon(step.status)}</div>
                <div class="step-content">
                  <div class="step-header">
                    <h3 class="step-name">${step.name}</h3>
                    <span class="step-model">${step.model}</span>
                  </div>
                  <div id="step-output-${index}" class="${classes}" style="color: ${step.status === 'error' ? '#ff5555' : '#ddd'}">
                    ${outputContent}
                  </div>
                </div>
              </div>
            `;
          });
          content += `</div>`;
        }

        let taskHtml = this.task ? `
          <div class="terminal-task">
            <div class="terminal-task-label">Начальная задача</div>
            <div class="terminal-task-text">${this.escapeHtml(this.task)}</div>
          </div>
        ` : '';

        this.innerHTML = `
          <div class="terminal">
            <div class="terminal-header" style="margin-bottom: 20px;">
              <div class="terminal-title">
                <div class="status-dot ${status === 'running' ? 'active' : ''}"></div>
                Stream Reasoning
              </div>
              <div style="font-size: 11px; color: var(--chain-muted); font-family: monospace;">STATE: ${status.toUpperCase()}</div>
            </div>
            ${taskHtml}
            ${content}
          </div>
        `;
        if (status === 'finished') this.applyMathToAll();
      }
    }
    customElements.define('agent-chain-runner', AgentChainRunner);

    // =========================================================================
    // СИСТЕМА СЕССИЙ (ЧАТОВ)
    // =========================================================================
    let chatSessions =[];
    let currentSessionId = null;

    const drawerOverlay = document.getElementById('drawerOverlay');
    const historyDrawer = document.getElementById('historyDrawer');
    const sessionListEl = document.getElementById('sessionList');
    const chainsContainer = document.getElementById('chainsContainer');
    const currentChatTitle = document.getElementById('currentChatTitle');

    // Миграция старых данных и загрузка
    function loadSessions() {
      try {
        const data = localStorage.getItem('agent_sessions');
        if (data) {
           chatSessions = JSON.parse(data);
        } else {
           // Проверяем, есть ли старая история (один массив)
           const oldData = localStorage.getItem('agent_runs_history');
           if (oldData) {
             const oldRuns = JSON.parse(oldData);
             if (oldRuns.length > 0) {
               chatSessions =[{ id: 'sess_' + Date.now(), title: 'Старый чат', date: new Date().toISOString(), runs: oldRuns }];
             }
           }
        }
      } catch(e) { chatSessions =[]; }
      
      if (chatSessions.length > 0) {
        switchSession(chatSessions[0].id);
      } else {
        createNewSession();
      }
      renderSessionList();
    }

    function saveSessions() {
      localStorage.setItem('agent_sessions', JSON.stringify(chatSessions));
      renderSessionList();
    }

    function createNewSession() {
      const newId = 'sess_' + Date.now();
      chatSessions.unshift({ id: newId, title: 'Новый чат', date: new Date().toISOString(), runs:[] });
      saveSessions();
      switchSession(newId);
    }

    function switchSession(id) {
      currentSessionId = id;
      const session = chatSessions.find(s => s.id === id);
      if (!session) return;
      
      currentChatTitle.innerText = session.title;
      chainsContainer.innerHTML = '';
      
      if (session.runs.length === 0) {
        chainsContainer.innerHTML = '<div style="color: var(--text-muted); text-align: center; margin-top: 50px;">Отправьте задачу, чтобы начать цепочку.</div>';
      } else {
        session.runs.forEach(run => {
          const runner = document.createElement('agent-chain-runner');
          chainsContainer.appendChild(runner);
          runner.loadChain(run.task, run.steps);
        });
        setTimeout(() => chainsContainer.scrollTop = chainsContainer.scrollHeight, 100);
      }
      renderSessionList();
      closeDrawer();
    }

    function deleteSession(id, e) {
      e.stopPropagation();
      if(confirm('Удалить этот чат?')) {
        chatSessions = chatSessions.filter(s => s.id !== id);
        saveSessions();
        if (chatSessions.length === 0) createNewSession();
        else if (currentSessionId === id) switchSession(chatSessions[0].id);
      }
    }

    function renderSessionList() {
      sessionListEl.innerHTML = '';
      chatSessions.forEach(sess => {
        const d = new Date(sess.date);
        const dateStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        const div = document.createElement('div');
        div.className = `session-item ${sess.id === currentSessionId ? 'active' : ''}`;
        div.onclick = () => switchSession(sess.id);
        div.innerHTML = `
          <div style="overflow: hidden;">
            <div class="session-title">${sess.title}</div>
            <div class="session-date">${dateStr}</div>
          </div>
          <button class="delete-session" onclick="deleteSession('${sess.id}', event)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
        `;
        sessionListEl.appendChild(div);
      });
    }

    // UI Drawer
    function openDrawer() { historyDrawer.classList.add('open'); drawerOverlay.classList.add('open'); }
    function closeDrawer() { historyDrawer.classList.remove('open'); drawerOverlay.classList.remove('open'); }

    document.getElementById('openChatsMenuBtn').addEventListener('click', openDrawer);
    document.getElementById('closeDrawerBtn').addEventListener('click', closeDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);
    document.getElementById('newChatBtn').addEventListener('click', createNewSession);

    document.getElementById('clearAllHistoryBtn').addEventListener('click', () => {
      if(confirm('Удалить абсолютно всю историю всех чатов? Это необратимо.')){
        chatSessions =[]; localStorage.removeItem('agent_sessions'); localStorage.removeItem('agent_runs_history');
        createNewSession(); closeDrawer();
      }
    });

    document.addEventListener('DOMContentLoaded', loadSessions);

    // =========================================================================
    // ЗАПУСК ЦЕПОЧКИ (С СОХРАНЕНИЕМ В ТЕКУЩУЮ СЕССИЮ)
    // =========================================================================
    runChainBtn.addEventListener('click', async () => {
      const apiKey = apiKeyInput.value.trim();
      const initialTask = initialTaskInput.value.trim();

      if (!apiKey) return alert("Введите API Ключ ProxyAPI");
      if (!initialTask) return alert("Введите начальную задачу");
      if (agents.length === 0) return alert("Добавьте хотя бы одного агента");

      const session = chatSessions.find(s => s.id === currentSessionId);
      if (!session) return;

      runChainBtn.disabled = true;
      runChainBtn.innerHTML = "Синтез данных...";
      
      if (session.runs.length === 0) {
        chainsContainer.innerHTML = '';
        // Если это первый запуск в чате, называем чат первыми словами запроса
        session.title = initialTask.split(' ').slice(0, 5).join(' ') + '...';
        currentChatTitle.innerText = session.title;
        renderSessionList();
      }

      const currentRunner = document.createElement('agent-chain-runner');
      chainsContainer.appendChild(currentRunner);
      setTimeout(() => chainsContainer.scrollTop = chainsContainer.scrollHeight, 50);

      currentRunner.initChain(agents, initialTask);
      let currentInputContext = initialTask;

      try {
        for (let i = 0; i < agents.length; i++) {
          const agent = agents[i];
          currentRunner.setStepActive(i);
          setTimeout(() => chainsContainer.scrollTop = chainsContainer.scrollHeight, 50);

          let userPrompt = i === 0 
            ? `Задача: ${currentInputContext}` 
            : `Оригинальная задача: ${initialTask}\n\nВходные данные от предыдущего агента:\n---\n${currentInputContext}\n---\nВыполни свою задачу на основе этих данных.`;

          await callOpenRouterStream(apiKey, agent.model, agent.prompt, userPrompt, (contentChunk, reasoningChunk) => {
             currentRunner.appendChunk(i, contentChunk, reasoningChunk);
             if (chainsContainer.scrollHeight - chainsContainer.scrollTop < chainsContainer.clientHeight + 150) {
                 chainsContainer.scrollTop = chainsContainer.scrollHeight;
             }
          });
          
          currentRunner.setStepDone(i);
          currentInputContext = currentRunner.state.steps[i].rawContent; 
        }
        currentRunner.finishChain();

        session.runs.push({ task: initialTask, steps: currentRunner.state.steps });
        saveSessions();

      } catch (error) {
        const activeIndex = currentRunner.state.steps.findIndex(s => s.status === 'active');
        if (activeIndex !== -1) currentRunner.setStepError(activeIndex, error.message);
        session.runs.push({ task: initialTask, steps: currentRunner.state.steps });
        saveSessions();
      } finally {
        runChainBtn.disabled = false;
        runChainBtn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 3l14 9-14 9V3z"/></svg>
          Запустить цепочку агентов
        `;
        setTimeout(() => chainsContainer.scrollTop = chainsContainer.scrollHeight, 100);
      }
    });
  </script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const fabWrapper = document.getElementById('fabWrapper');
    const fabToggleBtn = document.getElementById('fabToggleBtn');
    
    // Подсветка активной ссылки (ваш код)
    let currentPath = window.location.pathname.split('/').pop();
    if (currentPath === '') currentPath = 'index.html';
    document.querySelectorAll('.dock-item').forEach(item => {
        const href = item.getAttribute('href');
        if (currentPath === href) {
            item.classList.add('active');
        }
    });

    // --- ЛОГИКА ПЕРЕТАСКИВАНИЯ (DRAG & DROP) ---
    let isDragging = false;
    let hasMoved = false; // Отличаем клик от перетаскивания
    let startX, startY;
    let initialLeft, initialTop;

    function dragStart(e) {
        if (e.type === 'touchstart') {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        } else {
            startX = e.clientX;
            startY = e.clientY;
            e.preventDefault(); // Предотвращаем стандартное выделение на ПК
        }

        // Получаем текущие координаты элемента на экране
        const rect = fabWrapper.getBoundingClientRect();
        
        // Отключаем bottom/right, переходим на жесткое позиционирование left/top
        fabWrapper.style.bottom = 'auto';
        fabWrapper.style.right = 'auto';
        fabWrapper.style.left = rect.left + 'px';
        fabWrapper.style.top = rect.top + 'px';

        initialLeft = rect.left;
        initialTop = rect.top;

        isDragging = true;
        hasMoved = false;
        
        // Убираем плавность при самом перетаскивании
        fabWrapper.classList.remove('snap-transition');

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchmove', dragMove, { passive: false });
        document.addEventListener('touchend', dragEnd);
    }

    function dragMove(e) {
        if (!isDragging) return;

        let currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        let currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

        let deltaX = currentX - startX;
        let deltaY = currentY - startY;

        // Если сдвинули больше чем на 5 пикселей, считаем это перетаскиванием, а не кликом
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
            hasMoved = true;
            if (e.type === 'touchmove') e.preventDefault(); // Блокируем скролл страницы
        }

        if (hasMoved) {
            let newLeft = initialLeft + deltaX;
            let newTop = initialTop + deltaY;

            // --- ОГРАНИЧЕНИЕ ВЫХОДА ЗА ПРЕДЕЛЫ ЭКРАНА ---
            const rect = fabWrapper.getBoundingClientRect();
            const maxLeft = window.innerWidth - rect.width;
            const maxTop = window.innerHeight - rect.height;

            // Запрещаем уходить за левый/правый и верхний/нижний края
            newLeft = Math.max(0, Math.min(newLeft, maxLeft));
            newTop = Math.max(0, Math.min(newTop, maxTop));

            fabWrapper.style.left = newLeft + 'px';
            fabWrapper.style.top = newTop + 'px';
        }
    }

    function dragEnd() {
        isDragging = false;
        document.removeEventListener('mousemove', dragMove);
        document.removeEventListener('mouseup', dragEnd);
        document.removeEventListener('touchmove', dragMove);
        document.removeEventListener('touchend', dragEnd);
    }

    // Слушатели для начала перетаскивания (с кнопки)
    fabToggleBtn.addEventListener('mousedown', dragStart);
    fabToggleBtn.addEventListener('touchstart', dragStart, { passive: true });

    // --- ЛОГИКА ОТКРЫТИЯ/ЗАКРЫТИЯ МЕНЮ ---
    fabToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        
        // Если было перетаскивание, отменяем клик!
        if (hasMoved) {
            e.preventDefault();
            return;
        }

        fabWrapper.classList.toggle('open');
        
        // Если меню открылось и вылезло за края экрана (т.к. стало шире),
        // плавно задвигаем его обратно в пределы экрана.
        if (fabWrapper.classList.contains('open')) {
            setTimeout(keepInBounds, 50); // Ждем долю секунды, чтобы CSS применил ширину
        }
    });

    // Функция возврата в рамки экрана при изменении ширины меню
    function keepInBounds() {
        const rect = fabWrapper.getBoundingClientRect();
        const maxLeft = window.innerWidth - rect.width;
        const maxTop = window.innerHeight - rect.height;

        let correctedLeft = Math.max(0, Math.min(rect.left, maxLeft));
        let correctedTop = Math.max(0, Math.min(rect.top, maxTop));

        // Если позиция нуждается в корректировке
        if (correctedLeft !== rect.left || correctedTop !== rect.top) {
            fabWrapper.classList.add('snap-transition'); // Добавляем плавность
            fabWrapper.style.left = correctedLeft + 'px';
            fabWrapper.style.top = correctedTop + 'px';
        }
    }

    // Закрытие меню при клике в любое другое место
    document.addEventListener('click', (e) => {
        if (!fabWrapper.contains(e.target) && fabWrapper.classList.contains('open')) {
            fabWrapper.classList.remove('open');
            // При закрытии (ширина уменьшилась) тоже проверяем границы на всякий случай
            setTimeout(keepInBounds, 300); 
        }
    });

    // Пересчет границ при повороте экрана телефона / изменении размера окна
    window.addEventListener('resize', keepInBounds);
});
</script>
