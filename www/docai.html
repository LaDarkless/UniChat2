<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Doc Reader & Summarizer</title>
    
    <!-- Библиотека для чтения .docx файлов -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <!-- Библиотека для рендера Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #0d0f12;
            --grid-color: rgba(255, 255, 255, 0.04);
            --panel-bg: rgba(20, 23, 28, 0.85);
            --user-msg: linear-gradient(135deg, #4f46e5, #7c3aed);
            --ai-msg: #232730;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 15px 20px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .settings-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .settings-btn:hover { background: rgba(255, 255, 255, 0.1); }

        /* Chat Container */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-msg);
            border-bottom-right-radius: 2px;
            white-space: pre-wrap; /* Оставляем переносы строк для юзера */
        }

        .ai-message {
            align-self: flex-start;
            background: var(--ai-msg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 2px;
            /* Убрали white-space: pre-wrap, так как теперь тут HTML */
        }

        .system-message {
            align-self: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            background: transparent;
            text-align: center;
        }

        /* =========================================
           Красивые стили для отрендеренного Markdown
           ========================================= */
        .markdown-body p { margin-bottom: 12px; }
        .markdown-body p:last-child { margin-bottom: 0; }
        
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
            color: #ffffff;
            margin: 1.5em 0 0.5em 0;
            font-weight: 600;
        }
        .markdown-body h1:first-child, .markdown-body h2:first-child, .markdown-body h3:first-child { margin-top: 0; }
        .markdown-body h1 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .markdown-body h2 { font-size: 1.2rem; }
        .markdown-body h3 { font-size: 1.1rem; }
        
        .markdown-body ul, .markdown-body ol { margin-bottom: 12px; padding-left: 24px; }
        .markdown-body li { margin-bottom: 4px; }
        
        .markdown-body strong { color: #ffffff; font-weight: bold; }
        .markdown-body em { color: #d1d5db; }
        
        .markdown-body blockquote {
            border-left: 4px solid #7c3aed;
            padding-left: 15px;
            color: #9ca3af;
            margin: 12px 0;
            background: rgba(124, 58, 237, 0.05);
            padding: 10px 15px;
            border-radius: 0 8px 8px 0;
        }

        .markdown-body code {
            background-color: #1a1d24;
            color: #f472b6; /* Розовый для инлайн кода */
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }

        .markdown-body pre {
            background-color: #111318;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .markdown-body pre code {
            background-color: transparent;
            color: #e5e7eb;
            padding: 0;
            border-radius: 0;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th { background-color: rgba(255,255,255,0.05); color: #fff; }

        /* File Badge (Индикатор загруженного файла) */
        .file-badge-container {
            padding: 0 20px 10px 20px;
            display: none; /* скрыт по умолчанию */
            animation: fadeIn 0.3s ease-in-out;
        }
        .file-badge {
            background: #232730;
            border: 1px solid #7c3aed;
            padding: 6px 12px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #e5e7eb;
        }
        .remove-file-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .remove-file-btn:hover {
            background: #dc2626;
            transform: scale(1.1);
        }

        /* Input Area */
        .input-area {
            padding: 15px 20px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .file-upload-label {
            background: #232730;
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            height: 45px;
        }
        .file-upload-label:hover { background: #323844; }
        #file-input { display: none; }

        textarea {
            flex: 1;
            background: #1a1d24;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            resize: none;
            height: 45px;
            max-height: 150px;
            overflow-y: auto;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #7c3aed; }

        .send-btn {
            background: var(--user-msg);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            height: 45px;
        }
        .send-btn:hover { opacity: 0.9; transform: scale(0.98); }
        .send-btn:disabled { background: #4b5563; cursor: not-allowed; }

        /* Settings Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal {
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 400px;
        }
        .modal h2 { margin-bottom: 15px; font-size: 1.2rem; }
        .modal input, .modal select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #1a1d24;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
        }
        .modal button {
            width: 100%;
            padding: 10px;
            background: #4f46e5;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .message { max-width: 95%; }
            header h1 { font-size: 1rem; }
            .input-area { padding: 10px; gap: 8px; }
            .send-btn { padding: 0 15px; }
        }

        .typing-indicator {
            display: inline-block;
            width: 6px; height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
            margin: 0 2px;
        }
        .typing-indicator:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.2; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(0.8); }
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Doc Reader 📝</h1>
        <button class="settings-btn" onclick="toggleModal()">⚙️ Настройки API</button>
    </header>

    <div id="chat-container">
        <!-- Первый вызов функции addMessage произойдет в JS -->
    </div>

    <!-- ВСТАВИТЬ ЭТОТ БЛОК: -->
    <div id="file-badge-container" class="file-badge-container">
        <div class="file-badge">
            📎 <span id="file-name-text">документ.docx</span>
            <button id="remove-file-btn" class="remove-file-btn" title="Удалить документ">✖</button>
        </div>
    </div>

    <div class="input-area">
        <label class="file-upload-label" title="Прикрепить .docx">
            📎
            <input type="file" id="file-input" accept=".docx">
        </label>
        <textarea id="message-input" placeholder="Введите сообщение (Shift+Enter для переноса)..." rows="1"></textarea>
        <button class="send-btn" id="send-btn">Отправить</button>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h2>Настройки ProxyAPI</h2>
            <label>API Ключ:</label>
            <input type="password" id="api-key" placeholder="sk-...">
            <label>Модель (OpenRouter):</label>
            <select id="ai-model">
                <option value="mistralai/mixtral-8x7b-instruct">Mixtral 8x7B (Рекомендуется)</option>
                <option value="meta-llama/llama-3-70b-instruct">LLaMA 3 70B</option>
                <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B (Хорош для РУ)</option>
                <option value="qwen/qwen3-235b-a22b-2507">Qwen 3 235b</option>
            </select>
            <button onclick="saveSettings()">Сохранить</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const settingsModal = document.getElementById('settings-modal');

        // Новые переменные для плашки файла
        const fileBadgeContainer = document.getElementById('file-badge-container');
        const fileNameText = document.getElementById('file-name-text');
        const removeFileBtn = document.getElementById('remove-file-btn');

        // Логика кнопки "Удалить файл"
        removeFileBtn.addEventListener('click', function() {
            documentContext = ""; // Очищаем память ИИ от текста
            fileInput.value = ''; // Сбрасываем input
            fileBadgeContainer.style.display = 'none'; // Прячем плашку
            addMessage("Прикрепленный документ удален.", "system-message");
        });

        let chatHistory =[
            { role: "system", content: "Ты профессиональный ИИ-ассистент. Твоя задача — читать документы пользователя и делать структурированные, понятные конспекты, выделяя главную мысль, ключевые термины и выводы. Отвечай на русском языке, ИСПОЛЬЗУЙ MARKDOWN для форматирования." }
        ];

        let documentContext = ""; 

        // Настройка marked.js (чтобы ссылки открывались в новой вкладке, если ИИ их сгенерирует)
        marked.use({
            renderer: {
                link(href, title, text) {
                    return `<a href="${href}" target="_blank" rel="noopener noreferrer" style="color: #60a5fa;">${text}</a>`;
                }
            }
        });

        // Функция добавления сообщений (теперь умеет рендерить Markdown!)
        function addMessage(text, className, isMarkdown = false) {
            const msgDiv = document.createElement('div');
            
            // Если это ответ ИИ, добавляем класс markdown-body для стилей
            msgDiv.className = `message ${className} ${isMarkdown ? 'markdown-body' : ''}`;
            
            if (isMarkdown) {
                // Преобразуем Markdown в HTML
                msgDiv.innerHTML = marked.parse(text);
            } else {
                // Сообщения пользователя и системы добавляем как безопасный текст
                msgDiv.innerText = text;
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        // Приветственное сообщение
        addMessage("Привет! Я твой ИИ-ассистент. Загрузи файл Word (.docx) или напиши мне, и я помогу сделать отличный конспект.", "system-message");

        // Авто-расширение textarea
        messageInput.addEventListener('input', function() {
            this.style.height = '45px';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Отправка по Enter
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // Обработка загрузки файла
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            addMessage(`Считываю файл: ${file.name}...`, 'system-message');
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const arrayBuffer = event.target.result;
                mammoth.extractRawText({arrayBuffer: arrayBuffer})
                    .then(function(result){
                        const text = result.value;
                        if(text.trim() === "") {
                            addMessage("Не удалось извлечь текст или документ пуст.", 'system-message');
                            return;
                        }
                        documentContext = text;
                        addMessage(`Документ "${file.name}" успешно загружен! В нём ~${text.length} символов. Теперь напишите, что с ним сделать (например, "Сделай конспект").`, 'system-message');
                        // Показываем плашку
                        fileNameText.innerText = file.name;
                        fileBadgeContainer.style.display = 'block';
                    })
                    .catch(function(err){
                        console.error(err);
                        addMessage("Ошибка при чтении файла.", 'system-message');
                    });
            };
            reader.readAsArrayBuffer(file);
            fileInput.value = ''; 
        });

        function toggleModal() {
            settingsModal.style.display = settingsModal.style.display === 'flex' ? 'none' : 'flex';
            document.getElementById('api-key').value = localStorage.getItem('proxyApiKey') || '';
            document.getElementById('ai-model').value = localStorage.getItem('proxyApiModel') || 'mistralai/mixtral-8x7b-instruct';
        }

        function saveSettings() {
            localStorage.setItem('proxyApiKey', document.getElementById('api-key').value);
            localStorage.setItem('proxyApiModel', document.getElementById('ai-model').value);
            toggleModal();
            addMessage("Настройки сохранены.", "system-message");
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && !documentContext) return;

            const apiKey = localStorage.getItem('proxyApiKey');
            const model = localStorage.getItem('proxyApiModel') || 'mistralai/mixtral-8x7b-instruct';

            if (!apiKey) {
                toggleModal();
                alert("Пожалуйста, введите API ключ от ProxyAPI.");
                return;
            }

            let userContent = text || "Сделай подробный конспект загруженного документа, используй заголовки и списки Markdown.";
            
            if (documentContext) {
                userContent = `[ТЕКСТ ДОКУМЕНТА НАЧАЛО]\n${documentContext}\n[ТЕКСТ ДОКУМЕНТА КОНЕЦ]\n\nЗадание пользователя: ${userContent}`;
                documentContext = ""; 
                fileBadgeContainer.style.display = 'none'; // ПРЯЧЕМ ПЛАШКУ ТУТ
            }

            // Добавляем сообщение пользователя без Markdown парсера
            addMessage(text || "Отправлен документ на анализ 📎", 'user-message', false);
            
            messageInput.value = '';
            messageInput.style.height = '45px';
            sendBtn.disabled = true;

            chatHistory.push({ role: "user", content: userContent });

            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message ai-message';
            loadingMsg.innerHTML = '<div class="typing-indicator"></div><div class="typing-indicator"></div><div class="typing-indicator"></div>';
            chatContainer.appendChild(loadingMsg);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch("https://api.proxyapi.ru/openrouter/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: chatHistory,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    throw new Error(`Ошибка HTTP: ${response.status}`);
                }

                const data = await response.json();
                const aiReply = data.choices[0].message.content;

                chatContainer.removeChild(loadingMsg);
                
                // ВАЖНО: Третий параметр `true` указывает, что нужно пропустить текст через marked.parse()
                addMessage(aiReply, 'ai-message', true);

                chatHistory.push({ role: "assistant", content: aiReply });
                if (chatHistory.length > 10) {
                    chatHistory = [chatHistory[0], ...chatHistory.slice(-9)];
                }

            } catch (error) {
                console.error(error);
                chatContainer.removeChild(loadingMsg);
                addMessage("Произошла ошибка API. Проверьте ключ и консоль.", 'system-message');
                chatHistory.pop(); 
            } finally {
                sendBtn.disabled = false;
            }
        }
    </script>
</body>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --primary-sky: #00E5FF;
    --primary-heaven: #a78bfa;
    --gold-halo: #FFE082;
    --deep-ocean: #081020;
    --neon-blue: #00f0ff;
    --neon-purple: #bd00ff;
    --font-sans: 'Plus Jakarta Sans', -apple-system, sans-serif;
  }

  /* Враппер плавающей кнопки */
  .fab-wrapper {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 999999;
    width: 68px;
    height: 68px;
    pointer-events: none;
    will-change: transform;
    filter: drop-shadow(0 10px 30px rgba(0, 229, 255, 0.25));
  }

  /* Основная круглая кнопка (Триггер) */
  .fab-button {
    pointer-events: auto;
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(20, 30, 55, 0.9) 0%, rgba(8, 12, 24, 0.95) 100%);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1.5px solid rgba(0, 229, 255, 0.3);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    box-shadow: 
      0 0 20px rgba(0, 229, 255, 0.15),
      inset 0 1px 2px rgba(255, 255, 255, 0.2);
    transition: 
      border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
      box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1),
      transform 0.2s ease;
    touch-action: none;
    overflow: visible;
  }

  .fab-button:active {
    cursor: grabbing;
    transform: scale(0.95);
  }

  /* Анимация и свечение при наведении */
  .fab-button:hover {
    border-color: var(--primary-sky);
    box-shadow: 
      0 0 30px rgba(0, 229, 255, 0.4),
      0 0 15px rgba(167, 139, 250, 0.3),
      inset 0 1px 4px rgba(255, 255, 255, 0.4);
  }

  /* Стилизация SVG Эмблемы (Нимб + Трезубец) */
  .emblem-svg {
    width: 110%;
    height: 110%;
    position: absolute;
    transform: scale(1);
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Вращение нимба Канаты */
  .emblem-halo {
    transform-origin: 50px 18px;
    animation: haloRotate 12s linear infinite;
  }

  /* Покачивание крыльев */
  .emblem-wings path {
    transform-origin: 50px 52px;
    animation: wingBreathe 4s ease-in-out infinite alternate;
  }

  .emblem-wings path:nth-child(even) {
    animation-delay: -2s;
  }

  @keyframes haloRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes wingBreathe {
    0% { transform: scale(0.96) rotate(-2deg); }
    100% { transform: scale(1.02) rotate(2deg); }
  }

  /* Эффект при открытом состоянии */
  .fab-wrapper.open .fab-button {
    border-color: var(--primary-heaven);
    box-shadow: 0 0 40px rgba(167, 139, 250, 0.5);
  }

  .fab-wrapper.open .emblem-svg {
    transform: rotate(45deg) scale(0.9);
  }

  /* Глобальный Док навигации */
  .global-dock {
    position: absolute;
    top: 50%;
    right: calc(100% + 20px);
    transform: translateY(-50%) scale(0.9) translateX(30px);
    transform-origin: right center;

    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(6, 11, 25, 0.75);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid rgba(0, 229, 255, 0.15);
    border-radius: 24px;
    box-shadow: 
      0 30px 60px rgba(0, 4, 16, 0.8),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);

    max-width: calc(100vw - 120px);
    overflow-x: auto;
    scrollbar-width: none;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: 
      transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
      opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
      visibility 0.4s;
  }

  .global-dock::-webkit-scrollbar { display: none; }

  /* Фоновый интерактивный холст */
  .dock-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 24px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* Позиционирование выезжающих панелей */
  .fab-wrapper.open .global-dock {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateY(-50%) scale(1) translateX(0);
  }

  .fab-wrapper.is-left .global-dock {
    right: auto;
    left: calc(100% + 20px);
    transform-origin: left center;
    transform: translateY(-50%) scale(0.9) translateX(-30px);
  }
  .fab-wrapper.is-left.open .global-dock {
    transform: translateY(-50%) scale(1) translateX(0);
  }

  .fab-wrapper.is-up .global-dock {
    flex-direction: column;
    right: 50%;
    top: auto;
    bottom: calc(100% + 20px);
    transform-origin: bottom center;
    transform: translateX(50%) scale(0.9) translateY(30px);
    max-height: calc(100vh - 120px);
    max-width: none;
    overflow-y: auto;
  }
  .fab-wrapper.is-up.open .global-dock {
    transform: translateX(50%) scale(1) translateY(0);
  }

  .fab-wrapper.is-down .global-dock {
    flex-direction: column;
    right: 50%;
    bottom: auto;
    top: calc(100% + 20px);
    transform-origin: top center;
    transform: translateX(50%) scale(0.9) translateY(-30px);
    max-height: calc(100vh - 120px);
    max-width: none;
    overflow-y: auto;
  }
  .fab-wrapper.is-down.open .global-dock {
    transform: translateX(50%) scale(1) translateY(0);
  }

  /* Элементы меню навигации */
  .dock-item {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 10px 16px;
    border-radius: 14px;
    color: rgba(255, 255, 255, 0.65);
    text-decoration: none;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    white-space: nowrap;
    border: 1px solid transparent;
  }

  /* Эффект наведения с деформацией глитча */
  .dock-item:hover {
    color: #fff;
    background: rgba(0, 229, 255, 0.08);
    border-color: rgba(0, 229, 255, 0.2);
    box-shadow: 0 4px 15px rgba(0, 229, 255, 0.1);
    filter: url(#glitch-distortion);
  }

  .dock-item.active {
    color: #fff;
    background: rgba(167, 139, 250, 0.15);
    border-color: rgba(167, 139, 250, 0.3);
    box-shadow: 
      0 4px 20px rgba(167, 139, 250, 0.2),
      inset 0 0 12px rgba(167, 139, 250, 0.1);
  }

  /* Стилизация иконок */
  .dock-icon-wrapper {
    position: relative;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dock-icon {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 4px rgba(0, 229, 255, 0.4));
    pointer-events: none;
    user-select: none;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .dock-item:hover .dock-icon {
    transform: scale(1.18) rotate(5deg);
  }

  .dock-text {
    font-family: 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  /* Хвост-индикатор для активного пункта */
  .dock-item.active::after {
    content: "";
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 3px;
    background: var(--primary-heaven);
    border-radius: 4px;
    box-shadow: 0 0 8px var(--primary-heaven);
  }

  /* Адаптивность для мобильных экранов */
  @media (max-width: 768px) {
    .fab-wrapper {
      bottom: 20px;
      right: 20px;
      width: 58px;
      height: 58px;
    }
    
    .global-dock {
      padding: 8px;
      gap: 6px;
      border-radius: 20px;
      max-width: calc(100vw - 80px);
    }

    .dock-canvas {
      border-radius: 20px;
    }

    .dock-item {
      padding: 10px;
      border-radius: 12px;
    }

    .dock-text {
      display: none;
    }

    .dock-icon {
      width: 26px;
      height: 26px;
    }

    .dock-item.active::after {
      bottom: -1px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .emblem-halo, .emblem-wings path {
      animation: none !important;
    }
    .fab-wrapper, .global-dock {
      transition: none !important;
    }
  }
</style>

<script>
  /**
   * Контроллер глитч-эффектов на основе деформации SVG.
   */
  class GlitchEngine {
    constructor() {
      this.map = document.getElementById('displacement-map');
      this.isGlitching = false;
    }

    trigger() {
      if (this.isGlitching) return;
      this.isGlitching = true;
      let start = null;

      const animate = (timestamp) => {
        if (!start) start = timestamp;
        const progress = timestamp - start;

        if (progress < 150) {
          // Интенсивный глитч на взлете
          const scale = Math.sin(progress * 0.1) * 14;
          this.map.setAttribute('scale', Math.abs(scale));
          requestAnimationFrame(animate);
        } else {
          this.map.setAttribute('scale', '0');
          this.isGlitching = false;
        }
      };

      requestAnimationFrame(animate);
    }
  }

  /**
   * Procedural Dynamic Canvas Background.
   * Отрисовывает звездное небо Канаты и морские глубины Гуры в реальном времени.
   */
  class CanvasBackground {
    constructor(canvasId) {
      this.canvas = document.getElementById(canvasId);
      this.ctx = this.canvas.getContext('2d');
      this.stars = [];
      this.time = 0;
      this.dpr = window.devicePixelRatio || 1;

      this.resize();
      this.initStars();
      this.animate = this.animate.bind(this);
      requestAnimationFrame(this.animate);
    }

    resize() {
      const parent = this.canvas.parentElement;
      this.width = parent.offsetWidth;
      this.height = parent.offsetHeight;
      this.canvas.width = this.width * this.dpr;
      this.canvas.height = this.height * this.dpr;
      this.ctx.scale(this.dpr, this.dpr);
      
      // Перегенерируем звезды, чтобы они гармонично заполнили новые границы экрана
      this.initStars();
    }

    initStars() {
      this.stars = Array.from({ length: 15 }, () => ({
        x: Math.random() * this.width,
        y: Math.random() * this.height,
        size: Math.random() * 1.5 + 0.5,
        alpha: Math.random(),
        speed: 0.01 + Math.random() * 0.02
      }));
    }

    animate() {
      this.time += 0.02;
      this.ctx.clearRect(0, 0, this.width, this.height);

      // 1. Рисуем космические звезды (Небеса)
      this.stars.forEach(star => {
        star.alpha += star.speed;
        if (star.alpha > 1 || star.alpha < 0) star.speed = -star.speed;
        this.ctx.fillStyle = `rgba(167, 139, 250, ${Math.max(0, star.alpha)})`;
        this.ctx.beginPath();
        this.ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        this.ctx.fill();
      });

      // 2. Рисуем интерактивные синусоидальные волны (Океан)
      this.ctx.strokeStyle = 'rgba(0, 229, 255, 0.12)';
      this.ctx.lineWidth = 1.5;
      this.ctx.beginPath();
      for (let x = 0; x <= this.width; x += 5) {
        const y = this.height * 0.8 + Math.sin(x * 0.05 + this.time) * 4;
        if (x === 0) this.ctx.moveTo(x, y);
        else this.ctx.lineTo(x, y);
      }
      this.ctx.stroke();

      requestAnimationFrame(this.animate);
    }
  }

  /**
   * Главный движок управления док-панелью.
   */
   class CelestialSeaDock {
    constructor() {
      this.wrapper = document.getElementById("fabWrapper");
      this.btn = document.getElementById("fabToggleBtn");
      this.dock = document.getElementById("globalDock");

      // Безопасно связываем с глобальным аудио-движком терминала
      this.synth = window.sound || { playChime() {}, playBubble() {} }; 
      
      this.glitch = new GlitchEngine();
      this.bg = new CanvasBackground("dockCanvas");
      // ...

      // Физика Lerp (сглаживание перемещения)
      this.pos = { currentX: 0, currentY: 0, targetX: 0, targetY: 0 };
      this.isDragging = false;
      this.hasMoved = false;
      this.dragOffset = { x: 0, y: 0 };

      this.initEvents();
      this.initActiveLink();
      this.snapToInitial();
    }

    snapToInitial() {
      // Инициализируем стартовую позицию в правом нижнем углу
      const initialX = window.innerWidth - 98; // 30px offset + 68px width
      const initialY = window.innerHeight - 98;
      this.pos.currentX = this.pos.targetX = initialX;
      this.pos.currentY = this.pos.targetY = initialY;
      this.updateDOMPosition();
    }

    initActiveLink() {
      let path = window.location.pathname.split("/").pop();
      if (!path) path = "index.html";
      document.querySelectorAll(".dock-item").forEach(item => {
        if (item.getAttribute("href") === path) {
          item.classList.add("active");
        }
      });
    }

    initEvents() {
      // Клик по кнопке
      this.btn.addEventListener("click", (e) => {
        if (this.hasMoved) {
          e.preventDefault();
          return;
        }
        this.toggleDock();
      });

      // Drag events
      this.btn.addEventListener("mousedown", (e) => this.dragStart(e));
      this.btn.addEventListener("touchstart", (e) => this.dragStart(e), { passive: true });

      window.addEventListener("mousemove", (e) => this.dragMove(e));
      window.addEventListener("touchmove", (e) => this.dragMove(e), { passive: false });

      window.addEventListener("mouseup", () => this.dragEnd());
      window.addEventListener("touchend", () => this.dragEnd());

      // Закрытие по клику вне
      document.addEventListener("click", (e) => {
        if (!this.wrapper.contains(e.target) && this.wrapper.classList.contains("open")) {
          this.wrapper.classList.remove("open");
          this.synth.playBubble();
        }
      });

      // Resize observer
      window.addEventListener("resize", () => {
        this.bg.resize();
        this.keepInBounds();
      });

      // Глитч при наведении на пункты меню
      document.querySelectorAll('.dock-item').forEach(item => {
        item.addEventListener('mouseenter', () => {
          this.glitch.trigger();
          this.synth.playChime();
        });
      });
    }

    toggleDock() {
      this.updateDockDirection();
      const isOpen = this.wrapper.classList.toggle("open");
      if (isOpen) {
        this.synth.playChime();
      } else {
        this.synth.playBubble();
      }
    }

    dragStart(e) {
      this.isDragging = true;
      this.hasMoved = false;

      // Получаем текущие координаты из объекта положения
      const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
      const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;

      this.dragOffset.x = clientX - this.pos.currentX;
      this.dragOffset.y = clientY - this.pos.currentY;

      this.wrapper.style.willChange = "transform";
    }

    dragMove(e) {
      if (!this.isDragging) return;

      const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
      const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;

      const targetX = clientX - this.dragOffset.x;
      const targetY = clientY - this.dragOffset.y;

      // Лимиты экрана
      const maxLeft = window.innerWidth - this.wrapper.offsetWidth;
      const maxTop = window.innerHeight - this.wrapper.offsetHeight;

      this.pos.targetX = Math.max(0, Math.min(targetX, maxLeft));
      this.pos.targetY = Math.max(0, Math.min(targetY, maxTop));

      if (Math.abs(this.pos.targetX - this.pos.currentX) > 4 || Math.abs(this.pos.targetY - this.pos.currentY) > 4) {
        this.hasMoved = true;
        if (e.cancelable) e.preventDefault();
      }

      this.updatePhysics();
    }

    dragEnd() {
      if (!this.isDragging) return;
      this.isDragging = false;
      this.wrapper.style.willChange = "auto";
      this.keepInBounds();
    }

    /**
     * Сглаживание движения с использованием LERP (Linear Interpolation).
     * Дает благородное "тяжелое" скольжение виджета.
     */
    updatePhysics() {
      if (!this.isDragging && Math.abs(this.pos.targetX - this.pos.currentX) < 0.1 && Math.abs(this.pos.targetY - this.pos.currentY) < 0.1) {
        return;
      }

      const lerpFactor = this.isDragging ? 0.25 : 0.15;
      this.pos.currentX += (this.pos.targetX - this.pos.currentX) * lerpFactor;
      this.pos.currentY += (this.pos.targetY - this.pos.currentY) * lerpFactor;

      this.updateDOMPosition();
      this.updateDockDirection();

      if (this.isDragging) {
        requestAnimationFrame(() => this.updatePhysics());
      }
    }

    updateDOMPosition() {
      this.wrapper.style.left = `${this.pos.currentX}px`;
      this.wrapper.style.top = `${this.pos.currentY}px`;
      this.wrapper.style.bottom = "auto";
      this.wrapper.style.right = "auto";
    }

    updateDockDirection() {
      const rect = this.wrapper.getBoundingClientRect();
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      this.wrapper.classList.remove("is-left", "is-up", "is-down");

      const dockWidth = this.dock.scrollWidth;
      const gap = 20;

      const spaceLeft = rect.left;
      const spaceRight = screenWidth - rect.right;
      const spaceTop = rect.top;
      const spaceBottom = screenHeight - rect.bottom;

      if (spaceRight >= dockWidth + gap) {
        this.wrapper.classList.add("is-left"); // Открывается вправо
      } else if (spaceLeft < dockWidth + gap) {
        // Вертикальный фоллбек, если по бокам места нет
        if (spaceTop > spaceBottom) {
          this.wrapper.classList.add("is-up");
        } else {
          this.wrapper.classList.add("is-down");
        }
      }
    }

    keepInBounds() {
      const maxLeft = window.innerWidth - this.wrapper.offsetWidth;
      const maxTop = window.innerHeight - this.wrapper.offsetHeight;

      this.pos.targetX = Math.max(10, Math.min(this.pos.targetX, maxLeft - 10));
      this.pos.targetY = Math.max(10, Math.min(this.pos.targetY, maxTop - 10));
      
      this.updatePhysics();
    }
  }

  // Запуск интерфейса после загрузки DOM
  document.addEventListener("DOMContentLoaded", () => {
    window.celestialSea = new CelestialSeaDock();
  });
</script>
