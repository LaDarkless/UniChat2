<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Web Browser</title>
    <style>
        :root {
            --bg-dark: #000000;
            --grid-color: rgba(255, 255, 255, 0.12);
            --border-color: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --input-bg: rgba(20, 20, 20, 0.9);
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .browser-window {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .toolbar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
            z-index: 10;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
        }

        button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 6px;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent);
            color: var(--bg-dark);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.05);
        }

        .address-bar-wrapper {
            flex-grow: 1;
            display: flex;
            position: relative;
        }

        #address-input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0 16px;
            height: 36px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }

        #address-input:focus {
            border-color: var(--accent);
            background-color: #0a0a0a;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        #address-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #btn-go {
            width: auto;
            padding: 0 16px;
            font-weight: 500;
        }

        .proxy-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            user-select: none;
        }

        .proxy-toggle input {
            cursor: pointer;
            accent-color: #ffffff;
        }

        .viewport {
            flex-grow: 1;
            background-color: #ffffff;
            position: relative;
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background-color: #ffffff; /* Белый фон для загрузки */
        }

        @media (max-width: 650px) {
            .toolbar {
                padding: 8px;
                gap: 8px;
                flex-wrap: wrap;
            }
            .address-bar-wrapper {
                order: -1;
                width: 100%;
                flex-basis: 100%;
            }
            .proxy-toggle {
                margin-left: auto;
            }
            #btn-go span {
                display: none;
            }
            #btn-go::after {
                content: "🔍";
            }
        }
    </style>
</head>
<body>

    <div class="browser-window">
        <header class="toolbar">
            <div class="nav-buttons">
                <button id="btn-back" title="Назад">&#8592;</button>
                <button id="btn-forward" title="Вперед">&#8594;</button>
                <button id="btn-refresh" title="Обновить">&#10227;</button>
            </div>
            
            <div class="address-bar-wrapper">
                <input type="text" id="address-input" placeholder="Введите сайт или поисковый запрос..." autocomplete="off">
            </div>
            
            <button id="btn-go" title="Перейти"><span>Enter</span></button>

            <label class="proxy-toggle" title="Попытаться обойти блокировки сайтов">
                <input type="checkbox" id="use-proxy"> Anti-Block
            </label>
        </header>

        <main class="viewport">
            <iframe id="webview" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const addressInput = document.getElementById("address-input");
            const btnGo = document.getElementById("btn-go");
            const btnBack = document.getElementById("btn-back");
            const btnForward = document.getElementById("btn-forward");
            const btnRefresh = document.getElementById("btn-refresh");
            const webview = document.getElementById("webview");
            const proxyToggle = document.getElementById("use-proxy");

            let historyStack =[];
            let currentIndex = -1;

            function updateNavButtons() {
                btnBack.disabled = currentIndex <= 0;
                btnForward.disabled = currentIndex >= historyStack.length - 1;
            }

            function navigateTo(url, isHistoryAction = false) {
                let finalUrl = url.trim();
                let displayUrl = finalUrl;
                
                if (!finalUrl) return;

                const isDomain = /^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}([\/\w \.-]*)*\/?$/.test(finalUrl) || finalUrl.startsWith("http");

                if (isDomain) {
                    if (!finalUrl.startsWith("http://") && !finalUrl.startsWith("https://")) {
                        finalUrl = "https://" + finalUrl;
                        displayUrl = finalUrl;
                    }
                    
                    if (proxyToggle.checked) {
                        finalUrl = "https://corsproxy.io/?" + encodeURIComponent(finalUrl);
                    }
                } else {
                    // Оставляем рабочий fmhy.net (без слешей в начале, чтобы код работал!)
                    finalUrl = "https://www.google.com/search?q=" + encodeURIComponent(finalUrl) + "&igu=1";
                    //finalUrl = "https://searx.fmhy.net/search?q=" + encodeURIComponent(finalUrl) + "&language=ru&theme=simple";
                    displayUrl = finalUrl; 
                }

                addressInput.value = displayUrl;

                if (!isHistoryAction) {
                    historyStack = historyStack.slice(0, currentIndex + 1);
                    historyStack.push(displayUrl);
                    currentIndex++;
                }

                // МАГИЯ ДЛЯ APK:
                // Проверяем, запущено ли приложение на телефоне через Capacitor
                if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Browser) {
                    // На телефоне открываем через системный браузер, который ИГНОРИРУЕТ блокировки X-Frame-Options
                    window.Capacitor.Plugins.Browser.open({ url: finalUrl });
                } else {
                    // Если открыто просто на ПК в браузере — грузим в наш iframe
                    webview.src = finalUrl;
                }

                updateNavButtons();
                addressInput.blur(); 
            }

            btnGo.addEventListener("click", () => navigateTo(addressInput.value));
            addressInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") navigateTo(addressInput.value);
            });

            btnBack.addEventListener("click", () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    navigateTo(historyStack[currentIndex], true);
                }
            });

            btnForward.addEventListener("click", () => {
                if (currentIndex < historyStack.length - 1) {
                    currentIndex++;
                    navigateTo(historyStack[currentIndex], true);
                }
            });

            btnRefresh.addEventListener("click", () => {
                if (currentIndex >= 0) navigateTo(addressInput.value, true);
            });

            updateNavButtons();
            
            // Запускаем поиск при старте
            navigateTo("Технологии");
        });
    </script>
</body>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Space+Grotesk:wght@500;700&display=swap');
  
    :root {
      --primary-sky: #00E5FF;
      --primary-heaven: #a78bfa;
      --gold-halo: #FFE082;
      --deep-ocean: #081020;
      --neon-blue: #00f0ff;
      --neon-purple: #bd00ff;
      --font-sans: 'Plus Jakarta Sans', -apple-system, sans-serif;
    }
  
    /* Враппер плавающей кнопки */
    .fab-wrapper {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 999999;
      width: 68px;
      height: 68px;
      pointer-events: none;
      will-change: transform;
      filter: drop-shadow(0 10px 30px rgba(0, 229, 255, 0.25));
    }
  
    /* Основная круглая кнопка (Триггер) */
    .fab-button {
      pointer-events: auto;
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(20, 30, 55, 0.9) 0%, rgba(8, 12, 24, 0.95) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(0, 229, 255, 0.3);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      box-shadow: 
        0 0 20px rgba(0, 229, 255, 0.15),
        inset 0 1px 2px rgba(255, 255, 255, 0.2);
      transition: 
        border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
        box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.2s ease;
      touch-action: none;
      overflow: visible;
    }
  
    .fab-button:active {
      cursor: grabbing;
      transform: scale(0.95);
    }
  
    /* Анимация и свечение при наведении */
    .fab-button:hover {
      border-color: var(--primary-sky);
      box-shadow: 
        0 0 30px rgba(0, 229, 255, 0.4),
        0 0 15px rgba(167, 139, 250, 0.3),
        inset 0 1px 4px rgba(255, 255, 255, 0.4);
    }
  
    /* Стилизация SVG Эмблемы (Нимб + Трезубец) */
    .emblem-svg {
      width: 110%;
      height: 110%;
      position: absolute;
      transform: scale(1);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
  
    /* Вращение нимба Канаты */
    .emblem-halo {
      transform-origin: 50px 18px;
      animation: haloRotate 12s linear infinite;
    }
  
    /* Покачивание крыльев */
    .emblem-wings path {
      transform-origin: 50px 52px;
      animation: wingBreathe 4s ease-in-out infinite alternate;
    }
  
    .emblem-wings path:nth-child(even) {
      animation-delay: -2s;
    }
  
    @keyframes haloRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  
    @keyframes wingBreathe {
      0% { transform: scale(0.96) rotate(-2deg); }
      100% { transform: scale(1.02) rotate(2deg); }
    }
  
    /* Эффект при открытом состоянии */
    .fab-wrapper.open .fab-button {
      border-color: var(--primary-heaven);
      box-shadow: 0 0 40px rgba(167, 139, 250, 0.5);
    }
  
    .fab-wrapper.open .emblem-svg {
      transform: rotate(45deg) scale(0.9);
    }
  
    /* Глобальный Док навигации */
    .global-dock {
      position: absolute;
      top: 50%;
      right: calc(100% + 20px);
      transform: translateY(-50%) scale(0.9) translateX(30px);
      transform-origin: right center;
  
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: rgba(6, 11, 25, 0.75);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid rgba(0, 229, 255, 0.15);
      border-radius: 24px;
      box-shadow: 
        0 30px 60px rgba(0, 4, 16, 0.8),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
  
      max-width: calc(100vw - 120px);
      overflow-x: auto;
      scrollbar-width: none;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: 
        transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
        opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
        visibility 0.4s;
    }
  
    .global-dock::-webkit-scrollbar { display: none; }
  
    /* Фоновый интерактивный холст */
    .dock-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }
  
    /* Позиционирование выезжающих панелей */
    .fab-wrapper.open .global-dock {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(-50%) scale(1) translateX(0);
    }
  
    .fab-wrapper.is-left .global-dock {
      right: auto;
      left: calc(100% + 20px);
      transform-origin: left center;
      transform: translateY(-50%) scale(0.9) translateX(-30px);
    }
    .fab-wrapper.is-left.open .global-dock {
      transform: translateY(-50%) scale(1) translateX(0);
    }
  
    .fab-wrapper.is-up .global-dock {
      flex-direction: column;
      right: 50%;
      top: auto;
      bottom: calc(100% + 20px);
      transform-origin: bottom center;
      transform: translateX(50%) scale(0.9) translateY(30px);
      max-height: calc(100vh - 120px);
      max-width: none;
      overflow-y: auto;
    }
    .fab-wrapper.is-up.open .global-dock {
      transform: translateX(50%) scale(1) translateY(0);
    }
  
    .fab-wrapper.is-down .global-dock {
      flex-direction: column;
      right: 50%;
      bottom: auto;
      top: calc(100% + 20px);
      transform-origin: top center;
      transform: translateX(50%) scale(0.9) translateY(-30px);
      max-height: calc(100vh - 120px);
      max-width: none;
      overflow-y: auto;
    }
    .fab-wrapper.is-down.open .global-dock {
      transform: translateX(50%) scale(1) translateY(0);
    }
  
    /* Элементы меню навигации */
    .dock-item {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 14px;
      color: rgba(255, 255, 255, 0.65);
      text-decoration: none;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      white-space: nowrap;
      border: 1px solid transparent;
    }
  
    /* Эффект наведения с деформацией глитча */
    .dock-item:hover {
      color: #fff;
      background: rgba(0, 229, 255, 0.08);
      border-color: rgba(0, 229, 255, 0.2);
      box-shadow: 0 4px 15px rgba(0, 229, 255, 0.1);
      filter: url(#glitch-distortion);
    }
  
    .dock-item.active {
      color: #fff;
      background: rgba(167, 139, 250, 0.15);
      border-color: rgba(167, 139, 250, 0.3);
      box-shadow: 
        0 4px 20px rgba(167, 139, 250, 0.2),
        inset 0 0 12px rgba(167, 139, 250, 0.1);
    }
  
    /* Стилизация иконок */
    .dock-icon-wrapper {
      position: relative;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  
    .dock-icon {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 4px rgba(0, 229, 255, 0.4));
      pointer-events: none;
      user-select: none;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
  
    .dock-item:hover .dock-icon {
      transform: scale(1.18) rotate(5deg);
    }
  
    .dock-text {
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.1em;
    }
  
    /* Хвост-индикатор для активного пункта */
    .dock-item.active::after {
      content: "";
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 3px;
      background: var(--primary-heaven);
      border-radius: 4px;
      box-shadow: 0 0 8px var(--primary-heaven);
    }
  
    /* Адаптивность для мобильных экранов */
    @media (max-width: 768px) {
      .fab-wrapper {
        bottom: 20px;
        right: 20px;
        width: 58px;
        height: 58px;
      }
      
      .global-dock {
        padding: 8px;
        gap: 6px;
        border-radius: 20px;
        max-width: calc(100vw - 80px);
      }
  
      .dock-canvas {
        border-radius: 20px;
      }
  
      .dock-item {
        padding: 10px;
        border-radius: 12px;
      }
  
      .dock-text {
        display: none;
      }
  
      .dock-icon {
        width: 26px;
        height: 26px;
      }
  
      .dock-item.active::after {
        bottom: -1px;
      }
    }
  
    @media (prefers-reduced-motion: reduce) {
      .emblem-halo, .emblem-wings path {
        animation: none !important;
      }
      .fab-wrapper, .global-dock {
        transition: none !important;
      }
    }
  </style>
  
  <!-- SVG Фильтры глитча и деформации воды -->
  <svg style="position: absolute; width: 0; height: 0;" width="0" height="0">
    <defs>
      <filter id="glitch-distortion">

        <feDisplacementMap in="SourceGraphic" in2="wave" scale="0" xChannelSelector="R" yChannelSelector="G" id="displacement-map" />

  </svg>

      <svg class="emblem-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- FRONTEND ENGINE (JavaScript)                                           -->
  <!-- ======================================================================= -->
  <script>
    /**
     * Контроллер глитч-эффектов на основе деформации SVG.
     */
    class GlitchEngine {
      constructor() {
        this.map = document.getElementById('displacement-map');
        this.isGlitching = false;
      }
  
      trigger() {
        if (this.isGlitching) return;
        this.isGlitching = true;
        let start = null;
  
        const animate = (timestamp) => {
          if (!start) start = timestamp;
          const progress = timestamp - start;
  
          if (progress < 150) {
            // Интенсивный глитч на взлете
            const scale = Math.sin(progress * 0.1) * 14;
            this.map.setAttribute('scale', Math.abs(scale));
            requestAnimationFrame(animate);
          } else {
            this.map.setAttribute('scale', '0');
            this.isGlitching = false;
          }
        };
  
        requestAnimationFrame(animate);
      }
    }
  
    /**
     * Procedural Dynamic Canvas Background.
     * Отрисовывает звездное небо Канаты и морские глубины Гуры в реальном времени.
     */
    class CanvasBackground {
      constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.stars = [];
        this.time = 0;
        this.dpr = window.devicePixelRatio || 1;
  
        this.resize();
        this.initStars();
        this.animate = this.animate.bind(this);
        requestAnimationFrame(this.animate);
      }
  
      resize() {
        const parent = this.canvas.parentElement;
        this.width = parent.offsetWidth;
        this.height = parent.offsetHeight;
        this.canvas.width = this.width * this.dpr;
        this.canvas.height = this.height * this.dpr;
        this.ctx.scale(this.dpr, this.dpr);
      }
  
      initStars() {
        this.stars = Array.from({ length: 15 }, () => ({
          x: Math.random() * this.width,
          y: Math.random() * this.height,
          size: Math.random() * 1.5 + 0.5,
          alpha: Math.random(),
          speed: 0.01 + Math.random() * 0.02
        }));
      }
  
      animate() {
        this.time += 0.02;
        this.ctx.clearRect(0, 0, this.width, this.height);
  
        // 1. Рисуем космические звезды (Небеса)
        this.stars.forEach(star => {
          star.alpha += star.speed;
          if (star.alpha > 1 || star.alpha < 0) star.speed = -star.speed;
          this.ctx.fillStyle = `rgba(167, 139, 250, ${Math.max(0, star.alpha)})`;
          this.ctx.beginPath();
          this.ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          this.ctx.fill();
        });
  
        // 2. Рисуем интерактивные синусоидальные волны (Океан)
        this.ctx.strokeStyle = 'rgba(0, 229, 255, 0.12)';
        this.ctx.lineWidth = 1.5;
        this.ctx.beginPath();
        for (let x = 0; x <= this.width; x += 5) {
          const y = this.height * 0.8 + Math.sin(x * 0.05 + this.time) * 4;
          if (x === 0) this.ctx.moveTo(x, y);
          else this.ctx.lineTo(x, y);
        }
        this.ctx.stroke();
  
        requestAnimationFrame(this.animate);
      }
    }
  
    /**
     * Главный движок управления док-панелью.
     */
     class CelestialSeaDock {
      constructor() {
        this.wrapper = document.getElementById("fabWrapper");
        this.btn = document.getElementById("fabToggleBtn");
        this.dock = document.getElementById("globalDock");
  
        // Безопасно связываем с глобальным аудио-движком терминала
        this.synth = window.sound || { playChime() {}, playBubble() {} }; 
        
        this.glitch = new GlitchEngine();
        this.bg = new CanvasBackground("dockCanvas");
        // ...
  
        // Физика Lerp (сглаживание перемещения)
        this.pos = { currentX: 0, currentY: 0, targetX: 0, targetY: 0 };
        this.isDragging = false;
        this.hasMoved = false;
        this.dragOffset = { x: 0, y: 0 };
  
        this.initEvents();
        this.initActiveLink();
        this.snapToInitial();
      }
  
      snapToInitial() {
        // Инициализируем стартовую позицию в правом нижнем углу
        const initialX = window.innerWidth - 98; // 30px offset + 68px width
        const initialY = window.innerHeight - 98;
        this.pos.currentX = this.pos.targetX = initialX;
        this.pos.currentY = this.pos.targetY = initialY;
        this.updateDOMPosition();
      }
  
      initActiveLink() {
        let path = window.location.pathname.split("/").pop();
        if (!path) path = "index.html";
        document.querySelectorAll(".dock-item").forEach(item => {
          if (item.getAttribute("href") === path) {
            item.classList.add("active");
          }
        });
      }
  
      initEvents() {
        // Клик по кнопке
        this.btn.addEventListener("click", (e) => {
          if (this.hasMoved) {
            e.preventDefault();
            return;
          }
          this.toggleDock();
        });
  
        // Drag events
        this.btn.addEventListener("mousedown", (e) => this.dragStart(e));
        this.btn.addEventListener("touchstart", (e) => this.dragStart(e), { passive: true });
  
        window.addEventListener("mousemove", (e) => this.dragMove(e));
        window.addEventListener("touchmove", (e) => this.dragMove(e), { passive: false });
  
        window.addEventListener("mouseup", () => this.dragEnd());
        window.addEventListener("touchend", () => this.dragEnd());
  
        // Закрытие по клику вне
        document.addEventListener("click", (e) => {
          if (!this.wrapper.contains(e.target) && this.wrapper.classList.contains("open")) {
            this.wrapper.classList.remove("open");
            this.synth.playBubble();
          }
        });
  
        // Resize observer
        window.addEventListener("resize", () => {
          this.bg.resize();
          this.keepInBounds();
        });
  
        // Глитч при наведении на пункты меню
        document.querySelectorAll('.dock-item').forEach(item => {
          item.addEventListener('mouseenter', () => {
            this.glitch.trigger();
            this.synth.playChime();
          });
        });
      }
  
      toggleDock() {
        this.updateDockDirection();
        const isOpen = this.wrapper.classList.toggle("open");
        if (isOpen) {
          this.synth.playChime();
        } else {
          this.synth.playBubble();
        }
      }
  
      dragStart(e) {
        this.isDragging = true;
        this.hasMoved = false;
  
        // Получаем текущие координаты из объекта положения
        const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
  
        this.dragOffset.x = clientX - this.pos.currentX;
        this.dragOffset.y = clientY - this.pos.currentY;
  
        this.wrapper.style.willChange = "transform";
      }
  
      dragMove(e) {
        if (!this.isDragging) return;
  
        const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
  
        const targetX = clientX - this.dragOffset.x;
        const targetY = clientY - this.dragOffset.y;
  
        // Лимиты экрана
        const maxLeft = window.innerWidth - this.wrapper.offsetWidth;
        const maxTop = window.innerHeight - this.wrapper.offsetHeight;
  
        this.pos.targetX = Math.max(0, Math.min(targetX, maxLeft));
        this.pos.targetY = Math.max(0, Math.min(targetY, maxTop));
  
        if (Math.abs(this.pos.targetX - this.pos.currentX) > 4 || Math.abs(this.pos.targetY - this.pos.currentY) > 4) {
          this.hasMoved = true;
          if (e.cancelable) e.preventDefault();
        }
  
        this.updatePhysics();
      }
  
      dragEnd() {
        if (!this.isDragging) return;
        this.isDragging = false;
        this.wrapper.style.willChange = "auto";
        this.keepInBounds();
      }
  
      /**
       * Сглаживание движения с использованием LERP (Linear Interpolation).
       * Дает благородное "тяжелое" скольжение виджета.
       */
      updatePhysics() {
        if (!this.isDragging && Math.abs(this.pos.targetX - this.pos.currentX) < 0.1 && Math.abs(this.pos.targetY - this.pos.currentY) < 0.1) {
          return;
        }
  
        const lerpFactor = this.isDragging ? 0.25 : 0.15;
        this.pos.currentX += (this.pos.targetX - this.pos.currentX) * lerpFactor;
        this.pos.currentY += (this.pos.targetY - this.pos.currentY) * lerpFactor;
  
        this.updateDOMPosition();
        this.updateDockDirection();
  
        if (this.isDragging) {
          requestAnimationFrame(() => this.updatePhysics());
        }
      }
  
      updateDOMPosition() {
        this.wrapper.style.left = `${this.pos.currentX}px`;
        this.wrapper.style.top = `${this.pos.currentY}px`;
        this.wrapper.style.bottom = "auto";
        this.wrapper.style.right = "auto";
      }
  
      updateDockDirection() {
        const rect = this.wrapper.getBoundingClientRect();
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
  
        this.wrapper.classList.remove("is-left", "is-up", "is-down");
  
        const dockWidth = this.dock.scrollWidth;
        const gap = 20;
  
        const spaceLeft = rect.left;
        const spaceRight = screenWidth - rect.right;
        const spaceTop = rect.top;
        const spaceBottom = screenHeight - rect.bottom;
  
        if (spaceRight >= dockWidth + gap) {
          this.wrapper.classList.add("is-left"); // Открывается вправо
        } else if (spaceLeft < dockWidth + gap) {
          // Вертикальный фоллбек, если по бокам места нет
          if (spaceTop > spaceBottom) {
            this.wrapper.classList.add("is-up");
          } else {
            this.wrapper.classList.add("is-down");
          }
        }
      }
  
      keepInBounds() {
        const maxLeft = window.innerWidth - this.wrapper.offsetWidth;
        const maxTop = window.innerHeight - this.wrapper.offsetHeight;
  
        this.pos.targetX = Math.max(10, Math.min(this.pos.targetX, maxLeft - 10));
        this.pos.targetY = Math.max(10, Math.min(this.pos.targetY, maxTop - 10));
        
        this.updatePhysics();
      }
    }
  
    // Запуск интерфейса после загрузки DOM
    document.addEventListener("DOMContentLoaded", () => {
      window.celestialSea = new CelestialSeaDock();
    });
  </script>
