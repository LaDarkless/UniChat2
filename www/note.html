<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Notes | Pro Workspace</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;600&family=Roboto:wght@400;500&family=Nunito:wght@400;600&family=Fira+Sans:wght@400;500&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">

    <!-- BoxIcons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    
    <!-- Парсеры -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <!-- MathJax (LaTeX) -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']], processEscapes: true },
            svg: { fontCache: 'global' },
            startup: { typeset: false }
        };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root {
            --bg-color: #030303;
            --grid-color: rgba(255, 255, 255, 0.04);
            --panel-bg: rgba(12, 12, 14, 0.65);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Акцентные цвета (меняются в настройках) */
            --accent: #8b5cf6;
            --accent-hover: #a78bfa;
            --accent-rgb: 139, 92, 246;

            /* Шрифты */
            --font-ui: 'Inter', sans-serif;
            --font-text: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --text-size: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-ui);
            height: 100vh; width: 100vw; overflow: hidden; display: flex;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; background-position: center center; position: relative;
        }

        .glow {
            position: absolute; border-radius: 50%; filter: blur(150px); z-index: -1; opacity: 0.25;
            animation: breathe 8s infinite alternate ease-in-out; pointer-events: none; transition: background 0.5s;
        }
        .glow-1 { width: 50vw; height: 50vw; background: var(--accent); top: -20%; left: 10%; }
        .glow-2 { width: 40vw; height: 40vw; background: #3b82f6; bottom: -20%; right: 5%; animation-delay: -4s; }

        @keyframes breathe { 0% { transform: scale(1); opacity: 0.2; } 100% { transform: scale(1.1); opacity: 0.35; } }

        /* UI Компоненты */
        .btn {
            background: var(--panel-border); color: #fff; border: 1px solid transparent; padding: 10px 14px;
            border-radius: 10px; cursor: pointer; font-family: var(--font-ui); font-size: 14px; font-weight: 500;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s;
        }
        .btn-primary { background: var(--accent); border: none; box-shadow: 0 4px 15px rgba(var(--accent-rgb), 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(var(--accent-rgb), 0.5); filter: brightness(1.1); }
        .btn-icon { background: transparent; padding: 8px; border-radius: 8px; font-size: 22px; color: var(--text-muted); border: none; cursor: pointer; transition: 0.2s; }
        .btn-icon:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* СКРЫТЫЙ ОВЕРЛЕЙ ДЛЯ МОБИЛОК */
        .mobile-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 40; opacity: 0; transition: 0.3s;
        }

        /* ЛЕВАЯ ПАНЕЛЬ */
        .sidebar {
            width: 300px; height: 100%; background: rgba(8, 8, 8, 0.75); backdrop-filter: blur(25px);
            border-right: 1px solid var(--panel-border); display: flex; flex-direction: column; padding: 20px;
            z-index: 50; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; margin-bottom: 25px; color: #fff; }
        .brand i { color: var(--accent); font-size: 26px; text-shadow: 0 0 15px var(--accent); transition: color 0.3s; }

        .search-box {
            display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius: 8px;
            padding: 8px 12px; margin-top: 15px; margin-bottom: 15px; border: 1px solid var(--panel-border);
        }
        .search-box i { color: var(--text-muted); margin-right: 8px; }
        .search-box input { background: transparent; border: none; color: #fff; font-family: var(--font-ui); outline: none; width: 100%; }

        .notes-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        .note-item {
            padding: 12px 14px; background: rgba(255,255,255,0.02); border-radius: 10px; cursor: pointer;
            transition: 0.2s; position: relative; overflow: hidden; border: 1px solid transparent;
        }
        .note-item:hover { background: rgba(255,255,255,0.06); }
        .note-item.active { background: rgba(var(--accent-rgb), 0.15); border-color: rgba(var(--accent-rgb), 0.4); }
        .note-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }
        .note-title-list { font-weight: 600; font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-date { font-size: 11px; color: var(--text-muted); }
        
        .delete-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #ef4444; 
            opacity: 0; transition: 0.2s; border: none; background: none; font-size: 18px; cursor: pointer; padding: 5px;
        }
        .note-item:hover .delete-btn { opacity: 1; }

        /* ОСНОВНАЯ ЧАСТЬ */
        .main { flex: 1; display: flex; flex-direction: column; height: 100%; z-index: 10; width: 100%; }

        .toolbar {
            height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            background: rgba(5, 5, 5, 0.4); backdrop-filter: blur(10px); border-bottom: 1px solid var(--panel-border);
        }

        .menu-toggle { display: none; margin-right: 15px; }
        
        .toolbar-left { display: flex; align-items: center; flex: 1; }
        .note-title-input {
            background: transparent; border: none; color: #fff; font-size: 20px; font-weight: 600;
            font-family: var(--font-ui); outline: none; width: 80%; text-overflow: ellipsis;
        }

        .toolbar-actions { display: flex; align-items: center; gap: 8px; }
        .stats { font-size: 12px; color: var(--text-muted); font-family: var(--font-code); background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; margin-right: 10px; display: none; }

        @media (min-width: 768px) { .stats { display: block; } }

        /* РАБОЧИЕ ПАНЕЛИ */
        .workspace { display: flex; flex: 1; gap: 20px; padding: 20px; overflow: hidden; position: relative; }

        .pane {
            flex: 1; display: flex; flex-direction: column; background: var(--panel-bg);
            border: 1px solid var(--panel-border); border-radius: 16px; backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); overflow: hidden; transition: border-color 0.3s;
        }
        .pane:focus-within { border-color: rgba(var(--accent-rgb), 0.5); }
        
        .pane-header {
            padding: 10px 20px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--panel-border);
            font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px;
            display: flex; justify-content: space-between; align-items: center;
        }

        #editor, #preview {
            flex: 1; padding: 25px; overflow-y: auto; width: 100%; outline: none; transition: font-size 0.3s;
        }
        #editor {
            background: transparent; border: none; color: #cbd5e1; font-family: var(--font-code);
            font-size: var(--text-size); line-height: 1.7; resize: none;
        }
        #preview { color: #e2e8f0; font-family: var(--font-text); font-size: var(--text-size); line-height: 1.8; word-wrap: break-word; scroll-behavior: smooth; }

        /* MARKDOWN СТИЛИ */
        #preview h1, #preview h2, #preview h3 { color: #fff; margin: 1.2em 0 0.5em 0; font-weight: 700; line-height: 1.3; }
        #preview h1 { font-size: 2.2em; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #preview h2 { font-size: 1.7em; }
        #preview p { margin-bottom: 1.2em; }
        #preview a { color: var(--accent); text-decoration: none; transition: 0.2s; border-bottom: 1px dashed var(--accent); }
        #preview a:hover { color: #fff; border-bottom-style: solid; }
        #preview blockquote {
            border-left: 4px solid var(--accent); padding: 12px 20px; margin: 1.5em 0;
            background: linear-gradient(90deg, rgba(var(--accent-rgb), 0.1) 0%, transparent 100%);
            border-radius: 0 12px 12px 0; font-style: italic; color: #cbd5e1;
        }
        #preview pre {
            background: #09090b !important; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 16px; overflow-x: auto; margin-bottom: 1.5em; font-family: var(--font-code); font-size: 0.9em;
        }
        #preview code { background: rgba(255, 255, 255, 0.08); padding: 3px 6px; border-radius: 6px; font-family: var(--font-code); font-size: 0.9em; color: #fca5a5; }
        #preview pre code { background: transparent; padding: 0; color: inherit; }
        #preview ul, #preview ol { padding-left: 20px; margin-bottom: 1.2em; }
        #preview img { max-width: 100%; border-radius: 8px; margin: 1em 0; }
        #preview hr { border: 0; height: 1px; background: var(--panel-border); margin: 2em 0; }
        
        mjx-container[display="true"] {
            margin: 1.5em 0 !important; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05); overflow-x: auto;
        }

        /* МОБИЛЬНЫЕ ТАБЫ (ПЛАВАЮЩИЕ) */
        .mobile-tabs {
            display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15,15,17,0.9); backdrop-filter: blur(15px); border: 1px solid var(--panel-border);
            border-radius: 30px; padding: 5px; z-index: 20; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .mobile-tab-btn {
            background: transparent; color: var(--text-muted); border: none; padding: 8px 20px; border-radius: 25px;
            font-family: var(--font-ui); font-weight: 600; font-size: 14px; transition: 0.3s; cursor: pointer;
        }
        .mobile-tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(var(--accent-rgb), 0.4); }

        /* МОДАЛЬНОЕ ОКНО НАСТРОЕК */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 100;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal {
            background: #111; border: 1px solid var(--panel-border); border-radius: 16px;
            width: 90%; max-width: 420px; padding: 25px; transform: translateY(20px); transition: 0.3s;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.active .modal { transform: translateY(0); }
        .modal h2 { font-size: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--panel-border); padding-bottom: 10px; }
        
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .setting-group select, .setting-group input[type="range"] {
            width: 100%; padding: 10px; background: #000; border: 1px solid var(--panel-border);
            color: #fff; border-radius: 8px; font-family: var(--font-ui); outline: none;
        }
        
        .color-picker { display: flex; gap: 10px; margin-top: 5px; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot:hover { transform: scale(1.1); }
        .color-dot.active { border-color: #fff; box-shadow: 0 0 10px currentColor; }

        /* МЕДИА ЗАПРОСЫ (АДАПТИВ) */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-overlay.active { display: block; opacity: 1; }
            .menu-toggle { display: block; }
            .workspace { padding: 10px; gap: 0; flex-direction: column; }
            .pane { border-radius: 12px; }
            
            /* Логика вкладок на мобильном */
            .pane.preview-pane { display: none; }
            .workspace.show-preview .pane.editor-pane { display: none; }
            .workspace.show-preview .pane.preview-pane { display: flex; }
            
            .mobile-tabs { display: flex; }
            .note-title-input { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <!-- Оверлей для мобильного меню -->
    <div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

    <!-- ЛЕВАЯ ПАНЕЛЬ -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <i class='bx bxl-graphql'></i> Quantum Notes
        </div>
        <button class="btn btn-primary" onclick="createNewNote()">
            <i class='bx bx-plus'></i> Новая заметка
        </button>
        
        <div class="search-box">
            <i class='bx bx-search'></i>
            <input type="text" id="searchInput" placeholder="Поиск заметок..." oninput="filterNotes()">
        </div>

        <div class="notes-list" id="notesList"></div>
        
        <div style="margin-top: auto; padding-top: 15px;">
            <button class="btn" style="width: 100%; background: rgba(255,255,255,0.05);" onclick="toggleSettings()">
                <i class='bx bx-slider-alt'></i> Настройки
            </button>
        </div>
    </aside>

    <!-- ПРАВАЯ ЧАСТЬ -->
    <main class="main">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn-icon menu-toggle" onclick="toggleSidebar()"><i class='bx bx-menu'></i></button>
                <input type="text" class="note-title-input" id="noteTitle" placeholder="Без названия" autocomplete="off">
            </div>
            <div class="toolbar-actions">
                <div class="stats" id="stats">0 слов</div>
                <button class="btn-icon" title="Скачать как HTML" onclick="downloadHTML()"><i class='bx bx-code-block'></i></button>
                <button class="btn-icon" title="Скачать как Markdown" onclick="downloadMarkdown()"><i class='bx bx-download'></i></button>
            </div>
        </div>

        <div class="workspace" id="workspace">
            <div class="pane editor-pane">
                <div class="pane-header"><span><i class='bx bx-code-alt'></i> Markdown</span></div>
                <textarea id="editor" spellcheck="false" placeholder="Пишите здесь..."></textarea>
            </div>
            <div class="pane preview-pane">
                <div class="pane-header">
                    <span><i class='bx bx-show'></i> Preview</span>
                    <span id="renderStatus" style="color: #10b981;">Rendered</span>
                </div>
                <div id="preview"></div>
            </div>

            <!-- Вкладки для мобильных -->
            <div class="mobile-tabs">
                <button class="mobile-tab-btn active" id="tabEdit" onclick="switchMobileTab('edit')">Редактор</button>
                <button class="mobile-tab-btn" id="tabPreview" onclick="switchMobileTab('preview')">Превью</button>
            </div>
        </div>
    </main>

    <!-- НАСТРОЙКИ -->
    <div class="modal-overlay" id="settingsModal" onclick="if(event.target===this) toggleSettings()">
        <div class="modal">
            <h2><i class='bx bx-cog'></i> Параметры среды</h2>
            
            <div class="setting-group">
                <label>Тема (Акцентный цвет)</label>
                <div class="color-picker">
                    <div class="color-dot" style="background: #8b5cf6; color: #8b5cf6;" onclick="setTheme('#8b5cf6', '139, 92, 246')"></div>
                    <div class="color-dot" style="background: #3b82f6; color: #3b82f6;" onclick="setTheme('#3b82f6', '59, 130, 246')"></div>
                    <div class="color-dot" style="background: #10b981; color: #10b981;" onclick="setTheme('#10b981', '16, 185, 129')"></div>
                    <div class="color-dot" style="background: #f43f5e; color: #f43f5e;" onclick="setTheme('#f43f5e', '244, 63, 94')"></div>
                    <div class="color-dot" style="background: #f59e0b; color: #f59e0b;" onclick="setTheme('#f59e0b', '245, 158, 11')"></div>
                </div>
            </div>

            <div class="setting-group">
                <label>Шрифт текста</label>
                <select id="fontSelect" onchange="updateSettings()">
                    <option value="'Inter', sans-serif">Inter (Современный)</option>
                    <option value="'Roboto', sans-serif">Roboto (Классика)</option>
                    <option value="'Montserrat', sans-serif">Montserrat (Геометричный)</option>
                    <option value="'Nunito', sans-serif">Nunito (Мягкий)</option>
                    <option value="'Fira Sans', sans-serif">Fira Sans (Четкий)</option>
                    <option value="'Playfair Display', serif">Playfair (Книжный, с засечками)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Шрифт кода</label>
                <select id="codeFontSelect" onchange="updateSettings()">
                    <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
                    <option value="'Fira Code', monospace">Fira Code</option>
                    <option value="monospace">Системный Monospace</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Размер текста (<span id="fontSizeVal">16</span>px)</label>
                <input type="range" id="sizeSelect" min="12" max="22" value="16" oninput="updateSettings()">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="toggleSettings()">Готово</button>
        </div>
    </div>

    <script>
        // Инициализация Marked.js
        marked.setOptions({
            highlight: (code, lang) => (lang && hljs.getLanguage(lang)) ? hljs.highlight(code, { language: lang }).value : hljs.highlightAuto(code).value,
            breaks: true, gfm: true
        });

        // База данных
        const defaultText = `# Добро пожаловать 🚀\n\nЭто кроссплатформенная среда. На ПК у вас разделенный экран, а на телефоне удобные вкладки внизу.\n\n### Фишки:\n- **Scroll Sync:** Прокручивайте код, и превью будет двигаться следом.\n- **Цвета:** Поменяйте цвет интерфейса в настройках.\n- **LaTeX:** $$ \\int_a^b f(x) dx $$\n\n\`\`\`javascript\nconsole.log("Полный адаптив!");\n\`\`\``;
        
        let notes = JSON.parse(localStorage.getItem('qn_notes')) ||[{ id: Date.now().toString(), title: 'Инструкция', content: defaultText, date: new Date().toLocaleDateString() }];
        let activeId = localStorage.getItem('qn_active') || notes[0].id;
        let settings = JSON.parse(localStorage.getItem('qn_settings')) || { 
            font: "'Inter', sans-serif", codeFont: "'JetBrains Mono', monospace", size: '16', color: '#8b5cf6', colorRgb: '139, 92, 246' 
        };

        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const titleInput = document.getElementById('noteTitle');
        const searchInput = document.getElementById('searchInput');

        // Рендер списка
        function renderNotesList(filterText = '') {
            const list = document.getElementById('notesList');
            list.innerHTML = '';
            
            const filtered = notes.filter(n => n.title.toLowerCase().includes(filterText.toLowerCase())).sort((a,b) => b.id - a.id);
            
            filtered.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-item ${note.id === activeId ? 'active' : ''}`;
                div.onclick = () => switchNote(note.id);
                div.innerHTML = `
                    <div class="note-title-list">${note.title || 'Без названия'}</div>
                    <div class="note-date">${note.date}</div>
                    <button class="delete-btn" onclick="deleteNote(event, '${note.id}')"><i class='bx bx-trash'></i></button>
                `;
                list.appendChild(div);
            });
        }

        function filterNotes() { renderNotesList(searchInput.value); }

        function switchNote(id) {
            activeId = id;
            const note = notes.find(n => n.id === id);
            if(note) {
                titleInput.value = note.title; editor.value = note.content;
                renderNotesList(searchInput.value);
                localStorage.setItem('qn_active', activeId);
                updatePreview();
                if(window.innerWidth <= 768) toggleSidebar(); // Закрываем меню на мобильном при выборе
            }
        }

        function createNewNote() {
            const newNote = { id: Date.now().toString(), title: 'Новая заметка', content: '# ', date: new Date().toLocaleDateString() };
            notes.push(newNote); localStorage.setItem('qn_notes', JSON.stringify(notes));
            searchInput.value = ''; switchNote(newNote.id);
        }

        function deleteNote(e, id) {
            e.stopPropagation();
            if(notes.length === 1) return alert("Нельзя удалить последнюю!");
            if(confirm("Удалить заметку?")) {
                notes = notes.filter(n => n.id !== id);
                if(activeId === id) switchNote(notes[0].id); else renderNotesList(searchInput.value);
                localStorage.setItem('qn_notes', JSON.stringify(notes));
            }
        }

        // Сохранение ввода
        titleInput.addEventListener('input', e => {
            const note = notes.find(n => n.id === activeId);
            if(note) { note.title = e.target.value; renderNotesList(searchInput.value); localStorage.setItem('qn_notes', JSON.stringify(notes)); }
        });

        editor.addEventListener('input', e => {
            const note = notes.find(n => n.id === activeId);
            if(note) { note.content = e.target.value; localStorage.setItem('qn_notes', JSON.stringify(notes)); }
            clearTimeout(window.renderTimeout);
            window.renderTimeout = setTimeout(updatePreview, 300);
        });

        // Парсер (Markdown + MathJax)
        async function updatePreview() {
            const status = document.getElementById('renderStatus');
            status.textContent = "Обновление..."; status.style.color = "#f59e0b";
            
            let text = editor.value;
            const mBlocks =[], mInline = [];
            text = text.replace(/\$\$([\s\S]+?)\$\$/g, m => { mBlocks.push(m); return `_M_B_${mBlocks.length-1}_`; });
            text = text.replace(/\$((?:\\.|[^$])+)\$/g, m => { mInline.push(m); return `_M_I_${mInline.length-1}_`; });
            
            let html = marked.parse(text);
            html = html.replace(/_M_B_(\d+)_/g, (m, i) => mBlocks[i]);
            html = html.replace(/_M_I_(\d+)_/g, (m, i) => mInline[i]);
            
            preview.innerHTML = html;
            
            if (window.MathJax && window.MathJax.typesetPromise) {
                try {
                    MathJax.startup.document.state(0); MathJax.texReset();
                    await MathJax.typesetPromise([preview]);
                    status.textContent = "Готово"; status.style.color = "#10b981";
                } catch (e) { status.textContent = "Ошибка LaTeX"; status.style.color = "#ef4444"; }
            }
            
            document.getElementById('stats').textContent = `${editor.value.trim() ? editor.value.trim().split(/\s+/).length : 0} слов`;
        }

        // SCROLL SYNC (Синхронная прокрутка)
        let isSyncingLeft = false, isSyncingRight = false;
        editor.addEventListener('scroll', () => {
            if (!isSyncingLeft && window.innerWidth > 768) {
                isSyncingRight = true;
                const percentage = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
                preview.scrollTop = percentage * (preview.scrollHeight - preview.clientHeight);
            }
            isSyncingLeft = false;
        });
        preview.addEventListener('scroll', () => {
            if (!isSyncingRight && window.innerWidth > 768) {
                isSyncingLeft = true;
                const percentage = preview.scrollTop / (preview.scrollHeight - preview.clientHeight);
                editor.scrollTop = percentage * (editor.scrollHeight - editor.clientHeight);
            }
            isSyncingRight = false;
        });

        // МОБИЛЬНЫЙ UI
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('active');
        }

        function switchMobileTab(tab) {
            const ws = document.getElementById('workspace');
            const btnEdit = document.getElementById('tabEdit');
            const btnPreview = document.getElementById('tabPreview');
            
            if (tab === 'preview') {
                ws.classList.add('show-preview');
                btnPreview.classList.add('active'); btnEdit.classList.remove('active');
            } else {
                ws.classList.remove('show-preview');
                btnEdit.classList.add('active'); btnPreview.classList.remove('active');
            }
        }

        // ЭКСПОРТ
        function downloadMarkdown() {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([editor.value], { type: 'text/markdown' }));
            a.download = `${titleInput.value || 'note'}.md`; a.click();
        }

        function downloadHTML() {
            // Генерируем красивый HTML файл с запеченными стилями
            const htmlContent = `
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <title>${titleInput.value}</title>
                <style>
                    body { font-family: ${settings.font}; background: #111; color: #eee; padding: 40px; max-width: 900px; margin: auto; line-height: 1.8; }
                    pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; }
                    code { font-family: ${settings.codeFont}; color: #fca5a5; }
                    pre code { color: #ddd; }
                    a { color: ${settings.color}; }
                    blockquote { border-left: 4px solid ${settings.color}; padding-left: 15px; color: #aaa; }
                    img { max-width: 100%; border-radius: 8px; }
                </style>
            </head>
            <body>${preview.innerHTML}</body>
            </html>`;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([htmlContent], { type: 'text/html' }));
            a.download = `${titleInput.value || 'note'}.html`; a.click();
        }

        // НАСТРОЙКИ
        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('active'); }
        
        function setTheme(hex, rgb) {
            settings.color = hex; settings.colorRgb = rgb;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            event.target.classList.add('active');
            applySettings();
        }

        function updateSettings() {
            settings.font = document.getElementById('fontSelect').value;
            settings.codeFont = document.getElementById('codeFontSelect').value;
            settings.size = document.getElementById('sizeSelect').value;
            applySettings();
        }

        function applySettings() {
            localStorage.setItem('qn_settings', JSON.stringify(settings));
            const root = document.documentElement;
            root.style.setProperty('--font-text', settings.font);
            root.style.setProperty('--font-ui', settings.font);
            root.style.setProperty('--font-code', settings.codeFont);
            root.style.setProperty('--text-size', settings.size + 'px');
            root.style.setProperty('--accent', settings.color);
            root.style.setProperty('--accent-rgb', settings.colorRgb);
            
            document.getElementById('fontSelect').value = settings.font;
            document.getElementById('codeFontSelect').value = settings.codeFont;
            document.getElementById('sizeSelect').value = settings.size;
            document.getElementById('fontSizeVal').textContent = settings.size;
            
            // Подсветка выбранного цвета в меню
            document.querySelectorAll('.color-dot').forEach(d => {
                if(d.style.color === settings.color) d.classList.add('active');
                else d.classList.remove('active');
            });
        }

        // Поддержка Tab
        editor.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart, end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
                editor.dispatchEvent(new Event('input'));
            }
        });

        // Инициализация
        window.onload = () => { applySettings(); renderNotesList(); switchNote(activeId); };
    </script>

    .global-dock {

    /* --- НОВЫЕ СТИЛИ ДЛЯ ИКОНОК-КАРТИНОК И ПЕРЕТАСКИВАНИЯ --- */

<script>
    document.addEventListener("DOMContentLoaded", () => {
    const fabWrapper = document.getElementById('fabWrapper');
    const fabToggleBtn = document.getElementById('fabToggleBtn');
    
    // Подсветка активной ссылки (ваш код)
    let currentPath = window.location.pathname.split('/').pop();
    if (currentPath === '') currentPath = 'index.html';
    document.querySelectorAll('.dock-item').forEach(item => {
        const href = item.getAttribute('href');
        if (currentPath === href) {
            item.classList.add('active');
        }
    });

    // --- ЛОГИКА ПЕРЕТАСКИВАНИЯ (DRAG & DROP) ---
    let isDragging = false;
    let hasMoved = false; // Отличаем клик от перетаскивания
    let startX, startY;
    let initialLeft, initialTop;

    function dragStart(e) {
        if (e.type === 'touchstart') {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        } else {
            startX = e.clientX;
            startY = e.clientY;
            e.preventDefault(); // Предотвращаем стандартное выделение на ПК
        }

        // Получаем текущие координаты элемента на экране
        const rect = fabWrapper.getBoundingClientRect();
        
        // Отключаем bottom/right, переходим на жесткое позиционирование left/top
        fabWrapper.style.bottom = 'auto';
        fabWrapper.style.right = 'auto';
        fabWrapper.style.left = rect.left + 'px';
        fabWrapper.style.top = rect.top + 'px';

        initialLeft = rect.left;
        initialTop = rect.top;

        isDragging = true;
        hasMoved = false;
        
        // Убираем плавность при самом перетаскивании
        fabWrapper.classList.remove('snap-transition');

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchmove', dragMove, { passive: false });
        document.addEventListener('touchend', dragEnd);
    }

    function dragMove(e) {
        if (!isDragging) return;

        let currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        let currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

        let deltaX = currentX - startX;
        let deltaY = currentY - startY;

        // Если сдвинули больше чем на 5 пикселей, считаем это перетаскиванием, а не кликом
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
            hasMoved = true;
            if (e.type === 'touchmove') e.preventDefault(); // Блокируем скролл страницы
        }

        if (hasMoved) {
            let newLeft = initialLeft + deltaX;
            let newTop = initialTop + deltaY;

            // --- ОГРАНИЧЕНИЕ ВЫХОДА ЗА ПРЕДЕЛЫ ЭКРАНА ---
            const rect = fabWrapper.getBoundingClientRect();
            const maxLeft = window.innerWidth - rect.width;
            const maxTop = window.innerHeight - rect.height;

            // Запрещаем уходить за левый/правый и верхний/нижний края
            newLeft = Math.max(0, Math.min(newLeft, maxLeft));
            newTop = Math.max(0, Math.min(newTop, maxTop));

            fabWrapper.style.left = newLeft + 'px';
            fabWrapper.style.top = newTop + 'px';
        }
    }

    function dragEnd() {
        isDragging = false;
        document.removeEventListener('mousemove', dragMove);
        document.removeEventListener('mouseup', dragEnd);
        document.removeEventListener('touchmove', dragMove);
        document.removeEventListener('touchend', dragEnd);
    }

    // Слушатели для начала перетаскивания (с кнопки)
    fabToggleBtn.addEventListener('mousedown', dragStart);
    fabToggleBtn.addEventListener('touchstart', dragStart, { passive: true });

    // --- ЛОГИКА ОТКРЫТИЯ/ЗАКРЫТИЯ МЕНЮ ---
    fabToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        
        // Если было перетаскивание, отменяем клик!
        if (hasMoved) {
            e.preventDefault();
            return;
        }

        fabWrapper.classList.toggle('open');
        
        // Если меню открылось и вылезло за края экрана (т.к. стало шире),
        // плавно задвигаем его обратно в пределы экрана.
        if (fabWrapper.classList.contains('open')) {
            setTimeout(keepInBounds, 50); // Ждем долю секунды, чтобы CSS применил ширину
        }
    });

    // Функция возврата в рамки экрана при изменении ширины меню
    function keepInBounds() {
        const rect = fabWrapper.getBoundingClientRect();
        const maxLeft = window.innerWidth - rect.width;
        const maxTop = window.innerHeight - rect.height;

        let correctedLeft = Math.max(0, Math.min(rect.left, maxLeft));
        let correctedTop = Math.max(0, Math.min(rect.top, maxTop));

        // Если позиция нуждается в корректировке
        if (correctedLeft !== rect.left || correctedTop !== rect.top) {
            fabWrapper.classList.add('snap-transition'); // Добавляем плавность
            fabWrapper.style.left = correctedLeft + 'px';
            fabWrapper.style.top = correctedTop + 'px';
        }
    }

    // Закрытие меню при клике в любое другое место
    document.addEventListener('click', (e) => {
        if (!fabWrapper.contains(e.target) && fabWrapper.classList.contains('open')) {
            fabWrapper.classList.remove('open');
            // При закрытии (ширина уменьшилась) тоже проверяем границы на всякий случай
            setTimeout(keepInBounds, 300); 
        }
    });

    // Пересчет границ при повороте экрана телефона / изменении размера окна
    window.addEventListener('resize', keepInBounds);
});
</script>
