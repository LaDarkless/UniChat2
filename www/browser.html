<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Web Browser</title>
    <style>
        :root {
            --bg-dark: #000000;
            --grid-color: rgba(255, 255, 255, 0.12);
            --border-color: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --input-bg: rgba(20, 20, 20, 0.9);
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .browser-window {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .toolbar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
            z-index: 10;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
        }

        button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 6px;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent);
            color: var(--bg-dark);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.05);
        }

        .address-bar-wrapper {
            flex-grow: 1;
            display: flex;
            position: relative;
        }

        #address-input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0 16px;
            height: 36px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }

        #address-input:focus {
            border-color: var(--accent);
            background-color: #0a0a0a;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        #address-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #btn-go {
            width: auto;
            padding: 0 16px;
            font-weight: 500;
        }

        .proxy-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            user-select: none;
        }

        .proxy-toggle input {
            cursor: pointer;
            accent-color: #ffffff;
        }

        .viewport {
            flex-grow: 1;
            background-color: #ffffff;
            position: relative;
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background-color: #ffffff; /* Белый фон для загрузки */
        }

        @media (max-width: 650px) {
            .toolbar {
                padding: 8px;
                gap: 8px;
                flex-wrap: wrap;
            }
            .address-bar-wrapper {
                order: -1;
                width: 100%;
                flex-basis: 100%;
            }
            .proxy-toggle {
                margin-left: auto;
            }
            #btn-go span {
                display: none;
            }
            #btn-go::after {
                content: "🔍";
            }
        }
    </style>
</head>
<body>

    <div class="browser-window">
        <header class="toolbar">
            <div class="nav-buttons">
                <button id="btn-back" title="Назад">&#8592;</button>
                <button id="btn-forward" title="Вперед">&#8594;</button>
                <button id="btn-refresh" title="Обновить">&#10227;</button>
            </div>
            
            <div class="address-bar-wrapper">
                <input type="text" id="address-input" placeholder="Введите сайт или поисковый запрос..." autocomplete="off">
            </div>
            
            <button id="btn-go" title="Перейти"><span>Enter</span></button>

            <label class="proxy-toggle" title="Попытаться обойти блокировки сайтов">
                <input type="checkbox" id="use-proxy"> Anti-Block
            </label>
        </header>

        <main class="viewport">
            <iframe id="webview" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const addressInput = document.getElementById("address-input");
            const btnGo = document.getElementById("btn-go");
            const btnBack = document.getElementById("btn-back");
            const btnForward = document.getElementById("btn-forward");
            const btnRefresh = document.getElementById("btn-refresh");
            const webview = document.getElementById("webview");
            const proxyToggle = document.getElementById("use-proxy");

            let historyStack =[];
            let currentIndex = -1;

            function updateNavButtons() {
                btnBack.disabled = currentIndex <= 0;
                btnForward.disabled = currentIndex >= historyStack.length - 1;
            }

            function navigateTo(url, isHistoryAction = false) {
                let finalUrl = url.trim();
                let displayUrl = finalUrl;
                
                if (!finalUrl) return;

                const isDomain = /^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}([\/\w \.-]*)*\/?$/.test(finalUrl) || finalUrl.startsWith("http");

                if (isDomain) {
                    if (!finalUrl.startsWith("http://") && !finalUrl.startsWith("https://")) {
                        finalUrl = "https://" + finalUrl;
                        displayUrl = finalUrl;
                    }
                    
                    if (proxyToggle.checked) {
                        finalUrl = "https://corsproxy.io/?" + encodeURIComponent(finalUrl);
                    }
                } else {
                    // Оставляем рабочий fmhy.net (без слешей в начале, чтобы код работал!)
                    //finalUrl = "https://www.google.com/search?q=" + encodeURIComponent(finalUrl) + "&igu=1";
                    finalUrl = "https://searx.fmhy.net/search?q=" + encodeURIComponent(finalUrl) + "&language=ru&theme=simple";
                    displayUrl = finalUrl; 
                }

                addressInput.value = displayUrl;

                if (!isHistoryAction) {
                    historyStack = historyStack.slice(0, currentIndex + 1);
                    historyStack.push(displayUrl);
                    currentIndex++;
                }

                // МАГИЯ ДЛЯ APK:
                // Проверяем, запущено ли приложение на телефоне через Capacitor
                if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Browser) {
                    // На телефоне открываем через системный браузер, который ИГНОРИРУЕТ блокировки X-Frame-Options
                    window.Capacitor.Plugins.Browser.open({ url: finalUrl });
                } else {
                    // Если открыто просто на ПК в браузере — грузим в наш iframe
                    webview.src = finalUrl;
                }

                updateNavButtons();
                addressInput.blur(); 
            }

            btnGo.addEventListener("click", () => navigateTo(addressInput.value));
            addressInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") navigateTo(addressInput.value);
            });

            btnBack.addEventListener("click", () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    navigateTo(historyStack[currentIndex], true);
                }
            });

            btnForward.addEventListener("click", () => {
                if (currentIndex < historyStack.length - 1) {
                    currentIndex++;
                    navigateTo(historyStack[currentIndex], true);
                }
            });

            btnRefresh.addEventListener("click", () => {
                if (currentIndex >= 0) navigateTo(addressInput.value, true);
            });

            updateNavButtons();
            
            // Запускаем поиск при старте
            navigateTo("Технологии");
        });
    </script>
</body>

  <!-- ПЛАВАЮЩЕЕ МЕНЮ (FAB DOCK)                  -->

  <style>
    .fab-wrapper {
      position: fixed;
      bottom: 25px;
      right: 25px;
      z-index: 999999;
      /* ФИКС: Убрали flex, жестко фиксируем размер под кнопку */
      width: 54px;
      height: 54px;
      pointer-events: none;
    }

    .fab-button {
      pointer-events: auto;
      width: 100%; /* ФИКС: занимает 100% от враппера */
      height: 100%;
      border-radius: 50%;
      background: rgba(20, 20, 25, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      outline: none;
      padding: 0;
      /* Для телефонов */
      touch-action: none; 
    }

    .fab-button:hover {
      transform: scale(1.1);
      background: rgba(40, 40, 50, 0.9);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), inset 0 1px 5px rgba(255, 255, 255, 0.3);
    }

    .fab-button svg {
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .fab-wrapper.open .fab-button svg {
      transform: rotate(90deg) scale(0.9);
      color: #a78bfa;
    }

    /* Выезжающая панель навигации */
    .global-dock {
      /* ФИКС: Абсолютное позиционирование, чтобы не ломать контейнер */
      position: absolute;
      top: 50%;
      right: calc(100% + 15px); /* По умолчанию открывается влево */
      transform: translateY(-50%) translateX(40px) scale(0.9);
      transform-origin: right center;

      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(12, 12, 14, 0.85);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 100px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.1);

      /* ФИКС: Защита от вылета за экран и скролл */
      max-width: calc(100vw - 100px); 
      overflow-x: auto;
      -ms-overflow-style: none; /* Скрытие ползунка скролла IE/Edge */
      scrollbar-width: none;    /* Скрытие ползунка скролла Firefox */

      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Скрытие ползунка скролла Chrome/Safari */
    .global-dock::-webkit-scrollbar { display: none; }

    /* Состояние открытого меню */
    .fab-wrapper.open .global-dock {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(-50%) translateX(0) scale(1);
    }

    /* === СТАРЫЙ КОД ОСТАЕТСЯ (открытия влево и вправо) === */
    .fab-wrapper.is-left .global-dock {
      right: auto;
      left: calc(100% + 15px);
      transform-origin: left center;
      transform: translateY(-50%) translateX(-40px) scale(0.9);
    }
    .fab-wrapper.is-left.open .global-dock {
      transform: translateY(-50%) translateX(0) scale(1);
    }

    /* === НОВЫЙ КОД (Добавить сюда) === */
    
    /* Вертикальный режим: Открывается ВВЕРХ */
    .fab-wrapper.is-up .global-dock {
      flex-direction: column;   /* Иконки выстраиваются в колонку */
      right: 50%;               /* Центрируем ровно по центру кнопки */
      top: auto;
      bottom: calc(100% + 15px);
      transform-origin: bottom center;
      transform: translateX(50%) translateY(40px) scale(0.9);
      
      /* Защита от вылета по вертикали */
      max-height: calc(100vh - 100px); 
      max-width: none; 
      overflow-y: auto;         /* Вертикальный скролл, если иконок очень много */
      overflow-x: hidden;
    }
    .fab-wrapper.is-up.open .global-dock {
      transform: translateX(50%) translateY(0) scale(1);
    }

    /* Вертикальный режим: Открывается ВНИЗ */
    .fab-wrapper.is-down .global-dock {
      flex-direction: column;
      right: 50%;
      bottom: auto;
      top: calc(100% + 15px);
      transform-origin: top center;
      transform: translateX(50%) translateY(-40px) scale(0.9);
      
      max-height: calc(100vh - 100px);
      max-width: none;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .fab-wrapper.is-down.open .global-dock {
      transform: translateX(50%) translateY(0) scale(1);
    }

    .dock-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      font-family: "Inter", "Segoe UI", sans-serif;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
      white-space: nowrap;
    }

    .dock-item:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .dock-item.active {
      color: #fff;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.05);
    }

    .dock-item.active::after {
      content: "";
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 3px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
    }

    .dock-icon {
      font-size: 18px;
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
    }

    @media (max-width: 768px) {
      .fab-wrapper {
        bottom: 20px;
        right: 20px;
        width: 48px;  /* ФИКС: Изменяем ширину/высоту самого враппера */
        height: 48px; 
      }
      .global-dock {
        padding: 6px 8px;
        gap: 4px;
        /* ФИКС: делаем отступ для узких экранов чуть меньше */
        max-width: calc(100vw - 80px); 
      }
      .dock-item {
        padding: 12px;
      }
      .dock-text {
        display: none;
      }
      .dock-icon {
        font-size: 22px;
      }
      .dock-item.active::after {
        bottom: -2px;
      }
    }

    /* --- НОВЫЕ СТИЛИ ДЛЯ ИКОНОК-КАРТИНОК И ПЕРЕТАСКИВАНИЯ --- */

    .dock-icon {
      width: 20px; /* Размер ваших иконок */
      height: 20px;
      object-fit: contain; /* Чтобы картинка не искажалась */
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
      /* Важно! Запрещаем перетаскивать саму картинку браузером */
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 768px) {
      .dock-icon {
        width: 24px; /* На телефоне иконки чуть больше */
        height: 24px;
      }
    }

    /* Курсоры для кнопки перетаскивания */
    .fab-button {
      cursor: grab;
      touch-action: none; /* Запрещаем скролл страницы при касании кнопки на телефоне */
    }

    .fab-button:active {
      cursor: grabbing;
    }

    /* Класс для плавного возврата в границы экрана (если меню открыли у самого края) */
    .fab-wrapper.snap-transition {
      transition:
        left 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        top 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const fabWrapper = document.getElementById("fabWrapper");
      const fabToggleBtn = document.getElementById("fabToggleBtn");
      const globalDock = document.getElementById("globalDock");

      // Подсветка активной ссылки
      let currentPath = window.location.pathname.split("/").pop();
      if (currentPath === "") currentPath = "index.html";
      document.querySelectorAll(".dock-item").forEach((item) => {
        const href = item.getAttribute("href");
        if (currentPath === href) {
          item.classList.add("active");
        }
      });

      // --- ЛОГИКА ПЕРЕТАСКИВАНИЯ (DRAG & DROP) ---
      let isDragging = false;
      let hasMoved = false; 
      let startX, startY;
      let initialLeft, initialTop;

      // Умное направление (Влево, Вправо, Вверх, Вниз)
      function updateDockDirection() {
        const rect = fabWrapper.getBoundingClientRect();
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;

        // Очищаем все классы направлений
        fabWrapper.classList.remove("is-left", "is-up", "is-down");

        // 1. Узнаем реальную ширину меню (принудительно делаем его строкой на секунду)
        const oldFlexDir = globalDock.style.flexDirection;
        globalDock.style.flexDirection = 'row';
        const dockWidth = globalDock.scrollWidth; 
        globalDock.style.flexDirection = oldFlexDir; // Возвращаем как было

        const gap = 15; // Расстояние от кнопки до меню

        // Считаем свободное место со всех четырех сторон от кнопки
        const spaceLeft = rect.left;
        const spaceRight = screenWidth - rect.right;
        const spaceTop = rect.top;
        const spaceBottom = screenHeight - rect.bottom;

        // Логика принятия решения:
        // Шаг 1: Влезает ли справа?
        if (spaceRight >= dockWidth + gap) {
          fabWrapper.classList.add("is-left"); // (открывается вправо, т.к. кнопка слева)
        } 
        // Шаг 2: Влезает ли слева?
        else if (spaceLeft >= dockWidth + gap) {
          // Ничего не добавляем, стандартный CSS открывает влево
        } 
        // Шаг 3: НЕ ВЛЕЗАЕТ ПО ГОРИЗОНТАЛИ (Экран слишком узкий) -> Переходим в вертикаль
        else {
          // Смотрим, где больше места - сверху или снизу?
          if (spaceTop > spaceBottom) {
            fabWrapper.classList.add("is-up"); // Открываем вверх
          } else {
            fabWrapper.classList.add("is-down"); // Открываем вниз
          }
        }
      }

      function dragStart(e) {
        if (e.type === "touchstart") {
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
        } else {
          startX = e.clientX;
          startY = e.clientY;
          e.preventDefault(); 
        }

        const rect = fabWrapper.getBoundingClientRect();

        fabWrapper.style.bottom = "auto";
        fabWrapper.style.right = "auto";
        fabWrapper.style.left = rect.left + "px";
        fabWrapper.style.top = rect.top + "px";

        initialLeft = rect.left;
        initialTop = rect.top;

        isDragging = true;
        hasMoved = false;

        fabWrapper.classList.remove("snap-transition");

        document.addEventListener("mousemove", dragMove);
        document.addEventListener("mouseup", dragEnd);
        document.addEventListener("touchmove", dragMove, { passive: false });
        document.addEventListener("touchend", dragEnd);
      }

      function dragMove(e) {
        if (!isDragging) return;

        let currentX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
        let currentY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;

        let deltaX = currentX - startX;
        let deltaY = currentY - startY;

        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
          hasMoved = true;
          if (e.type === "touchmove") e.preventDefault(); 
        }

        if (hasMoved) {
          let newLeft = initialLeft + deltaX;
          let newTop = initialTop + deltaY;

          // Ограничение выхода за пределы экрана
          // Так как враппер теперь всегда размером с кнопку (54x54), расчеты идеальны
          const maxLeft = window.innerWidth - fabWrapper.offsetWidth;
          const maxTop = window.innerHeight - fabWrapper.offsetHeight;

          newLeft = Math.max(0, Math.min(newLeft, maxLeft));
          newTop = Math.max(0, Math.min(newTop, maxTop));

          fabWrapper.style.left = newLeft + "px";
          fabWrapper.style.top = newTop + "px";
          
          updateDockDirection(); // Проверяем на какую сторону перетащили
        }
      }

      function dragEnd() {
        isDragging = false;
        document.removeEventListener("mousemove", dragMove);
        document.removeEventListener("mouseup", dragEnd);
        document.removeEventListener("touchmove", dragMove);
        document.removeEventListener("touchend", dragEnd);
      }

      fabToggleBtn.addEventListener("mousedown", dragStart);
      fabToggleBtn.addEventListener("touchstart", dragStart, { passive: true });

      // --- ЛОГИКА ОТКРЫТИЯ/ЗАКРЫТИЯ МЕНЮ ---
      fabToggleBtn.addEventListener("click", (e) => {
        e.stopPropagation();

        if (hasMoved) {
          e.preventDefault();
          return;
        }

        updateDockDirection(); // Перед открытием проверяем сторону
        fabWrapper.classList.toggle("open");
      });

      // Функция возврата в рамки при изменении размера окна (поворот телефона)
      function keepInBounds() {
        const rect = fabWrapper.getBoundingClientRect();
        const maxLeft = window.innerWidth - rect.width;
        const maxTop = window.innerHeight - rect.height;

        let correctedLeft = Math.max(0, Math.min(rect.left, maxLeft));
        let correctedTop = Math.max(0, Math.min(rect.top, maxTop));

        if (correctedLeft !== rect.left || correctedTop !== rect.top) {
          fabWrapper.classList.add("snap-transition"); 
          fabWrapper.style.left = correctedLeft + "px";
          fabWrapper.style.top = correctedTop + "px";
        }
        updateDockDirection();
      }

      document.addEventListener("click", (e) => {
        if (!fabWrapper.contains(e.target) && fabWrapper.classList.contains("open")) {
          fabWrapper.classList.remove("open");
        }
      });

      window.addEventListener("resize", keepInBounds);
      // Инициализируем направление при загрузке (если изначально висит справа)
      updateDockDirection(); 
    });
  </script>

  </body>
