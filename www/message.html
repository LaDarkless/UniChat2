<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>X Messages Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        /* --- (CSS остался абсолютно тем же, дизайн сохранен) --- */
        :root {
            --twitter-blue: #1d9bf0; --twitter-blue-hover: #1a8cd8; --bg-color: #ffffff;
            --text-main: #0f1419; --text-muted: #536471; --border-color: #eff3f4;
            --msg-received-bg: #eff3f4; --msg-received-text: #0f1419;
            --msg-sent-bg: #1d9bf0; --msg-sent-text: #ffffff;
            --danger: #f4212e; --overlay: rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
        input, .message-text { -webkit-user-select: text; user-select: text; }

        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, sans-serif; background-color: #eef2f5; display: flex; justify-content: center; height: 100dvh; width: 100vw; overflow: hidden; overscroll-behavior-y: none; }
        .app-container { width: 100%; max-width: 600px; background-color: var(--bg-color); display: flex; flex-direction: column; height: 100%; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.05); }

        #global-setup-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        
        .header-main { padding: 16px; padding-top: calc(16px + env(safe-area-inset-top)); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; font-weight: 800; }
        #chats-list-screen { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background-color 0.2s; }
        .chat-item:active { background-color: var(--border-color); }
        .chat-info { margin-left: 12px; flex: 1; overflow: hidden; }
        .chat-name { font-weight: 700; font-size: 1rem; color: var(--text-main); }
        .chat-last-msg { font-size: 0.9rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

        .fab { position: absolute; bottom: calc(20px + env(safe-area-inset-bottom)); right: 20px; width: 56px; height: 56px; border-radius: 50%; background-color: var(--twitter-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: none; box-shadow: 0 4px 12px rgba(29, 155, 240, 0.3); cursor: pointer; z-index: 100; transition: transform 0.1s; }
        .fab:active { transform: scale(0.9); }

        #chat-screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: var(--bg-color); z-index: 200; }
        .chat-header { display: flex; align-items: center; padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top)); border-bottom: 1px solid var(--border-color); background-color: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 10; }
        .header-btn { background: none; border: none; font-size: 1.2rem; color: var(--text-main); cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .user-info { display: flex; align-items: center; flex: 1; margin-left: 8px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--twitter-blue); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .user-details { margin-left: 12px; display: flex; flex-direction: column; }
        .room-name { font-weight: 700; font-size: 1.1rem; }
        .user-status { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .status-dot { width: 6px; height: 6px; background-color: #00ba7c; border-radius: 50%; }
        .status-dot.offline { background-color: var(--danger); }
        .status-dot.connecting { background-color: #ffd400; }

        .chat-messages { flex: 1; padding: 20px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 85%; position: relative; }
        .message-wrapper.received { align-self: flex-start; }
        .message-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        .message-bubble { padding: 12px 16px; font-size: 1rem; line-height: 1.4; word-wrap: break-word; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.04); }
        .message-bubble:active { transform: scale(0.98); opacity: 0.8; }
        .received .message-bubble { background-color: #f0f3f5; color: var(--msg-received-text); border-radius: 20px 20px 20px 4px; }
        .sent .message-bubble { background-color: var(--twitter-blue); color: var(--msg-sent-text); border-radius: 20px 20px 4px 20px; box-shadow: 0 4px 12px rgba(29, 155, 240, 0.2); }
        .message-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; display: flex; gap: 6px; }
        .edited-tag { font-style: italic; }

        .chat-input-area { padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border-color); background-color: var(--bg-color); }
        #edit-indicator { display: none; font-size: 0.8rem; color: var(--twitter-blue); margin-bottom: 8px; padding-left: 10px; align-items: center; justify-content: space-between; }
        .cancel-edit { color: var(--text-muted); cursor: pointer; padding: 4px; }
        .input-wrapper { display: flex; align-items: center; gap: 10px; width: 100%; position: relative; }
        .chat-input { flex: 1; background-color: var(--msg-received-bg); border: 1px solid transparent; border-radius: 24px; padding: 12px 45px 12px 16px; font-family: inherit; font-size: 16px; color: var(--text-main); outline: none; }
        .chat-input:focus { border-color: var(--twitter-blue); background-color: var(--bg-color); }
        .send-btn { position: absolute; right: 6px; background-color: var(--twitter-blue); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .send-btn:disabled { background-color: #aab8c2; }

        /* Модальные окна: Glassmorphism */
        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { background: var(--bg-color); padding: 28px 24px; border-radius: 24px; width: 100%; max-width: 340px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); transform: scale(0.95); animation: scaleUp 0.2s ease forwards; }
        @keyframes scaleUp { to { transform: scale(1); } }
        .modal-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 20px; color: var(--text-main); }
        
        /* Современные инпуты */
        .modal-input { width: 100%; padding: 16px; margin-bottom: 16px; border: 2px solid transparent; background: #f0f3f5; border-radius: 16px; font-size: 16px; outline: none; transition: all 0.2s ease; color: var(--text-main); font-weight: 500; }
        .modal-input:focus { background: var(--bg-color); border-color: var(--twitter-blue); box-shadow: 0 0 0 4px rgba(29, 155, 240, 0.1); }
        
        /* Исправленные кнопки */
        .modal-actions { display: flex; gap: 12px; margin-top: 10px; }
        .btn { padding: 16px; border-radius: 16px; font-weight: 700; border: none; cursor: pointer; font-size: 1rem; transition: transform 0.1s, opacity 0.2s; }
        .btn:active { transform: scale(0.96); }
        .modal-actions .btn { flex: 1; } /* Только кнопки внутри модалок растягиваются поровну */
        .btn-primary { background: var(--twitter-blue); color: white; box-shadow: 0 8px 16px rgba(29, 155, 240, 0.2); }
        .btn-secondary { background: #f0f3f5; color: var(--text-main); }

        .bottom-sheet { position: absolute; bottom: -100%; left: 0; width: 100%; background: var(--bg-color); border-radius: 20px 20px 0 0; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); transition: bottom 0.3s ease; z-index: 1100; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .bottom-sheet.active { bottom: 0; }
        .menu-item { padding: 16px 10px; display: flex; align-items: center; gap: 12px; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .menu-item.danger { color: var(--danger); }
        
        #connection-status { position: absolute; top: calc(10px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; z-index: 2000; display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="connection-status">Подключение...</div>

        <!-- Setup -->
        <div id="global-setup-screen">
            <i class="fa-brands fa-twitter" style="font-size: 3rem; color: var(--twitter-blue); margin-bottom: 20px;"></i>
            <h1 class="modal-title" style="font-size: 1.8rem;">Добро пожаловать</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Введите ваше имя, чтобы начать.</p>
            <input type="text" id="my-name-input" class="modal-input" placeholder="Ваше имя" maxlength="20">
            <button id="save-name-btn" class="btn btn-primary" style="width: 100%;">Продолжить</button>
        </div>

        <!-- Chats List -->
        <div id="chats-list-screen" style="display: none;">
            <header class="header-main">
                <span>Сообщения</span>
                <i class="fa-solid fa-gear" style="color: var(--text-muted); font-size: 1.2rem; cursor: pointer;" id="settings-btn"></i>
            </header>
            <main class="chats-list" id="chats-container"></main>
            <button class="fab" id="fab-add" aria-label="Новый чат"><i class="fa-solid fa-plus"></i></button>
        </div>

        <!-- Chat Room -->
        <div id="chat-screen">
            <header class="chat-header">
                <button class="header-btn" id="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="user-info">
                    <div class="avatar" id="room-avatar">#</div>
                    <div class="user-details">
                        <span class="room-name" id="display-room-name">Чат</span>
                        <span class="user-status" id="ws-status"><span class="status-dot offline"></span> Оффлайн</span>
                    </div>
                </div>
            </header>
            <main class="chat-messages" id="chat-messages"></main>
            
            <!-- Индикатор печатания -->
            <div id="typing-indicator" style="display: none; padding: 0 20px 10px; font-size: 0.8rem; color: var(--text-muted); font-style: italic; background: var(--bg-color);">
                Собеседник печатает...
            </div>

            <footer class="chat-input-area">
                <div id="edit-indicator">
                    <span><i class="fa-solid fa-pen"></i> Редактирование...</span>
                    <i class="fa-solid fa-times cancel-edit" id="cancel-edit-btn"></i>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="message-input" class="chat-input" placeholder="Сообщение..." autocomplete="off">
                    <button id="send-btn" class="send-btn" disabled><i class="fa-solid fa-paper-plane" style="font-size: 0.8rem; margin-left:-2px;" id="send-icon"></i></button>
                </div>
            </footer>
        </div>

        <!-- Add Room Modal -->
        <div class="modal-overlay" id="add-room-modal">
            <div class="modal-content">
                <h2 class="modal-title">Новый чат</h2>
                <input type="text" id="new-room-id" class="modal-input" placeholder="ID секретной комнаты">
                <input type="text" id="new-room-name" class="modal-input" placeholder="Название (для вас)">
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="cancel-room-btn">Отмена</button>
                    <button class="btn btn-primary" id="create-room-btn">Добавить</button>
                </div>
            </div>
        </div>

        <!-- Bottom Menu -->
        <div class="modal-overlay" id="menu-overlay" style="background: transparent;"></div>
        <div class="bottom-sheet" id="message-menu">
            <div class="menu-item" id="action-copy"><i class="fa-regular fa-copy"></i> Копировать</div>
            <div class="menu-item" id="action-edit"><i class="fa-solid fa-pen"></i> Изменить</div>
            <div class="menu-item danger" id="action-delete"><i class="fa-regular fa-trash-can"></i> Удалить у всех</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. ИНИЦИАЛИЗАЦИЯ И ОБЕРТКА IndexedDB
        // ==========================================
        let db;
        const DB_NAME = 'XMessengerDB';
        const DB_VERSION = 1;

        // Асинхронная функция подключения к БД
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                // Создание таблиц при первом запуске
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    // Таблица комнат
                    if (!database.objectStoreNames.contains('rooms')) {
                        database.createObjectStore('rooms', { keyPath: 'id' });
                    }
                    // Таблица сообщений
                    if (!database.objectStoreNames.contains('messages')) {
                        const msgStore = database.createObjectStore('messages', { keyPath: 'id' });
                        // Индекс для быстрого поиска сообщений по ID комнаты
                        msgStore.createIndex('roomId', 'roomId', { unique: false });
                    }
                };

                request.onsuccess = (event) => { db = event.target.result; resolve(); };
                request.onerror = (event) => reject(event.target.error);
            });
        }

        // Асинхронные методы работы с БД
        const DB = {
            async getAll(storeName) {
                return new Promise((resolve) => {
                    const tx = db.transaction(storeName, 'readonly');
                    const req = tx.objectStore(storeName).getAll();
                    req.onsuccess = () => resolve(req.result);
                });
            },
            async getMessagesByRoom(roomId) {
                return new Promise((resolve) => {
                    const tx = db.transaction('messages', 'readonly');
                    const index = tx.objectStore('messages').index('roomId');
                    const req = index.getAll(roomId);
                    req.onsuccess = () => resolve(req.result);
                });
            },
            async getMessage(id) {
                return new Promise((resolve) => {
                    const tx = db.transaction('messages', 'readonly');
                    const req = tx.objectStore('messages').get(id);
                    req.onsuccess = () => resolve(req.result);
                });
            },
            async put(storeName, data) {
                return new Promise((resolve) => {
                    const tx = db.transaction(storeName, 'readwrite');
                    const req = tx.objectStore(storeName).put(data);
                    req.onsuccess = () => resolve();
                });
            },
            async delete(storeName, id) {
                return new Promise((resolve) => {
                    const tx = db.transaction(storeName, 'readwrite');
                    const req = tx.objectStore(storeName).delete(id);
                    req.onsuccess = () => resolve();
                });
            },
            async clearAll() {
                return new Promise((resolve) => {
                    const tx = db.transaction(['rooms', 'messages'], 'readwrite');
                    tx.objectStore('rooms').clear();
                    tx.objectStore('messages').clear();
                    tx.oncomplete = () => resolve();
                });
            }
        };

        // ==========================================
        // 2. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ==========================================
        let myProfile = localStorage.getItem('x_profile_name') || ''; // Имя оставим в localStorage (это всего 1 строка)
        let currentRoomId = null;
        let mqttClient = null;
        let editingMsgId = null; 
        let selectedMsgId = null;
        let typingTimeoutId = null;
        let hideTypingTimeoutId = null;

        const generateUUID = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

        // ==========================================
        // 3. UI И ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ
        // ==========================================
        const screens = {
            setup: document.getElementById('global-setup-screen'),
            list: document.getElementById('chats-list-screen'),
            chat: document.getElementById('chat-screen')
        };
        const msgContainer = document.getElementById('chat-messages');
        const chatsContainer = document.getElementById('chats-container');
        const inputField = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const wsStatus = document.getElementById('ws-status');

        // Главный запуск (ждём загрузки БД, потом показываем интерфейс)
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await initDB();
                if (myProfile) {
                    screens.setup.style.display = 'none';
                    screens.list.style.display = 'flex';
                    await renderChatsList();
                }
            } catch (e) { console.error("Ошибка БД:", e); alert("Ошибка базы данных"); }
        });

        document.getElementById('save-name-btn').addEventListener('click', async () => {
            const name = document.getElementById('my-name-input').value.trim();
            if (name) {
                myProfile = name;
                localStorage.setItem('x_profile_name', name);
                screens.setup.style.display = 'none';
                screens.list.style.display = 'flex';
                await renderChatsList();
            }
        });

        document.getElementById('settings-btn').addEventListener('click', async () => {
            if(confirm('Удалить профиль и всю переписку?')) {
                localStorage.removeItem('x_profile_name');
                await DB.clearAll(); // Очищаем IndexedDB
                location.reload();
            }
        });

        // ==========================================
        // 4. КОМНАТЫ (CHATS)
        // ==========================================
        const modal = document.getElementById('add-room-modal');
        document.getElementById('fab-add').addEventListener('click', () => modal.style.display = 'flex');
        document.getElementById('cancel-room-btn').addEventListener('click', () => modal.style.display = 'none');
        
        document.getElementById('create-room-btn').addEventListener('click', async () => {
            const rId = document.getElementById('new-room-id').value.trim();
            const rName = document.getElementById('new-room-name').value.trim() || rId;
            if (rId) {
                const newRoom = { id: rId, name: rName, lastMsg: '', timestamp: Date.now() };
                await DB.put('rooms', newRoom);
                await renderChatsList();
                modal.style.display = 'none';
            }
        });

        async function renderChatsList() {
            chatsContainer.innerHTML = '';
            let rooms = await DB.getAll('rooms');
            // Сортируем: новые чаты (с обновлениями) сверху
            rooms.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            rooms.forEach(room => {
                const el = document.createElement('div');
                el.className = 'chat-item';
                el.innerHTML = `
                    <div class="avatar">${room.name.charAt(0).toUpperCase()}</div>
                    <div class="chat-info">
                        <div class="chat-name">${room.name}</div>
                        <div class="chat-last-msg">${room.lastMsg || 'Нет сообщений'}</div>
                    </div>
                `;
                el.addEventListener('click', () => openChat(room));
                chatsContainer.appendChild(el);
            });
        }

        async function updateRoomLastMsg(roomId, text) {
            let rooms = await DB.getAll('rooms');
            let room = rooms.find(r => r.id === roomId);
            if(room) {
                room.lastMsg = text;
                room.timestamp = Date.now();
                await DB.put('rooms', room);
            }
        }

        // ==========================================
        // 5. ВХОД В ЧАТ И ЗАГРУЗКА ИСТОРИИ
        // ==========================================
        async function openChat(room) {
            currentRoomId = room.id;
            document.getElementById('display-room-name').textContent = room.name;
            document.getElementById('room-avatar').textContent = room.name.charAt(0).toUpperCase();
            
            screens.list.style.display = 'none';
            screens.chat.style.display = 'flex';
            
            await loadMessagesFromDB();
            initMQTT(room.id);
        }

        document.getElementById('back-btn').addEventListener('click', async () => {
            if(mqttClient) { mqttClient.end(); mqttClient = null; }
            screens.chat.style.display = 'none';
            screens.list.style.display = 'flex';
            await renderChatsList(); // Обновляем список (чтобы подтянуть lastMsg)
        });

        async function loadMessagesFromDB() {
            msgContainer.innerHTML = '';
            // Берем только сообщения текущей комнаты благодаря Индексу
            const msgs = await DB.getMessagesByRoom(currentRoomId);
            // Сортировка по ID (так как UUID генерируется через Date.now(), они по умолчанию идут по времени)
            msgs.sort((a, b) => a.id.localeCompare(b.id)); 
            msgs.forEach(m => drawMessageNode(m));
            scrollToBottom();
        }

        // ==========================================
        // 6. ОТПРАВКА И СЕТЬ (MQTT)
        // ==========================================
        inputField.addEventListener('input', () => {
            sendBtn.disabled = !inputField.value.trim();
            
            // Отправка статуса "печатает"
            if(mqttClient && mqttClient.connected) {
                clearTimeout(typingTimeoutId);
                // Отправляем сигнал, что мы печатаем
                mqttClient.publish("XCHAT_" + currentRoomId, JSON.stringify({ type: 'typing', sender: myProfile }));
                // Защита от спама (не отправлять чаще чем раз в секунду)
                typingTimeoutId = setTimeout(() => {}, 1000);
            }
        });
        inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
        sendBtn.addEventListener('click', handleSend);
        document.getElementById('cancel-edit-btn').addEventListener('click', cancelEdit);

        async function handleSend() {
            const text = inputField.value.trim();
            if(!text || !mqttClient || !mqttClient.connected) return;

            const timeStr = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            if(editingMsgId) {
                // РЕДАКТИРОВАНИЕ
                const payload = { type: 'edit', id: editingMsgId, text: text, sender: myProfile, time: timeStr };
                mqttClient.publish("XCHAT_" + currentRoomId, JSON.stringify(payload));
                
                // Обновление локальной БД
                let msgToEdit = await DB.getMessage(editingMsgId);
                if (msgToEdit) {
                    msgToEdit.text = text; msgToEdit.edited = true;
                    await DB.put('messages', msgToEdit);
                    await updateRoomLastMsg(currentRoomId, text);
                    await loadMessagesFromDB(); // Перерисовываем чат
                }
                cancelEdit();
            } else {
                // НОВОЕ СООБЩЕНИЕ
                const msgObj = { id: generateUUID(), roomId: currentRoomId, type: 'new', sender: myProfile, text: text, time: timeStr, edited: false };
                mqttClient.publish("XCHAT_" + currentRoomId, JSON.stringify(msgObj));
                
                // Сохранение в локальную БД
                await DB.put('messages', msgObj);
                await updateRoomLastMsg(currentRoomId, text);
                
                drawMessageNode(msgObj);
                scrollToBottom();
            }

            inputField.value = ''; sendBtn.disabled = true;
        }

        function initMQTT(roomId) {
            wsStatus.innerHTML = '<span class="status-dot connecting"></span> Соединение...';
            const topic = "XCHAT_" + roomId;
            
            mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt', { clientId: 'usr_' + generateUUID(), clean: true });

            mqttClient.on('connect', () => {
                wsStatus.innerHTML = '<span class="status-dot"></span> В сети';
                mqttClient.subscribe(topic);
            });

            // ПРИЕМ СООБЩЕНИЙ
            mqttClient.on('message', async (t, message) => {
                if (t === topic) {
                    try {
                        const data = JSON.parse(message.toString());
                        if (data.sender === myProfile) return; // Игнорируем эхо
                        
                        
                        // Если кто-то печатает
                        if (data.type === 'typing') {
                            const indicator = document.getElementById('typing-indicator');
                            indicator.textContent = `${data.sender} печатает...`;
                            indicator.style.display = 'block';
                            
                            // Скрываем надпись через 2 секунды, если печатать перестали
                            clearTimeout(hideTypingTimeoutId);
                            hideTypingTimeoutId = setTimeout(() => {
                                indicator.style.display = 'none';
                            }, 2000);
                            return; // Прерываем дальнейшую обработку
                        }
                        
                        // Скрываем индикатор моментально, если сообщение уже пришло
                        if (data.type === 'new') {
                            document.getElementById('typing-indicator').style.display = 'none';
                            clearTimeout(hideTypingTimeoutId);
                            
                            data.roomId = currentRoomId; 
// ... дальше идет ваш существующий код
                            await DB.put('messages', data);
                            await updateRoomLastMsg(currentRoomId, data.text);
                            drawMessageNode(data);
                            scrollToBottom();
                        } 
                        else if (data.type === 'delete') {
                            await DB.delete('messages', data.id);
                            const el = document.getElementById(`msg-${data.id}`);
                            if(el) el.remove();
                        } 
                        else if (data.type === 'edit') {
                            let msg = await DB.getMessage(data.id);
                            if(msg) {
                                msg.text = data.text; msg.edited = true;
                                await DB.put('messages', msg);
                                await updateRoomLastMsg(currentRoomId, data.text);
                                await loadMessagesFromDB(); // Перерисовка интерфейса
                            }
                        }
                    } catch (e) { console.error("MQTT Ошибка данных:", e); }
                }
            });

            mqttClient.on('offline', () => wsStatus.innerHTML = '<span class="status-dot offline"></span> Отключен');
        }

        // ==========================================
        // 7. ОТРИСОВКА И МЕНЮ
        // ==========================================
        function drawMessageNode(msgObj) {
            const isMe = msgObj.sender === myProfile;
            const wrap = document.createElement('div');
            wrap.className = `message-wrapper ${isMe ? 'sent' : 'received'}`;
            wrap.id = `msg-${msgObj.id}`;

            if (!isMe) {
                const senderEl = document.createElement('div');
                senderEl.style.cssText = 'font-size: 0.75rem; color: var(--text-muted); margin: 0 4px 4px;';
                senderEl.textContent = msgObj.sender;
                wrap.appendChild(senderEl);
            }

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = `<span class="message-text">${escapeHTML(msgObj.text)}</span>`;
            bubble.addEventListener('click', () => openMessageMenu(msgObj.id, isMe, msgObj.text));

            const meta = document.createElement('div');
            meta.className = 'message-meta';
            meta.innerHTML = `${msgObj.time} ${msgObj.edited ? '<span class="edited-tag">(ред.)</span>' : ''}`;

            wrap.appendChild(bubble); wrap.appendChild(meta);
            msgContainer.appendChild(wrap);
        }

        function scrollToBottom() { msgContainer.scrollTop = msgContainer.scrollHeight; }
        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])); }

        // --- Шторка действий ---
        const menuSheet = document.getElementById('message-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const actEdit = document.getElementById('action-edit');
        const actDel = document.getElementById('action-delete');
        const sendIcon = document.getElementById('send-icon');
        const editIndicator = document.getElementById('edit-indicator');
        
        let targetMsgText = '';

        function openMessageMenu(id, isMe, text) {
            selectedMsgId = id; targetMsgText = text;
            actEdit.style.display = isMe ? 'flex' : 'none';
            actDel.style.display = isMe ? 'flex' : 'none';  
            menuOverlay.style.display = 'block';
            setTimeout(() => menuSheet.classList.add('active'), 10);
        }

        function closeMessageMenu() {
            menuSheet.classList.remove('active');
            setTimeout(() => menuOverlay.style.display = 'none', 300);
        }

        menuOverlay.addEventListener('click', closeMessageMenu);

        document.getElementById('action-copy').addEventListener('click', () => {
            navigator.clipboard.writeText(targetMsgText);
            closeMessageMenu();
            showStatus('Скопировано');
        });

        actDel.addEventListener('click', async () => {
            if(confirm('Удалить сообщение у всех?')) {
                // 1. Команда в MQTT
                mqttClient.publish("XCHAT_" + currentRoomId, JSON.stringify({ type: 'delete', id: selectedMsgId }));
                // 2. Удаление из IndexedDB
                await DB.delete('messages', selectedMsgId);
                // 3. Удаление с экрана
                const el = document.getElementById(`msg-${selectedMsgId}`);
                if(el) el.remove();
            }
            closeMessageMenu();
        });

        actEdit.addEventListener('click', () => {
            editingMsgId = selectedMsgId;
            inputField.value = targetMsgText;
            inputField.focus();
            
            editIndicator.style.display = 'flex';
            sendIcon.classList.remove('fa-paper-plane'); sendIcon.classList.add('fa-check');
            sendBtn.disabled = false;
            
            closeMessageMenu();
        });

        function cancelEdit() {
            editingMsgId = null; inputField.value = '';
            editIndicator.style.display = 'none';
            sendIcon.classList.add('fa-paper-plane'); sendIcon.classList.remove('fa-check');
            sendBtn.disabled = true;
        }

        function showStatus(text) {
            const el = document.getElementById('connection-status');
            el.textContent = text; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2000);
        }
    </script>
</body>

<script>
    document.addEventListener("DOMContentLoaded", () => {
    const fabWrapper = document.getElementById('fabWrapper');
    const fabToggleBtn = document.getElementById('fabToggleBtn');
    
    // Подсветка активной ссылки (ваш код)
    let currentPath = window.location.pathname.split('/').pop();
    if (currentPath === '') currentPath = 'index.html';
    document.querySelectorAll('.dock-item').forEach(item => {
        const href = item.getAttribute('href');
        if (currentPath === href) {
            item.classList.add('active');
        }
    });

    // --- ЛОГИКА ПЕРЕТАСКИВАНИЯ (DRAG & DROP) ---
    let isDragging = false;
    let hasMoved = false; // Отличаем клик от перетаскивания
    let startX, startY;
    let initialLeft, initialTop;

    function dragStart(e) {
        if (e.type === 'touchstart') {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        } else {
            startX = e.clientX;
            startY = e.clientY;
            e.preventDefault(); // Предотвращаем стандартное выделение на ПК
        }

        // Получаем текущие координаты элемента на экране
        const rect = fabWrapper.getBoundingClientRect();
        
        // Отключаем bottom/right, переходим на жесткое позиционирование left/top
        fabWrapper.style.bottom = 'auto';
        fabWrapper.style.right = 'auto';
        fabWrapper.style.left = rect.left + 'px';
        fabWrapper.style.top = rect.top + 'px';

        initialLeft = rect.left;
        initialTop = rect.top;

        isDragging = true;
        hasMoved = false;
        
        // Убираем плавность при самом перетаскивании
        fabWrapper.classList.remove('snap-transition');

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchmove', dragMove, { passive: false });
        document.addEventListener('touchend', dragEnd);
    }

    function dragMove(e) {
        if (!isDragging) return;

        let currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        let currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

        let deltaX = currentX - startX;
        let deltaY = currentY - startY;

        // Если сдвинули больше чем на 5 пикселей, считаем это перетаскиванием, а не кликом
        if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
            hasMoved = true;
            if (e.type === 'touchmove') e.preventDefault(); // Блокируем скролл страницы
        }

        if (hasMoved) {
            let newLeft = initialLeft + deltaX;
            let newTop = initialTop + deltaY;

            // --- ОГРАНИЧЕНИЕ ВЫХОДА ЗА ПРЕДЕЛЫ ЭКРАНА ---
            const rect = fabWrapper.getBoundingClientRect();
            const maxLeft = window.innerWidth - rect.width;
            const maxTop = window.innerHeight - rect.height;

            // Запрещаем уходить за левый/правый и верхний/нижний края
            newLeft = Math.max(0, Math.min(newLeft, maxLeft));
            newTop = Math.max(0, Math.min(newTop, maxTop));

            fabWrapper.style.left = newLeft + 'px';
            fabWrapper.style.top = newTop + 'px';
        }
    }

    function dragEnd() {
        isDragging = false;
        document.removeEventListener('mousemove', dragMove);
        document.removeEventListener('mouseup', dragEnd);
        document.removeEventListener('touchmove', dragMove);
        document.removeEventListener('touchend', dragEnd);
    }

    // Слушатели для начала перетаскивания (с кнопки)
    fabToggleBtn.addEventListener('mousedown', dragStart);
    fabToggleBtn.addEventListener('touchstart', dragStart, { passive: true });

    // --- ЛОГИКА ОТКРЫТИЯ/ЗАКРЫТИЯ МЕНЮ ---
    fabToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        
        // Если было перетаскивание, отменяем клик!
        if (hasMoved) {
            e.preventDefault();
            return;
        }

        fabWrapper.classList.toggle('open');
        
        // Если меню открылось и вылезло за края экрана (т.к. стало шире),
        // плавно задвигаем его обратно в пределы экрана.
        if (fabWrapper.classList.contains('open')) {
            setTimeout(keepInBounds, 50); // Ждем долю секунды, чтобы CSS применил ширину
        }
    });

    // Функция возврата в рамки экрана при изменении ширины меню
    function keepInBounds() {
        const rect = fabWrapper.getBoundingClientRect();
        const maxLeft = window.innerWidth - rect.width;
        const maxTop = window.innerHeight - rect.height;

        let correctedLeft = Math.max(0, Math.min(rect.left, maxLeft));
        let correctedTop = Math.max(0, Math.min(rect.top, maxTop));

        // Если позиция нуждается в корректировке
        if (correctedLeft !== rect.left || correctedTop !== rect.top) {
            fabWrapper.classList.add('snap-transition'); // Добавляем плавность
            fabWrapper.style.left = correctedLeft + 'px';
            fabWrapper.style.top = correctedTop + 'px';
        }
    }

    // Закрытие меню при клике в любое другое место
    document.addEventListener('click', (e) => {
        if (!fabWrapper.contains(e.target) && fabWrapper.classList.contains('open')) {
            fabWrapper.classList.remove('open');
            // При закрытии (ширина уменьшилась) тоже проверяем границы на всякий случай
            setTimeout(keepInBounds, 300); 
        }
    });

    // Пересчет границ при повороте экрана телефона / изменении размера окна
    window.addEventListener('resize', keepInBounds);
});
</script>
