<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twitter Style Messages</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --twitter-blue: #1d9bf0;
            --twitter-blue-hover: #1a8cd8;
            --bg-color: #ffffff;
            --text-main: #0f1419;
            --text-muted: #536471;
            --border-color: #eff3f4;
            --msg-received-bg: #eff3f4;
            --msg-received-text: #0f1419;
            --msg-sent-bg: #1d9bf0;
            --msg-sent-text: #ffffff;
            --danger: #f4212e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f9f9;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
        }

        /* --- Setup Screen --- */
        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 30px;
            text-align: center;
            background-color: var(--bg-color);
            z-index: 100;
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
        }

        .twitter-logo {
            color: var(--twitter-blue);
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .setup-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .setup-subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .input-group {
            width: 100%;
            max-width: 300px;
            margin-bottom: 15px;
        }

        .setup-input {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .setup-input:focus {
            border-color: var(--twitter-blue);
        }

        .join-btn {
            width: 100%;
            max-width: 300px;
            padding: 16px;
            background-color: var(--text-main);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .join-btn:hover { opacity: 0.9; }
        .join-btn:disabled { background-color: #aab8c2; cursor: not-allowed; }

        /* --- Chat Screen --- */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
        }

        .header-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-main);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .header-btn:hover { background-color: var(--border-color); }
        .leave-btn { color: var(--danger); }

        .user-info {
            display: flex;
            align-items: center;
            flex: 1;
            margin-left: 12px;
        }

        .avatar-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--twitter-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .user-details {
            margin-left: 12px;
            display: flex;
            flex-direction: column;
        }

        .room-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .user-status {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot { width: 6px; height: 6px; background-color: #00ba7c; border-radius: 50%; }
        .status-dot.offline { background-color: var(--danger); }
        .status-dot.connecting { background-color: #ffd400; }

        .chat-messages {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 10px; }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.received { align-self: flex-start; }
        .message-wrapper.sent { align-self: flex-end; align-items: flex-end; }

        .message-sender {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            margin-left: 4px;
            margin-right: 4px;
        }

        .message-bubble {
            padding: 12px 16px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .received .message-bubble { background-color: var(--msg-received-bg); color: var(--msg-received-text); border-radius: 20px 20px 20px 4px; }
        .sent .message-bubble { background-color: var(--msg-sent-bg); color: var(--msg-sent-text); border-radius: 20px 20px 4px 20px; }

        .message-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
            margin-left: 4px;
            margin-right: 4px;
        }

        .chat-input-area {
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .chat-input {
            width: 100%;
            background-color: var(--msg-received-bg);
            border: 1px solid transparent;
            border-radius: 24px;
            padding: 12px 45px 12px 16px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus { border-color: var(--twitter-blue); background-color: var(--bg-color); }

        .send-btn {
            position: absolute;
            right: 6px;
            background-color: var(--twitter-blue);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .send-btn:active { transform: scale(0.9); }
        .send-btn:disabled { background-color: #aab8c2; cursor: not-allowed; }

        #connection-status {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 20;
            display: none;
            white-space: nowrap;
        }
        
        .system-msg {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 10px 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="connection-status">Подключение...</div>

        <!-- Экран Входа -->
        <div id="setup-screen">
            <i class="fa-brands fa-twitter twitter-logo"></i>
            <h1 class="setup-title">X Messages</h1>
            <p class="setup-subtitle">Введите имя и ID секретной комнаты.<br>Собеседник должен ввести такой же ID.</p>

            <div class="input-group">
                <input type="text" id="username-input" class="setup-input" placeholder="Ваше имя (Например, Алекс)" maxlength="15">
            </div>
            <div class="input-group">
                <input type="text" id="room-input" class="setup-input" placeholder="ID Комнаты (Например, room55)" maxlength="15">
            </div>
            <button id="join-btn" class="join-btn" disabled>Подключиться</button>
        </div>

        <!-- Экран Чата -->
        <div id="chat-screen">
            <header class="chat-header">
                <button class="header-btn leave-btn" id="leave-btn" aria-label="Выйти">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
                <div class="user-info">
                    <div class="avatar-placeholder" id="room-avatar">#</div>
                    <div class="user-details">
                        <span class="room-name" id="display-room-name">Комната</span>
                        <span class="user-status" id="ws-status"><span class="status-dot offline"></span> Отключен</span>
                    </div>
                </div>
            </header>

            <main class="chat-messages" id="chat-messages"></main>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="message-input" class="chat-input" placeholder="Написать сообщение..." autocomplete="off">
                    <button id="send-btn" class="send-btn" aria-label="Отправить" disabled>
                        <i class="fa-solid fa-paper-plane" style="font-size: 0.8rem; margin-left: -2px;"></i>
                    </button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        let currentUser = '';
        let currentRoom = '';
        let ws = null;
        let reconnectInterval = null;

        const setupScreen = document.getElementById('setup-screen');
        const chatScreen = document.getElementById('chat-screen');
        const usernameInput = document.getElementById('username-input');
        const roomInput = document.getElementById('room-input');
        const joinBtn = document.getElementById('join-btn');
        
        const displayRoomName = document.getElementById('display-room-name');
        const roomAvatar = document.getElementById('room-avatar');
        const wsStatus = document.getElementById('ws-status');
        const messagesContainer = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const leaveBtn = document.getElementById('leave-btn');
        const statusBanner = document.getElementById('connection-status');

        const checkInputs = () => {
            joinBtn.disabled = !(usernameInput.value.trim().length > 0 && roomInput.value.trim().length > 0);
        };

        usernameInput.addEventListener('input', checkInputs);
        roomInput.addEventListener('input', checkInputs);

        joinBtn.addEventListener('click', () => {
            currentUser = usernameInput.value.trim();
            // Делаем комнату уникальнее, чтобы не пересекаться с чужими случайными людьми на публичном сервере
            currentRoom = "XCHAT_" + roomInput.value.trim(); 
            
            displayRoomName.textContent = roomInput.value.trim();
            roomAvatar.textContent = roomInput.value.trim().charAt(0).toUpperCase();
            
            setupScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            
            initWebSocket();
        });

        leaveBtn.addEventListener('click', () => {
            if(ws) ws.close();
            clearTimeout(reconnectInterval);
            chatScreen.style.display = 'none';
            setupScreen.style.display = 'flex';
            messagesContainer.innerHTML = ''; 
        });

        messageInput.addEventListener('input', () => {
            sendBtn.disabled = messageInput.value.trim() === '';
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && messageInput.value.trim() !== '') sendMessage();
        });

        sendBtn.addEventListener('click', sendMessage);

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) {
                showBanner('Нет подключения к серверу', 2000);
                return;
            }

            const timeString = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            const payload = {
                room: currentRoom,
                sender: currentUser,
                text: text,
                time: timeString
            };

            ws.send(JSON.stringify(payload));
            renderMessage(currentUser, text, timeString, 'sent');

            messageInput.value = '';
            sendBtn.disabled = true;
        }

        function renderMessage(sender, text, time, type) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${type}`;

            if (type === 'received') {
                const senderEl = document.createElement('div');
                senderEl.className = 'message-sender';
                senderEl.textContent = sender;
                wrapper.appendChild(senderEl);
            }

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text; 

            const timeEl = document.createElement('div');
            timeEl.className = 'message-time';
            timeEl.textContent = time;

            wrapper.appendChild(bubble);
            wrapper.appendChild(timeEl);
            messagesContainer.appendChild(wrapper);

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function renderSystemMessage(text) {
            const sysMsg = document.createElement('div');
            sysMsg.className = 'system-msg';
            sysMsg.textContent = text;
            messagesContainer.appendChild(sysMsg);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showBanner(text, duration = 3000) {
            statusBanner.textContent = text;
            statusBanner.style.display = 'block';
            if(duration > 0) setTimeout(() => { statusBanner.style.display = 'none'; }, duration);
        }

        function initWebSocket() {
            showBanner('Подключение...', 0);
            wsStatus.innerHTML = '<span class="status-dot connecting"></span> Соединение...';
            
            // Используем публичный открытый бродкаст-сервер (без ключей)
            const wsUrl = 'wss://socketsbay.com/wss/v2/1/demo/';

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    showBanner('Успешно подключено!', 2000);
                    wsStatus.innerHTML = '<span class="status-dot"></span> В сети';
                    renderSystemMessage(`Подключено к комнате безопасности.`);
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        // Фильтр: отображаем сообщения только из нашей секретной комнаты и не от самого себя
                        if (data.room === currentRoom && data.sender !== currentUser) {
                            renderMessage(data.sender, data.text, data.time, 'received');
                        }
                    } catch (e) {
                        // Игнорируем не-JSON сообщения (системный спам публичного сервера)
                    }
                };

                ws.onclose = () => {
                    wsStatus.innerHTML = '<span class="status-dot offline"></span> Отключен';
                    if (chatScreen.style.display === 'flex') {
                        showBanner('Связь потеряна. Переподключение...', 0);
                        reconnectInterval = setTimeout(initWebSocket, 4000);
                    }
                };

                ws.onerror = (error) => {
                    console.error("WS Error:", error);
                };

            } catch(e) {
                showBanner('Ошибка создания сокета', 3000);
            }
        }
    </script>
</body>
</html>
