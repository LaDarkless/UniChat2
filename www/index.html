<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главное меню</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #050505;
            color: #ffffff;
            /* Изменил height на min-height, чтобы на маленьких экранах можно было скроллить, если кнопки не влезают */
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Убрал overflow: hidden; чтобы меню можно было листать, если оно не помещается на телефоне */
            position: relative;
            padding: 40px 20px; 
        }

        /* Создаем белую сетку */
        body::before {
            content: "";
            position: fixed; /* Позиционируем фиксированно, чтобы сетка не ехала при скролле */
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.07) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
        }

        /* Добавляем виньетку (затемнение по краям) для эффекта глубины */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 10%, #050505 90%);
            z-index: -1;
            pointer-events: none;
        }

        .header {
            margin-bottom: 50px;
            text-align: center;
            z-index: 1;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
            max-width: 900px;
            width: 100%;
        }

        .menu-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Ширина 100% чтобы кнопка заполняла свою ячейку грида */
            width: 100%;
            height: 160px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Эффект свечения при наведении */
        .menu-btn:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.1), 
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* НОВЫЙ СТИЛЬ ДЛЯ ИКОНОК-КАРТИНОК */
        .icon {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-bottom: 15px;
            transition: transform 0.4s ease;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            pointer-events: none;
            user-select: none;
        }

        .menu-btn:hover .icon {
            transform: scale(1.15) rotate(5deg);
        }

        .text-container {
            text-align: center;
        }

        .text {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1.5px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-note {
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
        }

        /* Анимации появления */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Адаптивность для телефонов */
        @media (max-width: 600px) {
            .menu-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .menu-btn {
                height: 100px;
                flex-direction: row;
                justify-content: flex-start;
                padding-left: 25px;
            }
            .icon {
                margin-bottom: 0;
                margin-right: 20px;
                width: 36px;
                height: 36px;
            }
            .text-container {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
            }
        }
        .menu-btn:last-child {
    grid-column: 1 / -1; 
}
    </style>
</head>
<body>

    <div class="header">
        <h1>Интерфейс</h1>
    </div>

    <div class="menu-container">
        <!-- Кнопка AI -->
        <a href="ai.html" class="menu-btn">
            <img src="https://i.imgur.com/Nqii4LI.png" alt="AI Core" class="icon">
            <div class="text-container">
                <div class="text">AI Core</div>
                <div class="subtitle">Нейросеть</div>
            </div>
        </a>

        <!-- Кнопка Agent -->
        <a href="agent.html" class="menu-btn">
            <img src="https://i.imgur.com/jNkaBVw.png" alt="Agent" class="icon">
            <div class="text-container">
                <div class="text">Agent</div>
                <div class="subtitle">Управление</div>
            </div>
        </a>

        <!-- Кнопка Music -->
        <a href="music.html" class="menu-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/2995/2995101.png" alt="Music" class="icon">
            <div class="text-container">
                <div class="text">Music</div>
                <div class="subtitle">Плеер</div>
            </div>
        </a>

        <!-- Кнопка Note -->
        <a href="note.html" class="menu-btn btn-note">
            <img src="https://i.imgur.com/GcjfCTh.png" alt="Note" class="icon">
            <div class="text-container">
                <div class="text">Note</div>
                <div class="subtitle">Pro-версия</div>
            </div>
        </a>

        <!-- Кнопка Browser Google -->
        <a href="googleweb.html" class="menu-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Browser Google" class="icon">
            <!-- Исправлена опечатка 'calss' на 'class' -->
            <div class="text-container">
                <div class="text">Browser</div>
                <div class="subtitle">Google</div>
            </div>
         </a>
         
         <!-- Кнопка Browser SearX -->
         <a href="browser.html" class="menu-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/3003/3003511.png" alt="Browser SearX" class="icon">
            <!-- Исправлена опечатка 'calss' на 'class' -->
            <div class="text-container">
                <div class="text">Browser</div>
                <div class="subtitle">SearX</div>
            </div>
         </a>

         <!-- Кнопка О Приложении -->
         <a href="information.html" class="menu-btn">
            <img src="https://i.imgur.com/tpFK0jG.png" alt="Information" class="icon">
            <!-- Исправлена опечатка 'calss' на 'class' -->
            <div class="text-container">
                <div class="text">About App</div>
                <div class="subtitle">Information</div>
            </div>
         </a>

         <!-- Вопросы-Ответы -->
         <a href="answer.html" class="menu-btn">
            <img src="https://i.imgur.com/YuKDHK7.png" alt="Question?" class="icon">
            <!-- Исправлена опечатка 'calss' на 'class' -->
            <div class="text-container">
                <div class="text">About App</div>
                <div class="subtitle">Information</div>
            </div>
         </a>
    </div>

</body>
</html>
