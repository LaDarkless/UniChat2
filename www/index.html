<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главное меню</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #050505;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Создаем белую сетку */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.07) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
        }

        /* Добавляем виньетку (затемнение по краям) для эффекта глубины */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 10%, #050505 90%);
            z-index: -1;
        }

        .header {
            margin-bottom: 50px;
            text-align: center;
            z-index: 1;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
        }

        .menu-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 220px;
            height: 160px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Эффект свечения при наведении */
        .menu-btn:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.1), 
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            transition: transform 0.4s ease;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        .menu-btn:hover .icon {
            transform: scale(1.15) rotate(5deg);
        }

        .text {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1.5px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Выделяем блокнот (делаем рамку чуть ярче по умолчанию) */
        .btn-note {
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
        }

        /* Анимации появления */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Адаптивность для телефонов */
        @media (max-width: 600px) {
            .menu-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .menu-btn {
                width: 250px;
                height: 120px;
                flex-direction: row;
                justify-content: flex-start;
                padding-left: 30px;
            }
            .icon {
                margin-bottom: 0;
                margin-right: 20px;
                font-size: 2.5rem;
            }
            .text-container {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Интерфейс</h1>
    </div>

    <div class="menu-container">
        <!-- Кнопка AI -->
        <a href="ai.html" class="menu-btn">
            <div class="icon">🧠</div>
            <div class="text-container">
                <div class="text">AI Core</div>
                <div class="subtitle">Нейросеть</div>
            </div>
        </a>

        <!-- Кнопка Agent -->
        <a href="agent.html" class="menu-btn">
            <div class="icon">🕵️‍♂️</div>
            <div class="text-container">
                <div class="text">Agent</div>
                <div class="subtitle">Управление</div>
            </div>
        </a>

        <!-- Кнопка Music -->
        <a href="music.html" class="menu-btn">
            <div class="icon">🎧</div>
            <div class="text-container">
                <div class="text">Music</div>
                <div class="subtitle">Плеер</div>
            </div>
        </a>

        <!-- Кнопка Note -->
        <a href="note.html" class="menu-btn btn-note">
            <div class="icon">📒</div>
            <div class="text-container">
                <div class="text">Note</div>
                <div class="subtitle">Pro-версия</div>
            </div>
        </a>

        <!-- Кнопка Browser-->
         <a href="browser.html" class="menu-btn">
            <div class="icon">🌌</div>
            <div calss="text">Browser</div>
            <div class="subtitle">Google</div>
         </a>
         
         <!-- Кнопка Browser-->
         <a href="googleweb.html" class="menu-btn">
            <div class="icon">🌐</div>
            <div calss="text">Browser</div>
            <div class="subtitle">SearX</div>
         </a>
    </div>

</body>
</html>
