name: Generate Keystore
on: workflow_dispatch

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
    - name: Generate keystore and print base64
      run: |
        keytool -genkey -v -keystore keystore.jks \
          -alias unichat -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass unichat123 -keypass unichat123 \
          -dname "CN=UniChat, O=KSyR, C=RU"
        echo "=== KEYSTORE BASE64 START ==="
        base64 -w 0 keystore.jks
        echo ""
        echo "=== KEYSTORE BASE64 END ==="
